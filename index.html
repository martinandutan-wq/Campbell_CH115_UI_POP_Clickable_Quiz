 be suitable options for him?", "options": [{"label": "A", "text": "Alpha-blocker therapy such as tamsulosin", "correct": false}, {"label": "B", "text": "High-power KTP green light laser", "correct": false}, {"label": "C", "text": "HoLEP", "correct": false}, {"label": "D", "text": "Prostate artery embolisation", "correct": true}, {"label": "E", "text": "Tadalfil", "correct": true}, {"label": "F", "text": "UroLift", "correct": true}], "correct": ["D", "E", "F"], "rationale": "Alpha-blocker therapy may well lead to reversible retrograde ejaculation in many men.\nHigh rates of retrograde ejaculation are seen with KTP laser.\nHoLEP has high rates of retrograde ejaculation unless an ejaculatory-sparing technique is performed.\nPAE does not have high rates of retrograde ejaculation or erectile dysfunction.\nTrue low-dose, 5mg daily tadalfil is associated in an improvement ins male LUTS and sexual parameters\nand may be used to improve mild LUTS in men not wishing to consider surgery.\nUroLift does not have high rates of retrograde ejaculation or erectile dysfunction.", "multi": true, "source_images": ["assets/page_027.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 30", "global_num": 51, "source_pages": [27], "stem": "A 58-year-old man sees you in clinic. He has been troubled with bothersome urinary symptoms,\npredominantly poor flow, long voiding time and nocturia.\nHe asks you about treatment options; however, he has recently married and wishes to have children\nnaturally with his new wife.\nWhich of the options below is the most appropriate treatment to minimise his risk of sexual dysfunction?", "options": [{"label": "A", "text": "Green light laser vapourisation", "correct": false}, {"label": "B", "text": "HoLEP", "correct": false}, {"label": "C", "text": "Tamsulosin", "correct": false}, {"label": "D", "text": "Tadalafil", "correct": true}, {"label": "E", "text": "TURP", "correct": false}], "correct": ["D"], "rationale": "Laser vapourisation is associated with a high likelihood of retrograde ejaculation.\nLaser enucleation is likely to cause retrograde ejaculation, although ejaculatory-sparing HOLEP has been\ndescribed.\nAll alpha blockers are associated with high levels of retrograde ejaculation, making a natural conception\ndifficult.\nPDE-5is are likely to maintain sexual function and improve LUTS.\nTURP is associated with high levels of ejaculatory dysfunction and erectile dysfunction, which will make a\nnatural conception difficult.", "multi": false, "source_images": ["assets/page_027.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 31", "global_num": 52, "source_pages": [27, 28], "stem": "A 60-year-old man has significant LUTS despite maximal medical therapy with tamsulosin, tolterodine,\nfinasteride and tadalafil. Despite the tadalafil he is troubled as his erections are insufficient for\nintercourse.\nWhich of the actions below is the most appropriate next step?", "options": [{"label": "A", "text": "Change finasteride to dutasteride", "correct": false}, {"label": "B", "text": "Change tadalafil to sildenafil", "correct": false}, {"label": "C", "text": "Perform a monopolar TURP and stop all medication", "correct": false}, {"label": "D", "text": "Stop the anticholinergic and start mirabegron", "correct": false}, {"label": "E", "text": "Stop finasteride and review in three months", "correct": true}], "correct": ["E"], "rationale": "There is no benefit to switching 5-alpha-reductase inhibitors.\nThere is no evidence to support that a change in PDE-5i would improve erectile dysfunction.\nStopping medication may work if ED is due to finasteride, but TURP itself may cause de novo ED.\nAnticholinergics such as tolterodine are not associated with ED. In addition, although used in\nBPO-derived-LUTS, mirabegron has no evidence basis in this cohort.\nED may be a side effect of the 5-alpha-reductase inhibitor, finasteride.", "multi": false, "source_images": ["assets/page_027.jpg", "assets/page_028.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 32", "global_num": 53, "source_pages": [28], "stem": "A 64-year-old Caucasian male patient treated with α-blockers for LUTS and BPE (prostate size: 45g; PSA:\n1.9ng/mL) has persistent storage LUTS (IPSS = 11; vIPSS: 4; sIPSS: 7). He is obese (waist circumference:\n104cm), and receives treatment for diabetes (metformin) and hypertension (diuretics). His flow test\nshows a voided volume of 175mL, Qmax of 12mL/sec and 35mL post-void residual.\nWhich is the most suitable treatment alternative?", "options": [{"label": "A", "text": "Botox intravesical injection", "correct": false}, {"label": "B", "text": "Mirabegron", "correct": false}, {"label": "C", "text": "Tadalafil", "correct": false}, {"label": "D", "text": "Tolterodine in addition to α-blocker", "correct": true}, {"label": "E", "text": "TURP", "correct": false}], "correct": ["D"], "rationale": "A trial of pharmacotherapy should be considered and tried if there is no contraindication prior to surgical\ntherapy.\nAlthough mirabegron may be an option, the evidence to support it as the next treatment is weak, and the\nuse of anticholinergic if no contraindication is more evidence based.\nThere is little evidence to support a PED5 inhibitor in this setting as a treatment for storage LUTS although\nit may have a role in voiding symptoms with concurrent erectile dysfunction.\nThere are many studies that would support the use of an anticholinergic such as tolterodine as the next\noption.\nAlthough TURP is an option, only 50% of men as described will get postoperative improvement in their\nstorage symptoms.", "multi": false, "source_images": ["assets/page_028.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 33", "global_num": 54, "source_pages": [28, 29], "stem": "A 67-year-old man attends for an outpatient appointment. He is unhappy with his urinary symptoms\nespecially a poor flow and long voiding time. He passes urine about every six hours during the day and\noccasionally gets up once at night.\nHe has had three UTIs in the last six months all of which settled with antibiotics.\nHe takes medication for his blood pressure: doxasosin 8mg once a day, a statin and aspirin.\nHe has not had any renal tract surgery in the past but one year ago had an anterior resection for a high\nrectal tumour with a primary anastomosis.\nHe has a BMI of 36, his prostate is about 90cc and feels benign. Neurological examination is normal.\nOf the tests below which of the following would be appropriate initial investigations?", "options": [{"label": "A", "text": "Flow rate and post-void residual", "correct": true}, {"label": "B", "text": "Renal tract ultrasound and post-void residual", "correct": false}, {"label": "C", "text": "Simple CMG", "correct": false}, {"label": "D", "text": "Urea and electrolytes", "correct": false}, {"label": "E", "text": "Urinary dipstick", "correct": true}], "correct": ["A", "E"], "rationale": "It is important to assess bladder emptying. If this shows a high residual then a renal tract ultrasound is\nindicated.\nAlthough an ultrasound and PVR may be indicated later it is not a recommended initial investigation for\nthe assessment of male LUTS.\nSimple CMG is not indicated at this stage.\nUnless there are signs of renal dysfunction testing urea and electrolytes is not an initial investigation.\nIf urinary dipstick shows abnormalities to suggest infection a sample for MCS could be sent.", "multi": true, "source_images": ["assets/page_028.jpg", "assets/page_029.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 34", "global_num": 55, "source_pages": [29], "stem": "A 67-year-old man attends for an outpatient appointment. He is unhappy with his urinary symptoms\nespecially a poor flow and long voiding time. He passes urine about every six hours during the day and\noccasionally gets up once at night.\nHe has had three UTIs in the last six months all of which settled with antibiotics.\nHe takes medication for his blood pressure: doxasosin 8mg once a day, a statin and aspirin.\nHe has not had any renal tract surgery in the past but one year ago had an anterior resection for a high\nrectal tumour with a primary anastomosis.\nHe has a BMI of 36, his prostate is about 90cc and feels benign. Neurological examination is normal. His\ninitial investigations include urinary dipstick and a flow test.\nThe dipstick is negative. The patients flow test shows a straining pattern with a Qmax of 8mL/sec. The\nvoided volume is 245mL and there is a 600mL post-void residual.\nHis next investigation is a renal tract ultrasound, which confirms the large post-void residual but there is\nno evidence of upper tract dilatation.\nThe patient asks you what the cause of his symptoms is likely to be. Which of the following are possible\ncauses of his symptoms?", "options": [{"label": "A", "text": "Bladder outlet obstruction due to bladder stones", "correct": false}, {"label": "B", "text": "Bladder outlet obstruction secondary to benign prostatic enlargement", "correct": true}, {"label": "C", "text": "Detrusor underactivity secondary to previous pelvic surgery", "correct": true}, {"label": "D", "text": "Dysfunctional voiding secondary to urinary infection", "correct": false}], "correct": ["B", "C"], "rationale": "BOO due to bladder stones is an unlikely diagnosis but these stones can be associated with poor bladder\nemptying.\nThere is no evidence of dysfunctional voiding being caused by UTI.", "multi": true, "source_images": ["assets/page_029.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 35", "global_num": 56, "source_pages": [29, 30], "stem": "A 67-year-old man attends for an outpatient appointment. He is unhappy with his urinary symptoms\nespecially a poor flow and long voiding time. He passes urine about every six hours during the day and\noccasionally gets up once at night.\nHe has had three UTIs in the last six months all of which settled with antibiotics.\nHe takes medication for his blood pressure: doxasosin 8mg once a day, a statin and aspirin.\nHe has not had any renal tract surgery in the past but one year ago had an anterior resection for a high\nrectal tumour with a primary anastomosis.\nHe has a BMI of 36, his prostate is about 90cc and feels benign. Neurological examination is normal. His\ninitial investigations include urinary dipstick and a flow test.\nThe dipstick is negative. The patients flow test shows a straining pattern with a Qmax of 8mL/sec. The\nvoided volume is 245mL and there is a 600mL post-void residual.\nHis next investigation is a renal tract ultrasound, which confirms the large post-void residual but there is\nno evidence of upper tract dilatation.\nThe patient is fed up with his symptoms and would like a single definitive treatment before going on a\nround-the-world cruise.\nWhat is the most appropriate treatment option?", "options": [{"label": "A", "text": "Aquablation", "correct": false}, {"label": "B", "text": "Clean intermittent self-catheterisation", "correct": false}, {"label": "C", "text": "HoLEP", "correct": true}, {"label": "D", "text": "Tamsulosin 400µg once a day", "correct": false}, {"label": "E", "text": "TURP", "correct": false}], "correct": ["C"], "rationale": "Aquablation would not be the optimum operative intervention for patients in chronic retention.\nClean intermittent self-catheterisation may manage his slow flow and bladder emptying but would require\nhim to perform the technique regularly and would not be considered a single definitive treatment. For\nmany other patients with low pressure and low flow with voiding symptoms, feeling of poor emptying, or\nrecurrent UTIs, this is an acceptable option, however the cost of self-catheters should not be\nunderestimated.\nIf available, given the large size of his prostate HoLEP is the likeliest procedure to improve his bladder\nemptying. However it is not available in all centres and does not guarantee that the patient will not still\nhave voiding symptoms and residual urine.\nHe is already on an 8mg dose of doxasosin and will not benefit from further alpha blocker therapy.\nAlthough TURP may be a viable option and in some centres the only available option for bladder outlet\nsurgery, there is some evidence that HoLEP may be more effective in this situation.\nAlthough this patient has a preference for definitive treatment, other options for patients who are not\nbothered by their symptoms could include carrying on with surveillance of his upper tracts with\nultrasound and serial creatinine measurements, as many patients with large residuals and low voiding\npressures will not develop upper tract deterioration.", "multi": false, "source_images": ["assets/page_029.jpg", "assets/page_030.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 36", "global_num": 57, "source_pages": [30], "stem": "A 42-year-old woman complains of SUI which began after her second pregnancy. Both deliveries were\nuncomplicated vaginal deliveries however the birthweight of the second child was 4Kg.\nConservative measures with pelvic floor exercises have not helped. She is otherwise fit and well with a\nBMI of 21.\nBelow are two consecutive flow rates from this lady:\nvoided volume = 452mL (A1) and 211mL (A2)\nQmax = 40mL/sec (A1) and 32mL/sec (A2).", "options": [], "correct": [], "rationale": "", "multi": false, "source_images": ["assets/page_030.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q1", "global_num": 58, "source_pages": [34], "stem": "A 25-year-old man with end-stage renal failure is being considered for renal transplantation. As a child he\nsuffered from posterior urethral valves, which were ablated in the neonatal period. Cystometric\nassessment demonstrates an intravesical pressure of 20cmH20 after instillation of 100mL fluid and\n40cmH20 after instillation of 150mL fluid. Bladder capacity was found to be 200mL and the bladder\nemptied to completion. There were no uninhibited detrusor contractions.\nCan this patient proceed safely to renal transplantation?", "options": [{"label": "A", "text": "No, an augmentation cystoplasty should be undertaken prior to transplantation", "correct": false}, {"label": "B", "text": "to transplantation", "correct": true}, {"label": "C", "text": "re-assessed with cystometry prior to transplantation", "correct": false}, {"label": "D", "text": "Yes, but only with concurrent treatment with anticholinergics", "correct": false}, {"label": "E", "text": "Yes, no further investigations or treatments are required", "correct": false}], "correct": ["B"], "rationale": "No, anticholinergics should be initiated and bladder function re-assessed with cystometry prior\nNo, intravesical botulinum toxin injections should be undertaken and bladder function\nThe cystometric assessment has demonstrated a poorly compliant bladder that may result in graft\ndysfunction without appropriate treatment. However, initially anticholinergics should be initiated and\nbladder function re-assessed with cystometry prior to transplantation.\nIf compliance has not improved sufficiently with the use of anticholinergics, intravesical botulinum toxin\ninjections, with clean intermittent self-catheterisation, if required, should be undertaken.\nIf, despite these measures, bladder compliance remains poor, consideration should be given to an\naugmentation cystoplasty.", "multi": false, "source_images": ["assets/page_034.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q2", "global_num": 59, "source_pages": [34, 35], "stem": "A 60-year-old woman with end-stage renal failure is due to have a renal transplant. She suffers from\ndiabetic nephropathy, has no urological history and no current urinary tract symptoms. Her physical\nexamination is normal, her urinalysis demonstrates only proteinuria and her urine culture is negative.\nHowever, she has only produced 50mL of urine every 24 hours for several years and is concerned that her\nbladder will now be so small that she will have storage symptoms once she is producing more urine.\nShe asks you if she should have any urinary investigations or treatments before her transplant and asks if\nshe will likely have urinary symptoms after her transplant.\nWhat do you advise?\nShe does not need any investigations and will likely be symptom-free after her transplant -\nShe does not need any investigations prior to her transplant but she may wish to consider", "options": [{"label": "A", "text": "bladder cycling to reduce her risk of surgical complications", "correct": true}, {"label": "B", "text": "frequently bothersome", "correct": false}, {"label": "C", "text": "more urine", "correct": false}, {"label": "D", "text": "bothersome urinary tract symptoms after her transplant", "correct": false}], "correct": ["A"], "rationale": "She does not need any investigations prior to her transplant. In the long term her bladder\ncapacity will increase but she may experience nocturia and daytime frequency, which are\nShe should consider an augmentation cystoplasty due to her small capacity bladder which will\nprotect her allograft and prevent bothersome urinary tract symptoms once she is producing\nShe should have a formal cystometric assessment prior to her transplant and is likely to have\nThis patient has no urological history and her physical examination is normal. She therefore does not\nwarrant any further urological investigation prior to her transplant, despite her defunctionalised bladder.\nIn the long term her bladder capacity will increase, although she may experience nocturia and daytime\nfrequency. However, most patients find that these symptoms do not negatively impact on their quality of\nlife.\nIn the majority of cases, bladder capacity will subsequently return to normal and any uninhibited bladder\ncontractions will disappear. When patients are appropriately selected, patient and graft survival are not\nsignificantly different from that of the general transplant population. However, her small capacity bladder\nmay increase the risk of surgical complications and bladder cycling preoperatively may ameliorate these\nrisks.\nAfter renal transplantation, patients with a defunctioned bladder are likely to experience daytime urinary\nfrequency and nocturia in the long term. The reasons for this are unclear and may not solely be due to\ndefunctionalisation of the urinary bladder. Despite these lower urinary tract symptoms, quality of life and\nsatisfaction with renal transplant do not appear to be compromised.", "multi": false, "source_images": ["assets/page_034.jpg", "assets/page_035.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q3", "global_num": 60, "source_pages": [35], "stem": "In static cold storage (SCS) of the kidney, which of the following preservation solutions should be avoided\ndue to its association with higher rates of delayed graft function (DFG)?", "options": [{"label": "A", "text": "Celsior", "correct": false}, {"label": "B", "text": "Euro-Collins", "correct": true}, {"label": "C", "text": "HTK", "correct": false}, {"label": "D", "text": "UW", "correct": false}, {"label": "E", "text": "HTK-N", "correct": false}], "correct": ["B"], "rationale": "In an extensive meta-analysis of SCS, Euro-Collins solution was associated with DGF, while no differences\nwere observed in DGF between Celsior, HTK and UW solutions. HTK-N was found to be comparable with\nHTK in a small, randomised controlled trial of living-donor kidneys.", "multi": false, "source_images": ["assets/page_035.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q4", "global_num": 61, "source_pages": [35], "stem": "What is the ideal method for kidney preservation in healthcare settings where distances between kidney\nretrieval and implantation are large, potentially necessitating air travel, such as in the USA or Australia?", "options": [{"label": "A", "text": "Closed-circuit normothermic machine preservation", "correct": false}, {"label": "B", "text": "Open-circuit normothermic machine preservation", "correct": false}, {"label": "C", "text": "Hypothermic machine preservation", "correct": true}, {"label": "D", "text": "Hypothermic oxygenated machine preservation", "correct": false}, {"label": "E", "text": "Static cold storage", "correct": false}], "correct": ["C"], "rationale": "Normothermic machine preservation is still in clinical trials with no clear benefits demonstrated as of yet;\nthe only portable device of this type is currently a prototype, and the complexity of its setup and\nmonitoring could be a challenge for a retrieval team.\nGiven the clear demonstrated benefit of hypothermic machine preservation in reducing delayed graft\nfunction, it is ideal for kidneys to be placed on HMP at retrieval and for storage at their destination.\nHMPO2 has less evidence than HMP for its use, with fewer randomised controlled trials. Its use in air travel\nis also limited, as an oxygen cylinder is required for this device.\nWhile outcomes from static cold storage remain excellent, the benefits of HMP have been demonstrated,\nand SCS for longer storage periods is contraindicated.", "multi": false, "source_images": ["assets/page_035.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q5", "global_num": 62, "source_pages": [35, 36], "stem": "Which of the following methods of preservation can facilitate prolonged preservation to allow\npre-transplant immunomodulation of the kidney?", "options": [{"label": "A", "text": "Hypothermic machine preservation", "correct": false}, {"label": "B", "text": "Hypothermic oxygenated machine preservation", "correct": false}, {"label": "C", "text": "Normothermic machine preservation", "correct": true}, {"label": "D", "text": "Static cold storage", "correct": false}, {"label": "E", "text": "Subnormothermic machine perfusion", "correct": false}], "correct": ["C"], "rationale": "Successful pre-implant drug delivery is likely to take many hours, and in order for cellular processes to\noccur in response to drugs, the kidney tissues need to be in a near-physiological state. Thus, NMP is likely\nto be the only option for facilitating organ modulation.", "multi": false, "source_images": ["assets/page_035.jpg", "assets/page_036.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q6", "global_num": 63, "source_pages": [36], "stem": "Which of the following is an absolute contraindication to transplantation in an HIV-positive recipient?", "options": [{"label": "A", "text": "CD4 count below 200 cells/μL", "correct": false}, {"label": "B", "text": "Hepatitis C co-infection", "correct": false}, {"label": "C", "text": "History of pneumocystis infection in the past year", "correct": false}, {"label": "D", "text": "History of progressive multifocal leukoencephalopathy", "correct": true}, {"label": "E", "text": "Previous history of tuberculosis", "correct": false}, {"label": "F", "text": "Acute rejection is three times more likely in HIV-positive patients", "correct": true}, {"label": "G", "text": "transplant", "correct": false}, {"label": "H", "text": "Living donation is not appropriate for HIV-positive recipients", "correct": false}, {"label": "I", "text": "Multi-drug resistant HIV is not a contraindication to transplant", "correct": false}, {"label": "J", "text": "T-cell-depleting induction treatments are contraindicated", "correct": false}], "correct": ["D", "F"], "rationale": "From this list, only a history of progressive multifocal leukoencephalopathy would be an absolute\ncontraindication. The others are relatively contraindicated - a CD4 of more than 200 cells/μL is desirable\nbut not essential. Hepatitis C co-infection you would aim to treat pre-transplant and transplant would be\ndiscouraged with active hepatitis C but is not totally contraindicated. Pneumocystis is not a\ncontraindication.\nWhich of the following statements regarding transplantation in HIV is correct?\nCytomegalovirus (CMV)-seronegative patients should not receive a CMV-positive organ\nAcute rejection is consistently reported as being around three times higher in transplant recipients who\nare HIV-positive than that of transplant recipients who are HIV-negative.\nCMV is managed exactly the same way as it is in the HIV-negative population, with CMV prophylaxis given\nto the organ recipient. The prophylaxis may be continued for longer than in the HIV-negative population,\nhowever.\nLiving donation to HIV-positive recipients should be encouraged. HIV that is resistant to treatment is a\ncontraindication for transplant.\nPreviously there were concerns about using T-cell-depleting regimens, but the most recent British\nTransplantation Society guidelines suggest they can be used safely with caution.", "multi": true, "source_images": ["assets/page_036.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q7", "global_num": 64, "source_pages": [36, 37], "stem": "A patient known to be dialysis-dependent requires emergency surgery that cannot be delayed. He last ate\nthree hours ago.\nWhat special considerations should be made in the context of emergency surgery?", "options": [{"label": "A", "text": "Elevated potassium in the dialysis-dependent can only be normalised with dialysis", "correct": false}, {"label": "B", "text": "result in prolonged muscle relaxation", "correct": true}, {"label": "C", "text": "The risk of aspiration is low and rapid sequence induction is best avoided", "correct": false}, {"label": "D", "text": "accumulation", "correct": false}, {"label": "E", "text": "levels", "correct": false}, {"label": "F", "text": "Na+-K+-ATPase pump, thus leading to a decrease in serum potassium", "correct": true}, {"label": "G", "text": "ECG changes are observed in >85% of patients with serum potassium >6.5mmol/L", "correct": false}, {"label": "H", "text": "ECG changes associated with hyperkalaemia include narrowing of the QRS complex", "correct": false}, {"label": "I", "text": "Loop diuretics are a useful adjunct and act to increase the excretion of potassium", "correct": false}, {"label": "J", "text": "Oral calcium resonium is a first-line treatment and acts to stabilise the myocardium", "correct": false}], "correct": ["B", "F"], "rationale": "Neuromuscular blockade using atracurium in patients with end-stage renal disease (ESRD) may\nThe use of fentanyl is not advocated in patients with end-stage renal disease due to\nThe use of the neuromuscular blocking agent succinylcholine will reduce serum potassium\nDepending on how elevated the serum potassium is, measures including the administration of insulin and\nβ2-agonists may sufficiently reduce serum potassium levels.\nThe risk of aspiration is high; the patient has eaten in the last three hours. Furthermore, ESRD is\nassociated with delayed gastric emptying a thus increases the risk of aspiration further.\nFentanyl is metabolised by the liver and is safe to use in the context of ESRD provided hepatic function is\nnormal.\nSuccinylcholine use is associated with elevations in the serum levels of potassium.\nWith regard to the management of hyperkalaemia in the end-stage renal disease patient prior\nto surgery, which of the following statements is correct?\nBoth insulin and β2-agonists act to increase cellular uptake of potassium by stimulation of the\nECG anomalies are observed in roughly 50% of patients with serum potassium levels exceeding\n6.5mmol/L.\nHyperkalaemia is associated with widening of the QRS complex, tenting of the T-wave and flattening or\nloss of the P-wave.\nWhilst it is true that loop diuretics can increase potassium excretion and thus help reduce serum levels,\nintact renal function is required and are therefore unlikely to have any great effect on serum potassium in\npatients with ESRD.\nCalcium resonium is a resin that binds calcium in the gut and is not to be confused with calcium\ngluconate, which is a first-line treatment in hyperkalaemia and acts to stabilise the myocardium.", "multi": true, "source_images": ["assets/page_036.jpg", "assets/page_037.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q8", "global_num": 65, "source_pages": [37], "stem": "A 45-year-old man describes an episode of painless visible haematuria. He underwent living donor renal\ntransplantation at age 30; this was his second transplant and was placed in the right iliac fossa. He is\nfound on CT to have an interpolar 2cm lesion within the renal transplant. Transplant kidney function is\nwell maintained, with an estimated glomerular filtration rate of 48mL/min.\nWhat are the options for management and treatment?", "options": [{"label": "A", "text": "Biopsy and nephron-sparing surgery", "correct": true}, {"label": "B", "text": "Biopsy and radiofrequency ablation (RFA)", "correct": true}, {"label": "C", "text": "Nephron-sparing surgery without biopsy", "correct": true}, {"label": "D", "text": "Systemic treatment", "correct": false}, {"label": "E", "text": "Transplant radical nephrectomy", "correct": false}], "correct": ["A", "B", "C"], "rationale": "Most would biopsy the lesion. The decision regarding the use of RFA or NSS depends on locally available\nexpertise. Staging CT did not show any evidence of metastatic spread. He underwent NSS with good\npreservation of renal function. Pathology demonstrated a Fuhrman grade 2 tumour which was completely\nexcised.", "multi": true, "source_images": ["assets/page_037.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q9", "global_num": 66, "source_pages": [37, 38], "stem": "A 63-year-old man received a living donor renal transplant 18 months ago. He is admitted as an\nemergency with clot urinary retention. A three-way urinary catheter is inserted and bladder irrigation was\ncommenced.\nNon-contrast CT demonstrated atrophic native kidneys and a transplant in the left iliac fossa. The renal\npelvis in the native left kidney appeared grossly abnormal, possibly indicating a clot or tumour.\nCystoscopy was normal. Retrograde studies demonstrated a 3cm filling defect within the left native renal\npelvis.\nWhat is your next step?", "options": [{"label": "A", "text": "CT urogram", "correct": false}, {"label": "B", "text": "Flexible ureteroscopy and biopsy", "correct": false}, {"label": "C", "text": "Left native Nephroureterectomy", "correct": true}, {"label": "D", "text": "Urine cytology", "correct": false}, {"label": "E", "text": "Nephroureterectomy of both native upper tracts", "correct": false}], "correct": ["C"], "rationale": "An open left native nephroureterectomy was performed. This demonstrated a grade-2, high grade,\nurothelial carcinoma, stage pT1 N0 M0 with complete excision.Stringent follow-up is planned due to the\nhigh risk of local recurrence, metachronous tumours and distant metastases.", "multi": false, "source_images": ["assets/page_037.jpg", "assets/page_038.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q10", "global_num": 67, "source_pages": [38], "stem": "A 65-year-old man underwent a renal transplant for diabetic nephropathy. His general health has been\ngood. A stent was inserted and removed after a month. Five years later his creatinine rose to 300µmol/L\nand a nephrostomy was inserted. A nephrostogram demonstrated a distal ureteric stricture.\nWhich of the following procedures would be most likely to cure him permanently?", "options": [{"label": "A", "text": "A Boari flap or anastomosis of the bladder to the upper ureter or renal pelvis", "correct": false}, {"label": "B", "text": "A metal stent through the stricture", "correct": false}, {"label": "C", "text": "Anastomosis of the native ureter to the transplant ureter or renal pelvis", "correct": true}, {"label": "D", "text": "Dilatation of the stricture and a stent", "correct": false}, {"label": "E", "text": "Incision of the stricture and a stent", "correct": false}], "correct": ["C"], "rationale": "A Boari flap or anastomosis of the bladder to the upper ureter or renal pelvis is sometimes done as a\npermanent cure but is often technically difficult - the first approach should be anastomosis of the native\nureter to the transplant ureter or renal pelvis.\nMetal stents run the risk of calcification and then become extremely difficult to remove.\nDilatation or incision of the stricture and a stent sometimes work but usually for a limited period of time\nand are unlikely to produce a permanent cure.", "multi": false, "source_images": ["assets/page_038.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q11", "global_num": 68, "source_pages": [38, 39], "stem": "Jane, a 30-year-old teacher, wishes to donate a kidney to her husband Steve. They have one child, a\ntoddler. Jane has no known medical problems and is a non-smoker. Her mother was recently diagnosed\nwith type 2 diabetes. Jane’s BMI is 23kg/m2, her blood pressure is 120/70mmHg and physical examination\nis unremarkable. The urinalysis shows no haematuria or proteinuria. Serum creatinine is 62µmol/L, with\neGFR 104mL/min/1.73m2.\nIn counselling Jane, which one of the following statements is correct?", "options": [{"label": "A", "text": "After donation, Jane is more likely to develop CKD than the general population", "correct": false}, {"label": "B", "text": "After donation, Jane’s risk of CKD is higher than that of her healthy 28-year-old sister", "correct": true}, {"label": "C", "text": "after donation", "correct": false}, {"label": "D", "text": "same as in her first pregnancy", "correct": false}, {"label": "E", "text": "Jane’s family history of diabetes is a contraindication to donation", "correct": false}], "correct": ["B"], "rationale": "Annual urinalysis and blood pressure monitoring is recommended only for the first five years\nIf Jane and Steve decide to have another child after donation, Jane’s risk of pre-eclampsia is the\nEvidence suggests that, after donation, Jane’s risk of CKD is lower than the general population, but higher\nthan healthy matched controls. A family history of diabetes does not exclude Jane, given she has no other\nidentifiable risk factors for developing diabetes. Her risk of pre-eclampsia is predicted to increase in a\npost-donation pregnancy. Annual follow-up of living kidney donors should be lifelong", "multi": false, "source_images": ["assets/page_038.jpg", "assets/page_039.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q12", "global_num": 69, "source_pages": [39], "stem": "Barry is a 53-year-old divorced accountant. He is apprehensive about donating a kidney to his brother,\nwho recently contacted him after a long period of estrangement. He consults you for further advice. Barry\nis overweight, with a BMI of 35. His older sister has type 2 diabetes. You measure Barry’s blood pressure\nat 150/90mmHg. He will have blood tests and urinalysis later today.\nWhich one of the following pieces of advice is correct?", "options": [{"label": "A", "text": "Barry’s blood pressure excludes him from donation", "correct": false}, {"label": "B", "text": "Barry’s relationship with his brother is not relevant to his health after donation", "correct": false}, {"label": "C", "text": "his brother", "correct": false}, {"label": "D", "text": "and progressive renal disease", "correct": true}], "correct": ["D"], "rationale": "Because Barry is obese, and may develop diabetes in the future, donation is contraindicated -\nIf Barry’s blood test shows his eGFR is normal, he should be strongly encouraged to donate to\nThe presence of proteinuria would increase Barry’s predicted long-term risk of cardiovascular\nBaseline proteinuria is associated with increased risk of cardiovascular and progressive renal disease. A\nsingle blood pressure measurement is insufficient to exclude Barry from donation. Longitudinal\nassessment of blood pressure, and non-pharmacological and pharmacological management of\nhypertension are recommended. Barry’s obesity and potential to develop diabetes increase his risk of\nlong-term morbidity, but are not absolute contraindications to donation. Coercion of prospective kidney\ndonors is unethical. Barry’s wellbeing is of paramount concern in this consultation. Psychological health\nafter donation can be adversely impacted by family disharmony and a limited support network.", "multi": false, "source_images": ["assets/page_039.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q13", "global_num": 70, "source_pages": [39], "stem": "Which of the following are true regarding donor nephrectomy?\nHand-assisted donor nephrectomy reduces the operative duration and the warm ischaemic", "options": [{"label": "A", "text": "time (WIT) and has been shown to be clinically beneficial", "correct": false}, {"label": "B", "text": "Removing the right kidney is quicker and the final results are better", "correct": false}, {"label": "C", "text": "blood loss if the surgeon needs to convert due to the time taken to do this", "correct": true}, {"label": "D", "text": "several Cochrane reviews", "correct": true}], "correct": ["C", "D"], "rationale": "Robotic retrieval has ergonomic advantages for the surgeon but there is potential for greater\nThe advantages of laparoscopic surgery over an open approach have been demonstrated in\nHand-assisted donor nephrectomy does reduce the operative duration and the WIT but there is no\nevidence that it makes any difference to the results to the donor or recipient. Right donor nephrectomy is\nusually quicker but there is no difference in outcome to donor or recipient in terms of subsequent\nrecovery or renal function.", "multi": true, "source_images": ["assets/page_039.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q14", "global_num": 71, "source_pages": [39, 40], "stem": "A 55-year-old man wishes to donate one of his kidneys to his wife who is on dialysis. He is in good health\nand the cross matching is compatible, but on screening he was found to have a 3mm stone in the lower\npole of his left kidney. Metabolic screening showed that he was a low-risk stone former.\nWhich of the following statements are correct?\nDonor kidneys containing stones over 4mm are best managed by ex vivo flexible\nureterorenoscopy and lasertripsy with retrieval of stone fragments prior to immediate", "options": [{"label": "A", "text": "transplantation", "correct": true}, {"label": "B", "text": "He cannot still be considered as a donor", "correct": false}, {"label": "C", "text": "It is best not to tell the recipient about the stone as it may cause undue worry", "correct": false}, {"label": "D", "text": "Stones <6mm in size may be left in situ as the risk of complications is low", "correct": false}, {"label": "E", "text": "The kidney without the stone should be used for transplantation", "correct": false}], "correct": ["A"], "rationale": "He can still be considered as a donor.\nThe donor and the recipient should always be told and counselled about the risks and benefits of using a\nkidney with a stone in it.\nStones <4mm in size may be left in situ as the risk of complications is low.\nIn a living donor situation the kidney with the stone should be taken to minimise every possible risk to the\ndonor.", "multi": false, "source_images": ["assets/page_039.jpg", "assets/page_040.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q15", "global_num": 72, "source_pages": [40], "stem": "A 63-year-old man has been found to have a PSA of 7.5ng/mL. DRE finds a slightly enlarged but benign\nfeeling prostate. A year earlier, his PSA was 6.9ng/mL. Approximately five years ago he was a renal\ntransplant recipient and to date he has had no significant problems with his graft. He has mild lower\nurinary tract symptoms but is otherwise asymptomatic. He has stable treated hypertension and\nhypercholesterolemia.\nWhich of the following may be appropriate next management approaches?", "options": [{"label": "A", "text": "Dutasteride either as monotherapy or in combination with an alpha blocker", "correct": false}, {"label": "B", "text": "Multiparametric MRI scan of the prostate", "correct": true}, {"label": "C", "text": "Prostate biomarker test such as prostate health index or PCA3 test", "correct": false}, {"label": "D", "text": "Transperineal grid prostate biopsies", "correct": false}, {"label": "E", "text": "Transrectal ultrasound guided prostate biopsies", "correct": false}], "correct": ["B"], "rationale": "Whilst it is important to consider that life expectancy of renal transplant recipients is less than the general\npopulation, there is no clear evidence that these men should be treated any differently with respect to the\ndiagnostic pathway for prostate cancer.\nBiomarker testing in this man is highly unlikely to alter management.\nDutasteride as a treatment in this man with mild LUTS and potential prostate cancer that has not been\ncharacterised is inappropriate.\nMRI to guide or avoid subsequent biopsy is the preferred option.", "multi": false, "source_images": ["assets/page_040.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q16", "global_num": 73, "source_pages": [40, 41], "stem": "A 59-year-old man is due to undergo renal transplantation surgery. He is worried about his risk for\nprostate cancer as his father had androgen deprivation treatment for prostate cancer for many years until\nhis death from unrelated causes when aged 89 years. His recent PSA was 2.9ng/mL and the with a\nfree-to-total ratio of 26%. His prostate feels normal on DRE.\nWhich of the following statements is true?", "options": [{"label": "A", "text": "A baseline PSMA PET/CT scan should be performed prior to renal transplantation", "correct": false}, {"label": "B", "text": "His chance of having clinically significant prostate cancer is high", "correct": false}, {"label": "C", "text": "a renal transplantation", "correct": false}, {"label": "D", "text": "Prostate biopsy should be undertaken", "correct": false}, {"label": "E", "text": "The free to total ratio in subjects with renal impairment may be unreliable", "correct": true}], "correct": ["E"], "rationale": "His likelihood of developing prostate cancer will be increased as a consequence of undergoing\nFree-to-total ratios in renal failure are often higher than compared to those with normal renal function.\nThe reliability of FTR commonly returns to normal following renal transplantation.\nA family history and high FTR may be contrary to there being a low risk of prostate cancer.\nThe risk of prostate cancer in a renal transplant recipient has not been shown to be necessarily higher\nthan the general population despite immunosuppressive medications.\nThere is no proven benefit for baseline PET/CT scans in any individual at risk for prostate cancer.\nAny indication for prostate biopsy should not be altered by virtue of his candidacy to undergo renal\ntransplantation.", "multi": false, "source_images": ["assets/page_040.jpg", "assets/page_041.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q17", "global_num": 74, "source_pages": [41], "stem": "A 51-year-old male presents to the urology department with a five-week history of intermittent visible\nhaematuria and a slight decline in renal function, with an increase in creatinine from 80µmol/L to\n120µmol/L. He has a medical history of end-stage renal failure due to autosomal dominant polycystic\nkidney disease for which he had a right iliac fossa renal transplant four years previously. Flexible\ncystoscopy revealed a normal bladder. CT urogram revealed no pathology in the native kidneys but a mild\nhydronephrosis and proximal hydroureter in the allograft down to a mid-ureteric filling defect. Urine\ncytology was negative. Ureteroscopy was undertaken successfully and revealed a small papillary tumour,\na biopsy of which was reported as low-grade TCC.\nWhich of the following treatments would be appropriate for this man?", "options": [{"label": "A", "text": "Endoscopic ablation", "correct": true}, {"label": "B", "text": "Instillation of upper tract BCG", "correct": false}, {"label": "C", "text": "Instillation of upper tract mitomycin", "correct": false}, {"label": "D", "text": "Radical nephroureterectomy", "correct": true}, {"label": "E", "text": "Ureterectomy", "correct": true}], "correct": ["A", "D", "E"], "rationale": "This tumour falls into the low-risk category as it is small, solitary, low-grade and superficial. This patient is\ntherefore suitable for renal-sparing treatment. Discussion with the patient must include the risk of cancer\nprogression and the approximate rate of 20% possibility of nephroureterectomy at a later stage in\nnon-immunosuppressed patients who opt for renal-sparing treatment. He would also need to undergo\nregular ureteroscopic and radiological surveillance as recurrence rates have been shown to be almost\n70%in non-transplant patients. The risk of recurrence and progression may be higher in\nimmunosuppressed patients so these risks must be balanced against the morbidity of radical surgery and\ndialysis and a decision made together with the patient.", "multi": true, "source_images": ["assets/page_041.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q18", "global_num": 75, "source_pages": [41, 42], "stem": "A 40-year-old female presents to the urology department with a six-month history of intermittent visible\nhaematuria, right-sided abdominal discomfort and deterioration in renal function from a baseline\ncreatinine of 85µmol/L to 140µmol/L. She has a significant smoking history of 20 pack years and a history\nof end-stage renal failure secondary to polycystic kidney disease for which she had a right iliac fossa renal\ntransplant six years previously.\nFlexible cystoscopy revealed a papillary tumour protruding from the transplant ureter and an otherwise\nnormal bladder. CT urography showed moderate hydronephrosis of the transplant kidney and hydroureter\ndown to a large filling defect in the distal ureter without evidence of invasion through the ureteric wall.\nUrine cytology was positive for high-grade urothelial carcinoma. Ureteroscopy was attempted but could\nnot pass the tumour. Biopsy confirmed high-grade TCC.\nWhich of the following treatments would be appropriate for this woman?", "options": [{"label": "A", "text": "Endoscopic ablation", "correct": false}, {"label": "B", "text": "External beam radiotherapy", "correct": false}, {"label": "C", "text": "Instillation of mitomycin C into the upper tract", "correct": false}, {"label": "D", "text": "Radical nephroureterectomy", "correct": true}, {"label": "E", "text": "Ureterectomy", "correct": true}, {"label": "F", "text": "anastomosis in 1902", "correct": false}, {"label": "G", "text": "in men as well as gluteal and pelvic blood supply", "correct": true}, {"label": "H", "text": "venous anastomosis", "correct": false}, {"label": "I", "text": "The vena cava cannot be used for the venous anastomosis", "correct": false}, {"label": "J", "text": "problem is obstruction at the pelviureteric junction", "correct": false}], "correct": ["D", "E", "G"], "rationale": "This is a high-risk tumour as it is larger than 1cm and is high-grade on biopsy. Radical\nnephroureterectomy would be the ideal treatment from an oncological perspective but this would render\nthe patient dialysis-dependent. Although the patient would be eligible for re-transplantation should the\nTCC be treated successfully, she would be at risk of dialysis-related complications in the interim. As this\ntumour appears to be in the distal ureter only, complete or segmental (distal) ureterectomy with bladder\ncuff excision and re-implantation of the ureter or direct anastomosis of the renal pelvis to the bladder may\nbe a more attractive option, accepting the risk of local recurrence. This tumour is not suitable for\nendoscopic ablation due to the high risk of cancer progression and risk of understaging the tumour.\nWhich of the following statements are correct with regard to renal transplant surgery?\nCarrel described a 4-point anastomosis technique for an end-to-end allograft arterial\nEnd-to-side anastomosis of the renal artery to the external or common iliac artery is most\nfrequently used, allowing preservation of the internal iliac artery in order to preserve potency\nThe arterial anastomosis to the common or external iliac artery is always performed before the\nUreteric reimplanation has a variable complication rate of around 5%, and the most common\nCarrel described a 3-point anastomosis technique.\nThe venous anastomosis is always performed before the venous anastomosis to minimise the clamp time\non the iliac artery and minimise ischaemia to the leg.\nThe complication rate of ureteric reimplantation is around 5% (varying in the literature between 1 and\n30%) but the commonest problem is obstruction at the ureterovesical junction due to ischaemia. In the\ntransplanted kidney the blood supply to the ureter is entirely dependent on the ureteric branches of the\nrenal artery which is why the adventitia surrounding the ureter should be preserved and as short a length\nof ureter as possible used.", "multi": true, "source_images": ["assets/page_041.jpg", "assets/page_042.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q19", "global_num": 76, "source_pages": [42, 43], "stem": "A 65-year-old man with end-stage renal failure, but no other comorbidities, is on dialysis but still\nproducing 1 litre of urine a day. He has quite marked lower urinary symptoms despite being on alpha\nblockers for the last two years. His PSA is 1.9, prostate volume >50mL, IPSS 10, maximum flow rate\n(Qmax) of < 9mL/s and post-void residual 200mL.\nWhich of the following are true?", "options": [{"label": "A", "text": "He would benefit from bladder outflow tract surgery", "correct": true}, {"label": "B", "text": "He would benefit from video urodynamics before any intervention", "correct": false}, {"label": "C", "text": "bladder neck stenosis or urethral stricture in some patients", "correct": true}, {"label": "D", "text": "Prostatic surgery can wait until after his transplant", "correct": true}, {"label": "E", "text": "self-catheterisation for his retention", "correct": false}], "correct": ["A", "C", "D"], "rationale": "Prostatic surgery can be done before his transplant but may result in a higher incidence of\nProstate surgery is too risky in transplant patients and he should be taught intermittent\nHe would benefit from prostatic surgery.\nVideo urodynamics may be of use in certain patients where there is doubt about obstruction and the need\nfor intervention. In the scenario described it is unnecessary.\nHe is still producing a reasonable amount of urine a day. The incidence of bladder neck stenosis and\nurethral stricture increase if urine volumes are small.\nProstate surgery can be done before or after transplant.\nIntermittent self-catheterisation is acceptable in transplant patients in certain circumstances. There is no\nincreased risk to the transplant, but in this situation a TURP or equivalent procedure would be the best\noption.", "multi": true, "source_images": ["assets/page_042.jpg", "assets/page_043.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q20", "global_num": 77, "source_pages": [43], "stem": "A 35-year-old man had a renal transplant for end-stage renal failure of unknown cause. He is otherwise\nvery well and plays tennis at a semi-professional level. His creatinine is normal, and he still has both\nnative kidneys in situ. A 2.5cm mass has been found on ultrasound in the upper pole of his transplant\nkidney.\nWhich of the following are true?", "options": [{"label": "A", "text": "A triple phase CT scan should be carried out to further clarify the lesion", "correct": true}, {"label": "B", "text": "Biopsy is not indicated if the CT scan suggest it is malignant", "correct": false}, {"label": "C", "text": "If malignant, a partial nephrectomy can be performed", "correct": true}, {"label": "D", "text": "If malignant, a transplant nephrectomy should be performed", "correct": false}, {"label": "E", "text": "Immunotherapy does not need to be altered", "correct": true}], "correct": ["A", "C", "E"], "rationale": "A triple phase CT should be performed and if the lesion is suspicious a biopsy should be performed.For a\nsmall tumour partial nephrectomy is a sensible option which, if successful, will keep the patient off\ndialysis.\nImmunosuppression does not need to be altered. There is no strong evidence that it alters the prognosis\nand it may compromise the kidney if it is reduced.", "multi": true, "source_images": ["assets/page_043.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q21", "global_num": 78, "source_pages": [43], "stem": "A 45-year-old woman underwent a renal transplant for diabetic nephropathy. Her general health has been\ngood. A stent was inserted and removed after a month. Six months later she suddenly became anuric with\nvague abdominal pain and her creatinine rose to 300μmol/L. Ultrasound demonstrated hydronephrosis\nand a nephrostomy was inserted. A non-contrast CT scan demonstrated a stone in the mid ureter.\nWhich of the following statements are correct?", "options": [{"label": "A", "text": "ESWL is often difficult due to fibrosis surrounding the transplant", "correct": false}, {"label": "B", "text": "Percutanous nephrolithotomy is often necessary in stones >2cm", "correct": true}, {"label": "C", "text": "Retrograde stenting is usually easier than antegrade stenting", "correct": false}, {"label": "D", "text": "The stone could have been in the donor kidney at the time of transplant", "correct": true}, {"label": "E", "text": "Ureteroscopy, either antegrade or retrograde, has a 60% success rate", "correct": true}], "correct": ["B", "D", "E"], "rationale": "ESWL is often effective with stones <2cm.\nRetrograde stenting is often very difficult due to access to the transplant ureteric orifice.", "multi": true, "source_images": ["assets/page_043.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q22", "global_num": 79, "source_pages": [43, 44], "stem": "A 55-year-old woman with a BMI of 28 wishes to donate a kidney to her brother. Her blood pressure is\n160/95 when seen in the clinic, but she says her blood pressure always goes up when she sees doctors.\nShe is currently on no medication.\nWhich of the following are NOT correct?\nShe may be acceptable as a donor with a blood pressure below 140/85 and no signs of end", "options": [{"label": "A", "text": "organ damage", "correct": true}, {"label": "B", "text": "She should be encouraged to lose weight", "correct": true}, {"label": "C", "text": "She should have 24-hour ambulatory blood pressure monitoring (ABPM)", "correct": true}, {"label": "D", "text": "She may be acceptable as a donor if ABPM showed a mean blood pressure of 135/85", "correct": false}], "correct": ["A", "B", "C"], "rationale": "She may be acceptable as a donor with just 1– or 2 blood pressure controlling medications -\ncorrect\nDonation may well be possible with less than three medications, a well controlled blood pressure below\n140/85 and no end organ damage. Weight loss should be encouraged for those with a high BMI.\nDonors who were initially considered to be hypertensive in clinic have been found to have acceptable\nblood pressure when measured using ABPM.\nBritish and European guidelines define hypertension using ABPM as a 24-hour mean blood pressure\ngreater than 125/80mmHg, whereas American guidelines define it as a waking blood pressure above\n135/85mmHg, and above 120/75mmHg while sleeping.", "multi": true, "source_images": ["assets/page_043.jpg", "assets/page_044.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q23", "global_num": 80, "source_pages": [44], "stem": "A 57-year-old woman had a renal transplant five years ago. Her maintenance immunosuppressive regime\nincludes prednisolone, tacrolimus and azathioprine. Her allograft function was good, as reflected by a\nserum creatinine of 90 µmol/L (eGFR 59 mL/min/1.73m2). Because of recurrent chest infections she was\ntreated with a two week course of clarithromycin. When she attends the transplant clinic, although well,\nher transplant function has acutely deteriorated with a rise in creatinine to 181 µmol/L.\nWhich of the following is the most likely explanation for the rise in creatinine?", "options": [{"label": "A", "text": "Acute rejection", "correct": false}, {"label": "B", "text": "Acute tacrolimus nephrotoxicity", "correct": true}, {"label": "C", "text": "Azathioprine nephrotoxicity", "correct": false}, {"label": "D", "text": "Sepsis", "correct": false}, {"label": "E", "text": "Urinary tract obstruction from crystalluria", "correct": false}], "correct": ["B"], "rationale": "Acute nephrotoxicity from tacrolimus is the likeliest explanation.\nThe antibiotic clarithromycin is an inhibitor of the CYP3A4 cytochrome P450 enzyme and the\nP-glycoprotein transport protein. Tacrolimus is metabolised by these systems, and concomitant use of\nclarithromycin results in an acute rise in tacrolimus level potentially resulting in nephrotoxicity.\nDose adjustment with monitoring is required during the use of a known metabolic inhibitor, although\ncomplete avoidance of such agents is preferred whenever possible.\nCrystalluria has been reported with ciprofloxacin use, but not clarithromycin. Aazathioprine can affect\nrenal function but unlikely to be the cause in this situation.\nAzathioprine can affect renal function but unlikely to be the cause in this situation.", "multi": false, "source_images": ["assets/page_044.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q24", "global_num": 81, "source_pages": [44], "stem": "A 57-year-old woman had a renal transplant five years ago. Her maintenance immunosuppressive regime\nincludes prednisolone, tacrolimus and azathioprine. Her allograft function was is good, as reflected by a\nserum creatinine of 90 µmol/L (eGFR 59 mL/min/1.73m2). She has an acute episode of gout which is\ntreated with colchicine, then allopurinol is added to prevent further attacks. After two further months,\nroutine blood tests reveal serum creatinine 95 µmol/L (eGFR 56 mL/min/1.73m2), Hb 80 g/L, WBC 1.0,\nplatelet count 50, MCV 110.\nWhat is the cause of her bone marrow suppression?", "options": [{"label": "A", "text": "Myelodysplasia", "correct": false}, {"label": "B", "text": "Passenger lymphocyte mediated acute haemolytic anaemia", "correct": false}, {"label": "C", "text": "Sepsis", "correct": false}, {"label": "D", "text": "The combination of azathioprine and allopurinol", "correct": true}, {"label": "E", "text": "The combination of azathioprine and colchicine", "correct": false}], "correct": ["D"], "rationale": "Azathioprine is metabolised in part by xanthine oxidase, which is inhibited by the concomitant use of\nallopurinol and febuxostat, agents commonly used in the prevention of gout. These drugs should\ntherefore be avoided or used with great caution in patients treated with azathioprine to avoid\nazathioprine-induced marrow suppression.", "multi": false, "source_images": ["assets/page_044.jpg"]}, {"section": "III. Transplant and Nephrology", "orig": "Q25", "global_num": 82, "source_pages": [45], "stem": "A 55-year-old man with polycystic kidney disease has recently been established on peritoneal dialysis and\nis awaiting a renal transplant.\nWhich of the following statements are correct?\nA small suspicious mass in a polycystic kidney could be removed by partial nephrectomy", "options": [{"label": "A", "text": "before a transplant", "correct": false}, {"label": "B", "text": "Bleeding would be more likely in this patient", "correct": false}, {"label": "C", "text": "access for the transplant", "correct": false}, {"label": "D", "text": "With bilateral nephrectomy, steroid replacement should be considered", "correct": true}], "correct": ["D"], "rationale": "If the patient needs dialysis after surgery, peritoneal dialysis would be the method of choice -\nThe need for unilateral polycystic nephrectomy before transplant is commonly needed to allow\nSuspicious masses in a polycystic kidney should be removed by radical nephrectomy before\ntransplantation due to the risk of malignancy.\nBleeding may be more like in patients on haemodialysis but not peritoneal dialysis.\nSurgery may render peritoneal dialysis less effective requiring conversion to haemodialysis.\nIt is not usually necessary to remove a polycystic kidney before transplant.\nBilateral nephrectomy or nephrectomy in a solitary kidney runs the risk of adrenal insufficiency and this\nmust be looked at carefully and if the adrenals have been removed steroid replacement given.", "multi": false, "source_images": ["assets/page_045.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q1", "global_num": 83, "source_pages": [50], "stem": "A 25-year-old man has sustained a C6-7 fracture dislocation as a result of diving into the shallow end of\nthe local swimming pool. This has resulted in complete spinal cord transection. When assessed in the\naccident and emergency department an hour later, which of the following statements is most likely to be\ntrue?", "options": [{"label": "A", "text": "He is unlikely to require intubation and ventilator support in the short term", "correct": false}, {"label": "B", "text": "future erectile function", "correct": false}, {"label": "C", "text": "He will be at risk of autonomic dysreflexia if not catheterised", "correct": false}, {"label": "D", "text": "His blood pressure is likely to be low and pulse rate high due to spinal shock", "correct": false}, {"label": "E", "text": "video urodynamics", "correct": true}, {"label": "F", "text": "increased risk of UTI and bladder stone formation", "correct": false}, {"label": "G", "text": "and renal failure", "correct": false}, {"label": "H", "text": "phase", "correct": false}, {"label": "I", "text": "bladder", "correct": false}], "correct": ["E"], "rationale": "He may have a high-flow priapism that will spontaneously resolve and not adversely affect\nHis initial management should include catheterisation either by urethral or suprapubic routes -\ncorrect\nHe is at risk of loss of abdominal and chest wall muscle function, ascending cord oedema affecting the\nphrenic nerve (C3-5) and diaphragm, together with atelectasis, absent cough reflex, and potential fluid\noverload. These all make respiratory compromise the primary immediate clinical problem and respiratory\nsupport may be needed.\nHe will be at risk of autonomic dysreflexia once he has recovered from spinal shock but this will not be the\ncase for several weeks or months after his injury.\nHypotension and bradycardia are likely, due to loss of sympathetic vascular tone and unopposed vagal\nactivity.\nWhich one of the following statements is most likely to be correct for a patient during the\nrecovery phase of spinal shock following complete cervical cord transection?\nBaseline investigations during recovery phase should include ultrasound, serum U&Es and\nClean intermittent catheterisation (CIC) should be avoided within the first two weeks due to the\nDetrusor sphincter dysynergia (DSD) in combination with detrusor overactivity and a detrusor\nleak point pressure (DLPP) >20cmH2O is known to be a risk factor for reflux, hydronephrosis\nGiven the level of injury, autonomic dysreflexia is unlikely to develop during the recovery\nThis patient’s video urodynamics would be expected to show a hypocontracile or acontractile", "multi": false, "source_images": ["assets/page_050.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q2", "global_num": 84, "source_pages": [50, 51], "stem": "CIC is preferred and should be commenced once patient is stable and with <2L urine output per day.\nDLPP >40cmH2O is a risk factor for reflux, hydronephrosis and renal failure.\nAs the injury is above T6 there should be vigilance for autonomic dysreflexia.\nThe injury is suprascral therefore DSD and overactivity should be expected.\nA 45-year-old man is brought to the emergency room having fallen off his motorbike at high speed\nsustaining a right flank injury. A CT scan demonstrates a grade 4 renal injury.\nWhich of the following statements is correct?\nA 2cm laceration with a large perinephric haematoma would be classified as a grade 4 injury -", "options": [{"label": "A", "text": "Contrast-enhanced MRI provides the best imaging in renal trauma", "correct": false}, {"label": "B", "text": "Renal injuries are seen in a quarter of cases of abdominal injury", "correct": false}, {"label": "C", "text": "conservatively with a stent", "correct": true}], "correct": ["C"], "rationale": "Severe isolated collecting system injury in isolation may often be successfully managed\nTo see urine extravasation on CT images the imaging may need to be delayed for five minutes\n- incorrect\nFor grade 4 there needs to be collecting system involvement and/or main renal artery/vein injury.\nRenal injuries are seen in about 10% of abdominal injuries.\nThe timing of excretory phase may need to be delayed for 10 to 20 mins to allow urinary extravasation to\nbe visualised.", "multi": false, "source_images": ["assets/page_050.jpg", "assets/page_051.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q3", "global_num": 85, "source_pages": [51], "stem": "A 32-year-old male is brought into the emergency room a following a blunt right loin injury sustained in a\nmotor vehicle accident. On arrival he is normotensive and does not have visible haematuria.\nWhich of the following considerations in the management of the patient are correct?", "options": [{"label": "A", "text": "A CT scan would be the preferred imaging modality if he became hypotensive", "correct": true}, {"label": "B", "text": "He is likely to require surgical intervention", "correct": false}, {"label": "C", "text": "Hypertension is a common late complication of renal trauma", "correct": false}, {"label": "D", "text": "The absence of visible haematuria excludes major renal injury", "correct": false}], "correct": ["A"], "rationale": "Investigations should be carried out to exclude an arteriovenous fistula and pseudoaneurysm -\nArteriovenous fistulae and pseudoaneurysms are more commonly seen with penetrating rather than blunt\ninjury.\nBlunt renal injury is almost always managed conservatively.\nHypertension as a late complication of renal trauma is seen in about 5% of cases at most.\nMajor renal vessel injury can be seen in the absence of haematuria.", "multi": false, "source_images": ["assets/page_051.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q4", "global_num": 86, "source_pages": [51], "stem": "In patients with post-obstructive diuresis, which of the following factors has been shown to be predictive\nof poor recovery of renal function?", "options": [{"label": "A", "text": "High blood haemoglobin", "correct": false}, {"label": "B", "text": "High diuresis in the first 24 hours", "correct": false}, {"label": "C", "text": "Low serum bicarbonate", "correct": true}, {"label": "D", "text": "Low urinary sodium", "correct": false}, {"label": "E", "text": "Short duration of time to release of obstruction", "correct": false}], "correct": ["C"], "rationale": "Of these parameters only low serum bicarbonate has been associated with a poor recovery of renal\nfunction.", "multi": false, "source_images": ["assets/page_051.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q5", "global_num": 87, "source_pages": [51, 52], "stem": "A 72-year-old female presented to the emergency department with left flank pain. She had been treated\nfor an E. Coli UTI by her general practitioner for the preceding two weeks. On arrival she was hypotensive,\ntachycardic, hypothermic (34°C) and had left flank tenderness. On further evaluation she was found to\nhave leucocytosis of 11.2 and elevated CRP (136mg/L) and creatinine (300mmol/L). Her platelets were\nreduced (41 x109/L) and INR was normal.\nHer past medical history was significant for hypertension and included colectomy with end ileostomy for\nulcerative colitis. Two weeks prior to admission she had an episode of coagulopathy with epistaxis and a\nbleed from a peri-anal fissure. Blood and urine cultures were taken.\nA non-contrast CT revealed a left ureteropelvic stone, 1.3cm x 2cm in size (see Fig. 1).\nFig. 1 Non-contrast CT KUB, axial view, demonstrating the left ureteropelvic stone.\nHow should this patient have been initially managed in the emergency department?", "options": [{"label": "A", "text": "Booked for lithotripsy on the next available list", "correct": false}, {"label": "B", "text": "Booked for ureterolithotomy", "correct": false}, {"label": "C", "text": "Brought immediately to the operating room for insertion of a JJ stent", "correct": false}, {"label": "D", "text": "Resuscitated with IV fluids and antibiotics", "correct": true}], "correct": ["D"], "rationale": "Brought immediately to the interventional radiology suite for insertion of a nephrostomy -\nThis lady has several signs of sepsis and immediate resuscitation and stabilisation is the priority before\nfurther investigation or treatment.", "multi": false, "source_images": ["assets/page_051.jpg", "assets/page_052.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q6", "global_num": 88, "source_pages": [52], "stem": "Which of the following is NOT a consideration when selecting the choice of kidney drainage for patients\nwith infected obstructed kidneys?", "options": [{"label": "A", "text": "Access to interventional radiology", "correct": false}, {"label": "B", "text": "The patient's haemodynamic status", "correct": false}, {"label": "C", "text": "The patient’s level of leucocytosis", "correct": true}, {"label": "D", "text": "The patient's platelet count", "correct": false}, {"label": "E", "text": "The use of anticoagulants", "correct": false}], "correct": ["C"], "rationale": "Access to expert interventional radiology may well have a bearing on the treatment, as well the decision\nto transfer a patient to a neighbouring hospital.\nAdequate resuscitation should be undertaken prior to intervention, but if this is proving difficult then\npercutaneous drainage under local anaesthetic is preferred.\nThe level of leucocytosis does not have a bearing on whether percutaneous or retrograde drainage is\nundertaken.\nIn presence of thrombocytopaenia, percutaneous drainage is less likely to be favoured.\nPercutaneous drainage would not be favoured in anticoagulated patients\n14", "multi": false, "source_images": ["assets/page_052.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q7", "global_num": 89, "source_pages": [52, 53], "stem": "A 78-year-old man has routine blood tests performed at the general practitioner surgery. Results show a\ncreatinine of 750µmol/L and an eGFR of 18mL/min/1.73m2. He denies any LUTS, but on direct questioning\nreports recent onset nighttime incontinence. On examination he has a bladder which is dull to percussion\nto above the umbilicus.\nWhich of the following statements is correct?\nA delayed trial without catheter (TWOC) could be considered as a management option -", "options": [{"label": "A", "text": "Catheterisation is not indicated for this patient", "correct": false}, {"label": "B", "text": "symptoms", "correct": false}, {"label": "C", "text": "patients", "correct": false}, {"label": "D", "text": "Upper urinary tract ultrasound imaging should be arranged", "correct": true}], "correct": ["D"], "rationale": "Conservative management with follow-up in the clinic could be considered as he has few\nPost-obstructive diuresis should be managed by intravenous fluid replacement in almost all\nThis patient has high-pressure chronic retention with associated renal impairment and should have\nprompt bladder drainage. Patients frequently report minimal LUTS. An ultrasound would be indicated to\nassess for upper tract dilatation. Management options include long-term catheterisation or bladder\noutflow surgery.\nThe patient has a high chance of developing clinically detectable post-obstructive diuresis, although all\npatients with HPCR will have increased salt and water excretion which may result in improvements in\nblood pressure parameters and resolution of peripheral oedema/fluid overload.", "multi": false, "source_images": ["assets/page_052.jpg", "assets/page_053.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q8", "global_num": 90, "source_pages": [53], "stem": "An 85-year-old man is referred to the urology outpatient clinic as an abdominal US scan performed for\ninvestigation of gallstones has shown an incidental finding of 1200mL urine in the bladder with no\nhydronephrosis. He reports only mild non-bothersome LUTS (IPSS score 7) and has no history of urinary\ntract infection or haematuria. His renal function blood tests are within normal limits and urinalysis is\nnormal.\nWhich of the following statements is correct?", "options": [{"label": "A", "text": "A residual of 4L would be associated with impaired renal function", "correct": false}, {"label": "B", "text": "surgery for LUTS alone", "correct": true}, {"label": "C", "text": "He should be catheterised", "correct": false}, {"label": "D", "text": "Recurrent urinary tract infections would not be an indication for surgery", "correct": false}, {"label": "E", "text": "Surgery is contraindicated in urodynamic-proven detrusor underactivity", "correct": false}], "correct": ["B"], "rationale": "He has a higher chance of failing to void following TURP compared to a patient undergoing\nA conservative approach can be considered if the patient has few or minimal urinary symptoms in the\ncontext of normal renal function. Outpatient follow-up and repeat assessment of post-void residual (PVR)\nvolume would be appropriate. Other management options could include clean intermittent catheterisation\nor surgery for presumed bladder outlet obstruction (+/- preoperative urodynamic assessment and\nappropriate patient counselling) if the patient has bothersome symptoms. Clinical management should be\npatient-specific after careful discussion.", "multi": false, "source_images": ["assets/page_053.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q9", "global_num": 91, "source_pages": [53, 54], "stem": "A 27-year-old woman is referred to the assessment unit for suspected pyelonephritis. She saw her GP with\ncystitis three days before and was started on empirical nitrofurantoin. She complains of feeling hot and\nshivery with pain in her right flank but is apyrexial.\nWhat should she be investigated with?", "options": [{"label": "A", "text": "Urine culture, abdominal x-ray and serum creatinine", "correct": false}, {"label": "B", "text": "Urine dip, serum creatinine and urgent CT with contrast", "correct": false}, {"label": "C", "text": "Urine dip, urine and blood cultures, serum creatinine and urgent US KUB", "correct": false}, {"label": "D", "text": "Urine dip, urine culture and non-contrast CT", "correct": false}, {"label": "E", "text": "Urine dip, urine culture and serum creatinine initially", "correct": true}], "correct": ["E"], "rationale": "Urine dip, culture and serum creatinine will guide initial management. Imaging does not need to be\nperformed unless there is evidence of renal impairment, or if her condition does not improve or worsens\nafter empirical treatment. This is in order to exclude obstructive causes which require urgent radiological\nor surgical intervention", "multi": false, "source_images": ["assets/page_053.jpg", "assets/page_054.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q10", "global_num": 92, "source_pages": [54], "stem": "A three-year-old boy is admitted with lethargy, fever and general malaise. He responds well to IV fluid\nresuscitation and antibiotics and makes a full recovery. Urine cultures confirm a urinary infection and an\nultrasound scan shows bilateral hydronephrosis.\nWhich is the most appropriate investigation?", "options": [{"label": "A", "text": "Direct MAG3 isotope cystogram", "correct": false}, {"label": "B", "text": "Indirect MAG3 isotope cystogram", "correct": false}, {"label": "C", "text": "Micturating cystourethrogram (MCUG)", "correct": true}, {"label": "D", "text": "MRI", "correct": false}, {"label": "E", "text": "Ultrasound scan", "correct": false}], "correct": ["C"], "rationale": "In a young boy with a febrile UTI, follow-up imaging should be performed to investigate for possible\ncongenital problems or vesico-ureteric reflux.", "multi": false, "source_images": ["assets/page_054.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q11", "global_num": 93, "source_pages": [54], "stem": "A 30-year-old pregnant woman (approximately 4 months) is found to have symptomatic pyuria with\n100,000 col/mL of E. coli.\nIf untreated, acute pyelonephritis at some time during the remainder of the pregnancy is likely in what\npercentage of patients?", "options": [{"label": "A", "text": "0%", "correct": false}, {"label": "B", "text": "10–20%", "correct": false}, {"label": "C", "text": "30–40%", "correct": true}, {"label": "D", "text": "50%", "correct": false}, {"label": "E", "text": ">75%", "correct": false}], "correct": ["C"], "rationale": "30–40% of untreated bacteriuria will progress to pyelonephritis in pregnant women versus 3–4% of\nnon-pregnant women. Acute pyelonephritis can cause premature birth and low birthweight.", "multi": false, "source_images": ["assets/page_054.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q12", "global_num": 94, "source_pages": [54, 55], "stem": "A 48-year-old diabetic lady is admitted with loin pain, nausea and fever. A CT scan is reported as showing\nemphysematous pyelonephritis.\nWhich of the following statements regarding emphysematous pyelonephritis is correct?", "options": [{"label": "A", "text": "If there is a treatable ureteric obstruction, survival is less good", "correct": false}, {"label": "B", "text": "Perinephric extension of gas would be classified as class 2", "correct": false}, {"label": "C", "text": "The likely infecting organism is Proteus", "correct": false}, {"label": "D", "text": "These patients often present with pneumaturia", "correct": false}], "correct": [], "rationale": "Nephrectomy is likely to be necessary if there is a significant amount of infarcted renal tissue -\ncorrect\nIf there is demonstrable ureteric obstruction which can be relieved then survival is improved.\nEarly nephrectomy may provide the best management outcome for fulminant disease.\nClass 2 is defined as gas confined to the renal parenchyma.\nE.coli is the most common pathogen cultured from urine, accounting for 70% of cases.\nPneumaturia is rare unless associated with emphysematous cystitis.", "multi": false, "source_images": ["assets/page_054.jpg", "assets/page_055.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q13", "global_num": 95, "source_pages": [55], "stem": "A 60-year-old woman came into the clinic for the evaluation of one month of anorexia, weight loss,\ndysuria, and intermittent flank pain. Her past medical history was significant for recurrent urinary tract\ninfections. She also had a history of right renal calculi 10 years ago and underwent a percutaneous\nnephrolithotomy at that time. Physical examination revealed mild right flank tenderness but no\ntenderness in the abdomen.\nMost recent complete blood count revealed white blood cell count of 11,400 cells/mm3 and hematocrit of\n10.5g/dL. Her urine analysis was positive for leucocyte esterase and pyuria. Urine culture was negative.\nHer estimated glomerula
