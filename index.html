ne culture testing so that the\npatient can start the appropriate antibiotic therapy, e.g. IV ciprofloxacin, cefotaxime or", "multi": false, "source_images": ["assets/page_081.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q9", "global_num": 145, "source_pages": [81, 82], "stem": "A 48-year-old woman is seen in the outpatient clinic with recurrent urinary tract infections. She has\nsuffered from this problem for approximately 10 years, and has recently returned to the UK after working\nin east Asia for five years.\nShe presents with lower urinary tract symptoms and has self-medicated in the past to control infections.\nAn MSU reveals E. coli with pyuria resistant to ampicillin, co-amoxiclav, trimethoprim, cephalosporins and\nciprofloxacin. Renal tract imaging has revealed no significant abnormality, and a cystoscopy three months\nearlier was also normal.\nWhat is the best management of this patient?", "options": [{"label": "A", "text": "If the patient is not pyrexial, recommend intravesical hyaluronate sodium", "correct": false}, {"label": "B", "text": "Prescribe three months of nitrofurantoin", "correct": false}, {"label": "C", "text": "carbapenam", "correct": false}], "correct": [], "rationale": "Intravesical cystistat may have a role in recurrent urinary tract infections by restoring the GAG layer, but\ninstrumentation in the face of active infection is not advised, as the risk of bacteraemia is increased.\nObtain an antibiotic history, request extended sensitivities and consider single-dose fosfomycin\n- correct\nThe confirmation of sensitivity to fosfomycin is essential and single-dose treatments prescribed.\nIndiscriminate antibiotic usage is a major cause of development of antibiotic resistance.\nInitially sensitivity to nitrofurantoin should be sought, and if sensitive, a seven-day course prescribed. An\nextended period of treatment with suppressive dosage may be considered, but too prolonged a course of\nantibiotic therapy increases the risk of the development of resistance.\nRequest extended sensitivities and arrange admission for a seven day course of i.v.", "multi": false, "source_images": ["assets/page_081.jpg", "assets/page_082.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q10", "global_num": 146, "source_pages": [82], "stem": "If the patient is not systemically unwell then oral therapies are preferred. Intravenous therapy should be\nreserved for patients who are systemically unwell, or who develop symptomatic recurrence after oral\ntherapy with an agent to which the infecting organism is sensitive.\nA 70-year-old male presents in your outpatient clinic with generalised weakness, malaise, night sweats\nand mild grade fever for the last 3 weeks. Physical examination gives normal findings. On blood tests his\nrenal functions are normal, but white cells and platelets are elevated. A contrast-enhanced CT scan report\nmentions a right renal lesion 5cm in size, with thick enhancing borders and a liquified necrotic centre.\nThere is perinephric fat stranding.\nWhat will you tell the patient?", "options": [{"label": "A", "text": "He has a renal abscess and needs drainage", "correct": false}, {"label": "B", "text": "He has renal cancer and needs a partial nephrectomy", "correct": false}, {"label": "C", "text": "He has renal cancer and needs a radical nephrectomy", "correct": false}, {"label": "D", "text": "He needs a PET scan", "correct": false}, {"label": "E", "text": "You will take the case to MDT discussion and discuss a possible biopsy", "correct": true}], "correct": ["E"], "rationale": "Renal abscess has been a traditional indication for a possible role of renal biopsy. Fever, elevated white\ncells and platelets can be seen in both abscess and renal cell carcinoma. Enhancing walls and necrotic\ncentre and even perinephric fat stranding are common findings in both. This is a case which requires MDT\ndiscussion with the experts of radiology and should be considered for a biopsy from the renal mass.", "multi": false, "source_images": ["assets/page_082.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q11", "global_num": 147, "source_pages": [82, 83], "stem": "A 19-year-old man presents with a 48-hour history of unilateral scrotal pain and swelling, associated with\npenile discharge. He is systemically well and afebrile. He reports a recent history of unprotected sexual\nintercourse.\nWhat would be the most appropriate antibiotic regimen for him?", "options": [{"label": "A", "text": "10 days of ciprofloxacin 500mg twice daily", "correct": false}, {"label": "B", "text": "10 days of co-amoxiclav 625mg three times daily", "correct": false}, {"label": "C", "text": "initial dose followed by 100mg for 14 days in total", "correct": false}, {"label": "D", "text": "followed by 100mg for 14 days in total", "correct": true}], "correct": ["D"], "rationale": "14 day course of co-amoxiclav 625mg three times a day combined with doxycycline 200mg\nSingle dose ceftriaxone 500mg intramuscularly, combined with doxycycline 200mg initial dose\nHistory clearly states a young patient with penile discharge that would raise the likelihood of a\ngonorrhoeal infection and would require a referral to the sexual health clinic.", "multi": false, "source_images": ["assets/page_082.jpg", "assets/page_083.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q12", "global_num": 148, "source_pages": [83], "stem": "A 75-year-old man with a week-long history of worsening lower urinary tract symptoms and scrotal\nswelling and erythema presents to Accident and Emergency. He is found to be febrile, hypotensive and\ntachycardic.\nWhich organism is most likely to be causing his symptoms?", "options": [{"label": "A", "text": "Neisseria gonorrhoea", "correct": false}, {"label": "B", "text": "Pseudomonas aeruginosa", "correct": true}, {"label": "C", "text": "Staphylococcus epidermis", "correct": false}, {"label": "D", "text": "Chlamydia trachomatis", "correct": false}], "correct": ["B"], "rationale": "Given the patient’s age, he is unlikely to have an STI, and Staphylococcus epidermis is a skin pathogen\nand is therefore unlikely to be the causative organism. Pseudomonas is associated with bladder outflow\nobstruction and can lead to patients becoming systemically unwell.\nAnother likely option is Escherichia coli.", "multi": false, "source_images": ["assets/page_083.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q13", "global_num": 149, "source_pages": [83], "stem": "A 32-year-old patient with a T11 spinal cord injury following a motorcycle accident one year previously is\nseen in hospital as an emergency with a fever. His bladder has been managed with an indwelling urethral\ncatheter.\nWhich of the statements below is correct in regard to the management of this patient?\nAfter his infections has resolved the incidence of recurrent infections would be reduced if he", "options": [{"label": "A", "text": "was switched to intermittent self catheterisation", "correct": true}, {"label": "B", "text": "The patient is at risk of increased spasticity and autonomic dysfunction", "correct": false}, {"label": "C", "text": "encountered. Oral ciprofloxacin is the treatment of choice", "correct": false}], "correct": ["A"], "rationale": "The greatest risk of urinary tract infection is associated with an indwelling urethral catheter and\nintermittent self catheterisation reduces that risk.\nIncreased spasticity and autonomic dysfunction is usually seen in patients with spinal cord injuries higher\nthan T6.\nThe patient should be advised to use cranberry tablets to reduce the risk of future infections -\nThere is poor evidence on meta-analysis of the literature for a role of cranberry products.\nUrinary tract infection is probably due to Proteus spp, the organism most commonly\nE. coli is the most common infecting organism. Although Proteus spp. may be sensitive to ciprofloxacin,\nwhen patients present with fever intravenous antibiotics are preferred.", "multi": false, "source_images": ["assets/page_083.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q14", "global_num": 150, "source_pages": [83, 84], "stem": "A patient is presenting with a clear discharge and dysuria. He does not have frequency or urgency.\nWhich tests could you offer in your outpatient clinic to help guide your diagnosis if the patient does not\nwant to attend a sexual health clinic?", "options": [{"label": "A", "text": "A dipstick urinalysis of a FVU followed by a urethral swab for gonococcal culture", "correct": false}, {"label": "B", "text": "followed by a urethral swab for gonococcal culture", "correct": false}, {"label": "C", "text": "testing for chlamydia and gonorrhoea", "correct": true}, {"label": "D", "text": "Flow rate and measurement of post-micturition residual volume", "correct": false}, {"label": "E", "text": "Urethral swab for chlamydial and gonococcal culture followed by an MSU for MCS", "correct": false}], "correct": ["C"], "rationale": "An FVU sample for chlamydia and gonorrhoea testing, urinalysis of a FVU and MSU sample,\nExamination for presence of a urethral discharge, a urethral swab for gonococcal culture,\nfollowed by an FVU sample for urinalysis, assessment for presence of threads, and NAAT\nThese investigations would only be necessary if the patient complained of poor flow, post-micturition\ndribbling and/or spraying which might indicate a urethral stricture.\nMSU only necessary if leukocyte esterase and nitrites positive.", "multi": false, "source_images": ["assets/page_083.jpg", "assets/page_084.jpg"]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('quizdata').textContent);
const questions = DATA.questions || [];
const storageKey = 'bjui_basic_fixed_progress_v2';
let progress = JSON.parse(localStorage.getItem(storageKey) || '{}');
let currentSection = 'all';

function esc(s) {
  return (s || '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function save() {
  localStorage.setItem(storageKey, JSON.stringify(progress));
  updateStats();
}

function selectedFor(qid) {
  return [...document.querySelectorAll(`input[name="q${qid}"]:checked`)].map(x => x.value).sort();
}

function correctFor(q) {
  return [...new Set((q.correct || []).filter(Boolean))].sort();
}

function arraysEqual(a,b) {
  return a.length === b.length && a.every((v,i) => v === b[i]);
}

function render() {
  const sections = [...new Set(questions.map(q => q.section))];
  const sel = document.getElementById('sectionSelect');
  sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '<button class="tab active" data-section="all">All</button>' + sections.map(s => `<button class="tab" data-section="${esc(s)}">${esc(s)}</button>`).join('');
  tabs.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
    currentSection = btn.dataset.section;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sel.value = currentSection;
    applyFilters();
  }));
  sel.addEventListener('change', e => {
    currentSection = e.target.value;
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.section === currentSection));
    applyFilters();
  });
  document.getElementById('search').addEventListener('input', applyFilters);

  const quiz = document.getElementById('quiz');
  quiz.innerHTML = questions.map((q, idx) => cardHTML(q, idx)).join('');
  questions.forEach((q, idx) => {
    const saved = progress[q.global_num]?.selected || [];
    saved.forEach(v => {
      const inp = document.querySelector(`input[name="q${q.global_num}"][value="${CSS.escape(v)}"]`);
      if (inp) inp.checked = true;
    });
    if (progress[q.global_num]?.answered) markQuestion(q.global_num, progress[q.global_num].correct);
  });
  updateStats();
}

function cardHTML(q, idx) {
  const type = q.multi ? 'checkbox' : 'radio';
  const options = (q.options && q.options.length) ? q.options.map(o => `
    <label class="option" data-label="${esc(o.label)}">
      <input type="${type}" name="q${q.global_num}" value="${esc(o.label)}">
      <span class="letter">${esc(o.label)}</span>
      <span>${esc(o.text)}</span>
    </label>`).join('') :
    `<div class="no-options">This item’s choices were not fully extractable as clean text. Answer from the source-page image, then reveal the BJUI answer/rationale below.</div>`;

  const sourceImgs = (q.source_images || []).map(src => `<img class="pageimg" loading="lazy" src="${esc(src)}" alt="Source page">`).join('');
  const correctText = correctFor(q).join(', ') || 'See source page';
  return `
  <article class="card" data-section="${esc(q.section)}" data-q="${q.global_num}" data-search="${esc((q.section+' '+q.orig+' '+q.stem+' '+(q.rationale||'')).toLowerCase())}">
    <div class="card-head">
      <h2>Q${q.global_num} <span class="badge">${esc(q.orig || '')}</span></h2>
      <span class="badge">${esc(q.section)}</span>
    </div>
    <div class="card-body">
      <div class="stem">${esc(q.stem)}</div>
      <div class="options">${options}</div>
      <div class="actions">
        <button class="check" onclick="checkAnswer(${q.global_num})">Check answer</button>
        <button class="reveal" onclick="revealAnswer(${q.global_num})">Reveal answer/rationale</button>
      </div>
      <div class="feedback" id="fb${q.global_num}"></div>
      <details class="source">
        <summary>Open exact source page image(s) with figures/tables</summary>
        <div class="smallnote">Source PDF page(s): ${(q.source_pages || []).join(', ') || 'n/a'}</div>
        ${sourceImgs}
      </details>
    </div>
  </article>`;
}

function checkAnswer(qid) {
  const q = questions.find(x => x.global_num === qid);
  const selected = selectedFor(qid);
  const correct = correctFor(q);
  const ok = correct.length ? arraysEqual(selected, correct) : false;
  progress[qid] = {selected, answered:true, correct:ok};
  save();
  markQuestion(qid, ok);
  const fb = document.getElementById('fb'+qid);
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
  fb.textContent = ok ? 'Correct.' : `Not quite. Your answer: ${selected.join(', ') || 'none'}`;
}

function revealAnswer(qid) {
  const q = questions.find(x => x.global_num === qid);
  const correct = correctFor(q);
  const selected = selectedFor(qid);
  const ok = correct.length ? arraysEqual(selected, correct) : false;
  progress[qid] = {selected, answered:true, correct:ok};
  save();
  markQuestion(qid, ok);
  const fb = document.getElementById('fb'+qid);
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
  fb.innerHTML = `<strong>Correct answer: ${esc(correct.join(', ') || 'See source page')}</strong>` +
    `<div class="rationale">${esc(q.rationale || 'See exact source page image for rationale/answer.')}</div>`;
}

function markQuestion(qid, ok) {
  const card = document.querySelector(`.card[data-q="${qid}"]`);
  if (!card) return;
  const q = questions.find(x => x.global_num === qid);
  const correct = new Set(correctFor(q));
  card.querySelectorAll('.option').forEach(opt => {
    opt.classList.remove('correct','wrong');
    const label = opt.dataset.label;
    if (correct.has(label)) opt.classList.add('correct');
    const inp = opt.querySelector('input');
    if (inp && inp.checked && !correct.has(label)) opt.classList.add('wrong');
  });
}

function updateStats() {
  const total = questions.length;
  const answered = Object.values(progress).filter(x => x.answered).length;
  const correct = Object.values(progress).filter(x => x.correct).length;
  document.getElementById('totalQ').textContent = total;
  document.getElementById('answeredQ').textContent = answered;
  document.getElementById('scoreQ').textContent = correct;
  document.getElementById('pctQ').textContent = answered ? Math.round(correct/answered*100)+'%' : '0%';
}

function applyFilters() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const matchSection = currentSection === 'all' || card.dataset.section === currentSection;
    const matchSearch = !term || card.dataset.search.includes(term);
    card.classList.toggle('hidden', !(matchSection && matchSearch));
  });
}

function showUnanswered() {
  document.querySelectorAll('.card').forEach(card => {
    const qid = card.dataset.q;
    card.classList.toggle('hidden', !!progress[qid]?.answered);
  });
}

function resetQuiz() {
  if (!confirm('Reset all saved answers?')) return;
  progress = {};
  localStorage.removeItem(storageKey);
  location.reload();
}

render();
</script>
</body>
</html>
