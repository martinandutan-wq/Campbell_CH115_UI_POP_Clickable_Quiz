r filtration rate was 75mL/min/1.73m2.\nWhat is the most useful investigation for this patient at the moment?", "options": [{"label": "A", "text": "CT urogram", "correct": true}, {"label": "B", "text": "DMSA renogram", "correct": false}, {"label": "C", "text": "MRI", "correct": false}, {"label": "D", "text": "Plain abdominal radiograph", "correct": false}, {"label": "E", "text": "Ultrasound", "correct": false}], "correct": ["A"], "rationale": "Based on the presentation and laboratory tests, several differential diagnoses should be considered,\nincluding chronic pyelonephritis, perirenal abscess, xanthogranulomatous pyelonephritis. CT scanning is\nprobably the most useful radiological exam to differentiate these diagnoses since it can provide the most\ninformation regarding the extent of possible stones, infection and abscess. At some point a functional\nstudy may be helpful but after more information has been gathered.\nThe CT image below is from a 60-year-old lady who presented with a one-month history of anorexia,\nweight loss, dysuria, and intermittent right flank pain. She had a history of recurrent UTIs and\npercutaneous nephrolithotomy 10 years ago. She had mild right flank tenderness. Investigations showed\na white blood cell count of 12,000/mm3 and estimated GFR of 75mL/min/1.73m2.", "multi": false, "source_images": ["assets/page_055.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q14", "global_num": 96, "source_pages": [55, 56], "stem": "What is the best management option for this patient?", "options": [{"label": "A", "text": "Antibiotics only", "correct": false}, {"label": "B", "text": "CT-guided abscess drainage", "correct": false}, {"label": "C", "text": "Insertion of a JJ stent", "correct": false}, {"label": "D", "text": "Nephrectomy", "correct": true}, {"label": "E", "text": "Partial nephrectomy", "correct": false}], "correct": ["D"], "rationale": "The CT urogram shows fragmented staghorn calculi and substantial perinephric fat stranding around the\nright kidney. The radiographic signs and the clinical presentation highly suggest the diagnosis of\nxanthogranulomatous pyelonephritis. Since it is a diffuse form of xanthogranulomatous pyelonephritis,\ntotal nephrectomy should be considered for this patient. Antibiotics only, partial nephrectomy or\nCT-guided abscess drainage are unlikely to eradicate the infection.", "multi": false, "source_images": ["assets/page_055.jpg", "assets/page_056.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q15", "global_num": 97, "source_pages": [56], "stem": "A 35-year-old female with multifocal angiomyolipomata up to 5cm in diameter in the upper pole of the\nright kidney presented to the emergency department with right loin pain and haematuria. An urgent CT\nscan confirmed intracapsular bleeding from a ruptured angiomyolipoma (AML).\nWhich of the following are risk factors of bleeding in this patient?", "options": [{"label": "A", "text": "Age, size of AML and multifocality of AML", "correct": false}, {"label": "B", "text": "Location of AML, size of AML and multifocality of AML", "correct": false}, {"label": "C", "text": "Multifocality of AML", "correct": true}, {"label": "D", "text": "Multifocality of AML and size of AML", "correct": true}, {"label": "E", "text": "Size of AML", "correct": true}], "correct": ["C", "D", "E"], "rationale": "Multifocality, size >4cm, those with difficult vascular anatomy and presence in patients with tuberous\nsclerosis are all known to be risk factors for bleeding in AMLs. Presence in women of childbearing age is\nan indication for treatment but is not directly related to an increased risk of bleeding. There are no studies\nlooking into the relationship between location of tumours and the risk of bleeding.", "multi": true, "source_images": ["assets/page_056.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q16", "global_num": 98, "source_pages": [56, 57], "stem": "A 60-year-old patient with history of hypertension, diabetes and chronic obstructive pulmonary disease\nwas found to have a bleeding angiomyolipoma of 3.5cm in the left kidney on CT after a road traffic\naccident. After initial resuscitation and CT examination ruling out other injuries, you have decided to\nproceed to selective arterial embolisation (SAE).\nWhich of the following are true regarding SAE as an emergency treatment for bleeding AMLs?\nLarger lesions, hypervascular lesions, unilateral lesions and those associated with tuberous", "options": [{"label": "A", "text": "sclerosis have higher rates of subsequent re-embolisation and nephrectomy", "correct": false}, {"label": "B", "text": "more suitable for patients with high surgical risk", "correct": false}, {"label": "C", "text": "suitable for patients with high surgical risk", "correct": true}, {"label": "D", "text": "embolisation of healthy surrounding structures", "correct": false}], "correct": ["C"], "rationale": "SAE can always be repeated at any location if rebleeding occurs. SAE is minimally invasive and\nSAE has been shown to lead to a low rate of subsequent emergency surgery but rebleeding,\nrecurrence and need for re-intervention is not uncommon. SAE is minimally invasive and more\nSAE is used with caution in the emergency setting as there is a high risk of accidental\nSAE is a minimally invasive procedure and is especially suitable in patients with high surgical risk. Larger\nlesions, hypervascular lesions, bilateral lesions and those associated with tuberous sclerosis have higher\nrates of subsequent re-embolisation and nephrectomy. SAE can usually be repeated unless coils are used,\nas their nature makes further cannulation and access to vessels very difficult.\nMost studies show that no subsequent emergency surgery is needed but rebleeding is not uncommon and\nrepeated embolisation, partial nephrectomy or total nephrectomy may be necessary. Recurrence may be\nfound during long-term follow-up.", "multi": false, "source_images": ["assets/page_056.jpg", "assets/page_057.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q17", "global_num": 99, "source_pages": [57], "stem": "A 21-year-old primigravid woman, who was otherwise fit and well, presented in her 36th week of\ngestation with severe right-sided flank pain associated with nausea and vomiting. She was afebrile and\nwas not in labour at the time of admission. On palpation, she was exquisitely tender in her right flank.\nShe had a white cell count of 20×109/L. Renal function tests showed a creatinine of 101μmol/L and an\neGFR of 38mL/min. Urine microscopy showed 4–5 erythrocytes per field of vision with no other\nabnormality, and <105 bacteria/mL. Ultrasound assessment showed severe right-sided hydronephrosis\nand hydroureter.\nOn day two of admission, the patient continued to complain of severe pain.\nWhat should the next management option be?", "options": [{"label": "A", "text": "Continue conservative management", "correct": false}, {"label": "B", "text": "Consider double-J stent insertion", "correct": true}, {"label": "C", "text": "Consider emergency ureteroscopy", "correct": false}, {"label": "D", "text": "Consider percutaneous nephrostomy insertion", "correct": false}, {"label": "E", "text": "CT scan for identification of underlying pathology", "correct": false}], "correct": ["B"], "rationale": "The patient has persistent pain despite conservative measures. She also has an elevated white cell count,\nand as such, requires surgical decompression.\nPersistent ongoing obstruction with pain not responding to conservative measures mandates surgical\ndecompression. Double-J stenting is an easier approach to relieve obstruction.\nIn this case, the patient underwent the insertion of a double-J stent into the right ureter under local\nanaesthesia. The patient’s renal function and pain improved remarkably post-intervention. An ultrasound\nscan a week later showed resolution of the hydronephrosis. The patient delivered at term without any\ncomplications, and the ureteric stent was removed one week later.\nThe patient is near term; emergency ureteroscopy under anaesthesia will increase the risk of premature\nlabour and foetal loss. In the presence of obstructing pathologies such as renal stones, initial surgical\ndecompression using a double-J stent followed by deferred ureteroscopy post-delivery is the safest\napproach.\nPercutaneous nephrostomy insertion is a more invasive approach for surgical decompression in\ncomparison to the insertion of a double-J stent, and less favoured by patients due to morbidity related to\nthe nephrostomy tube.\nOccasionally, patients with severe sepsis and septic shock may be too unwell to undergo stent insertion\nunder general anaesthesia, and placement of nephrostomy using bedside ultrasound guidance may be\nthe preferred initial option. However, the patient in this scenario is not in shock and double-J stenting\nshould be attempted as the primary option.\nWe already know there is significant hydronephrosis on the USS. An argument could be made for a\nlow-dose CT to look for a large stone but decompression is going to be needed regardless of the CT\nfindings.", "multi": false, "source_images": ["assets/page_057.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q18", "global_num": 100, "source_pages": [57, 58], "stem": "A 29-year-old woman, 25 weeks pregnant, presents with severe right loin pain and hydronephrosis on\nultrasound scan.\nWhich of the following radiological investigations would be the best next step?", "options": [{"label": "A", "text": "Low dose CT KUB", "correct": true}, {"label": "B", "text": "Magnetic resonance urogram (using gadolinium)", "correct": false}, {"label": "C", "text": "Nephrostomy and antegrade study", "correct": false}, {"label": "D", "text": "Stone protocol CT KUB", "correct": false}, {"label": "E", "text": "Transvaginal ultrasound scan", "correct": false}], "correct": ["A"], "rationale": "Low dose CT KUB has an associated radiation exposure of circa 5 rad, and this dose has not been\nassociated with foetal damage.\nAlthough plain MR does have limitations in terms of sensitivity and specificity for stone disease in\npregnancy (and is particularly limited below the pelvic vessels), there are no known deleterious effects for\nthe mother or foetus, and diagnostic information may be obtained. However, gadolinium crosses the\nplacenta and so is not in routine use, although no adverse effects have been reported.\nNephrostomy, although potentially therapeutic, is likely to be too invasive at this stage.\nStone protocol CT KUB involves significant radiation exposure.\nTransvaginal ultrasound may provide some further information but is much less sensitive than CT", "multi": false, "source_images": ["assets/page_057.jpg", "assets/page_058.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q19", "global_num": 101, "source_pages": [58], "stem": "After sustaining a gunshot wound to the lower abdomen, a 22-year-old male is found to have a\ntransection of the left lower ureter near the left ureterovesical junction during exploratory laparotomy\nfrom the penetrating missile injury. While in the operating room the patient becomes increasingly\nacidotic, hypothermic, and hypotensive secondary to his other concomitant intra-abdominal injuries.\nWhat is the best next step?\nAssess the viability of the entire ureter and debriding those areas deemed non-viable -", "options": [{"label": "A", "text": "Perform a retrograde pyelogram to rule out other missed ureteric injuries", "correct": false}, {"label": "B", "text": "Perform a ureteroureterostomy over a ureteric stent", "correct": false}, {"label": "C", "text": "stent", "correct": false}, {"label": "D", "text": "the patient has been appropriately resuscitated", "correct": true}], "correct": ["D"], "rationale": "Perform a ureteroneocystostomy with a spatulated, water-tight anastomosis over a ureteric\nTie off the ureter with permanent suture and place a nephrostomy tube postoperatively once\nThe patient is becoming increasingly unstable and will require damage control by temporising the ureteric\ninjury with placement of a percutaneous nephrostomy tube +/- ureteric stent. Once the patient has been\nresuscitated adequately and is safe to return to the operating room, more definitive repair and evaluation\nof the extent of the ureteric injury can be performed.", "multi": false, "source_images": ["assets/page_058.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q20", "global_num": 102, "source_pages": [58], "stem": "A 50-year-old female who underwent an abdominal hysterectomy eight weeks prior presents with\npersistent left flank and abdominal pain. She denies fever, decreased urinary output, gross haematuria or\nchanges in her bowel function. Routine laboratory evaluation is normal.\nWhat is the most appropriate initial imaging modality?", "options": [{"label": "A", "text": "IV contrast-enhanced CT abdomen and pelvis with delayed imaging", "correct": true}, {"label": "B", "text": "KUB", "correct": false}, {"label": "C", "text": "MRI", "correct": false}, {"label": "D", "text": "Non-contrasted CT abdomen and pelvis", "correct": false}, {"label": "E", "text": "Renal ultrasound", "correct": false}], "correct": ["A"], "rationale": "A CT urogram is indicated for those patients in whom an iatrogenic ureteric injury is suspected. Due to her\nhistory of pelvic surgery and left flank pain, the suspicion of a ureteric injury is high. A CTU may enable\nthe clinician to visualise the site of ureteric obstruction or urinary extravasation. If the CT is equivocal and\nthe suspicion of a ureteric injury remains, cystoscopy with a retrograde pyelogram could be considered\nfor diagnosis and possible stent placement.", "multi": false, "source_images": ["assets/page_058.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q21", "global_num": 103, "source_pages": [58, 59, 60], "stem": "A 44-year-old Caucasian man presented with a four-month history of low backache, general malaise,\nweight loss, fatigue and poor appetite. The patient had no previous history of drug use. A physical\nexamination showed that the patient’s abdomen was soft and flat with normal bowel sounds. No\ntenderness was detected and the superficial lymph nodes were not palpable. The liver, renal and thyroid\nfunction tests were normal. The blood urea was 10.3mmol/L (normal value, 2.9-7.14mmol/L) and the\nserum creatinine was 170.6μmol/L (normal value, 40-133μmol/L). The erythrocyte sedimentation rate was\n88 mm/hour (normal range, 1-13mm/hour) and CRP was 56 (normal value, 1.0mg/L and 3.0mg/L). A CT of\nthe abdomen and pelvis scan demonstrated enhancing retroperitoneal soft tissue encasing the aorta,\ncompressing the IVC and encroaching on the ureters, resulting in bilateral lower ureteric obstruction (Figs.\n1, 2).\nFig. 1 Axial CT scan. Mass anterior and lateral to the aorta without anterior displacement of aorta.\nFig. 2 Coronal CT image. Retroperitoneal mass involving both ureters with medial deviation of bilateral\nureteric stents.\nA CT-guided biopsy of the retroperitoneal lesion revealed chronic inflammation and fibrosis.\nWhat is the most likely diagnosis?", "options": [{"label": "A", "text": "Advanced prostate cancer", "correct": false}, {"label": "B", "text": "Idiopathic retroperitoneal fibrosis", "correct": true}, {"label": "C", "text": "Perianeurysmal retroperitoneal fibrosis", "correct": false}, {"label": "D", "text": "Retroperitoneal lymphoma", "correct": false}], "correct": ["B"], "rationale": "Idiopathic retroperitoneal fibrosis and perianeurysmal retroperitoneal fibrosis have similar features;\nhowever, perianeurysmal retroperitoneal fibrosis is associated with inflammatory aneurysm. In this\npatient, the calibre of the aorta is normal. Lymphoma is also mildly enhancing, is homogeneous, and\nusually involves multiple lymph nodes. Idiopathic retroperitoneal fibrosis is characterised by a well\ndefined irregular soft-tissue mass usually anterior and lateral to the aorta extending from the level of the\nrenal arteries to the iliac vessels and progresses to envelop ureters and IVC. A biopsy specimen showing\nonly fibrotic tissue is consistent with a diagnosis of idiopathic retroperitoneal fibrosis.\nYou are in a general urology clinic and assessing a number of patients with lower urinary tract symptoms.", "multi": false, "source_images": ["assets/page_058.jpg", "assets/page_059.jpg", "assets/page_060.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q22", "global_num": 104, "source_pages": [60], "stem": "Which of the following patients has the most risk factors for developing AUR?\nA man with a prostate volume of 35cc, an AUA symptom score of 9 and a Qmax of 10mL/s -\ncorrect\nCORRECT\nA man with a prostate volume of 45cc, a Qmax of 11mL/s and an AUA symptom score of 6 -\nincorrect\nIncorrect\nA man with an AUA symptom score of 11, a Qmax of 13mL/s and a prostate volume of 50cc -\nincorrect\nIncorrect\nA man with an AUA symptom score of 15, a prostate volume of 40cc and a Qmax of 15mL/s -\nincorrect\nIncorrect\nOnly the first patient has three risk factors: a prostate volume over 30cc, an AUA symptom score over 7\nand a Qmax less than 12mLs/s.\nThe second patient has only two risk factors: a prostate volume over 30cc and Qmax less than 12mLs/s.\nThe third and fourth patients have only two risk factors: both have prostate volumes over 30cc and AUA\nsymptom scores over 7", "options": [], "correct": [], "rationale": "", "multi": false, "source_images": ["assets/page_060.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q23", "global_num": 105, "source_pages": [60, 61], "stem": "An 81-year-old man presents to the emergency department with a 12-hour history of painful inability to\npass urine.\nOn examination he has a palpable bladder but is otherwise systemically well. A rectal examination reveals\na very large but smooth prostate. He reports a gradual decline in his lower urinary tract symptoms with a\npoor flow, nocturia and hesitancy with urgency and urge incontinence over the past six months.\nMedical history includes significant rheumatoid arthritis for which he takes hydroxychloroquine,\nhypertension for which he takes doxazosin, and diet-controlled type II diabetes.\nHe is catheterised with a 1.1L residual volume. Blood tests demonstrated a normal renal function and the\npatient is fit for discharge home. The patient is keen to have the catheter removed as soon as possible\nbut is embarrassed about his incontinence.\nWhat is the next best option?\nArrange an appointment with the continence team for trial without catheter (TWOC) and", "options": [{"label": "A", "text": "training in clean intermittent catheterisation", "correct": false}, {"label": "B", "text": "Book the patient for urodynamic assessment", "correct": true}, {"label": "C", "text": "Initiate tamsulosin and organise an outpatient TWOC in 48 hours", "correct": false}, {"label": "D", "text": "List the patient for a holmium laser enucleation of the prostate", "correct": false}, {"label": "E", "text": "List the patient for a transurethral resection of the prostate", "correct": false}], "correct": ["B"], "rationale": "This patient suffers from rheumatoid arthritis therefore may lack the manual dexterity required for CIC.\nIn view of the patient’s age and symptoms, urodynamic assessment will allow adequate counselling prior\nto deciding on definitive management.\nThe patient is already on an alpha-blocker for hypertension in the form of doxasozin, therefore an\nalpha-blocker would be inappropriate. He is also deteriorating despite this therapy, therefore a TWOC is\nunlikely to be successful.\nIn view of the patient’s age and symptoms, urodynamic assessment should be performed prior to surgery.", "multi": false, "source_images": ["assets/page_060.jpg", "assets/page_061.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q24", "global_num": 106, "source_pages": [61], "stem": "Which of the following is true with regard to bladder perforation at the time of TURBT?", "options": [{"label": "A", "text": "Bladder perforation at the time of TURBT is unlikely to be subclinical", "correct": false}, {"label": "B", "text": "Bladder perforation is not seen with bipolar resection", "correct": false}, {"label": "C", "text": "Intravesical chemotherapy may be given with extraperitoneal bladder perforation", "correct": false}, {"label": "D", "text": "The incidence of occult bladder perforation is likely to be between 5 and 10%", "correct": false}, {"label": "E", "text": "There is no clear association between bladder perforation and disease progression", "correct": true}], "correct": ["E"], "rationale": "Most bladder perforations are not recognised.\nIntravesical chemotherapy is not recommended with intraperitoneal or extraperitoneal perforation.\nThe incidence of occult bladder perforation is reported in up to 53%.\nThere are varying reports but extravesical seeding of tumour is unusual.", "multi": false, "source_images": ["assets/page_061.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q25", "global_num": 107, "source_pages": [61, 62], "stem": "A 63-year-old female with a previous history of cervical cancer treated by radiotherapy is admitted for the\nthird time in clot retention and requiring a blood transfusion. Investigations have revealed pelvic lymph\nnodes in keeping with recurrent disease but no infiltration of the bladder and normal upper tracts.\nCurrent evidence would support which of the following algorithms of escalating treatment strategies?\nBladder irrigation with saline, hyperbaric oxygen (HBO) treatment, recombinant activated", "options": [{"label": "A", "text": "factor VII, laser fulguration of bleeding points, embolisation", "correct": true}, {"label": "B", "text": "Formalin irrigation, HBO therapy, tiaprofenic acid, embolisation", "correct": false}, {"label": "C", "text": "fulguration, selective embolisation, cystectomy", "correct": true}, {"label": "D", "text": "points, cystectomy if fails", "correct": false}], "correct": ["A", "C"], "rationale": "Intravesical GAG replacement with sodium hyaluronate and/or chondroitin sulphate, laser\nOral sodium pentosan polysulphate, cystoscopy with attempted cauterisation of bleeding\nBladder irrigation with saline will occur as acute management in almost all cases. HBO has been shown to\nbe effective with few side effects, however it often has limited availability (for instance, in the UK). Where\navailable it can certainly be recommended. Recombinant factor VII is also proven to be effective, although\nit appears the benefit is short-lived unless high doses are used. Laser fulguration has been reported to be\nsuccessful with both Greenlight and KTP lasers and again where the expertise and equipment exists can\nbe recommended. Superselective embolisation has also been shown in small series to be a highly\neffective treatment and this series shows logical increments in complexity of procedure and possible\nmorbidity.\nFormalin irrigation can be used but is associated with significant potential morbidity including fistulation\nand anuria and hence where HBO treatment is available this would be recommended ahead of formalin\nirrigation treatment. Tiaprofenic acid is a potential cause rather than a treatment of haemorrhagic cystitis\nwith the antifibrinolytic agent aminocaproic acid being a potential treatment.\nGAG replacement therapy by intravesical instillation is showing promise both as a treatment and\nprophylactic measure. Laser fulguration and embolisation are both shown to be effective in small\npublished series and it would be reasonable to try both before resorting to cystectomy. The third\nalgorithm would be in keeping with the guidance published by Thompson et al. (see module for reference)\nOral sodium pentosan polysulphate is reported to have some success, but as an oral treatment is slow to\nhave an effect. Cystoscopy and cauterisation can certainly be recommended but few would recommend\nproceeding straight to cystectomy if cauterisation fails. However, the role of early cystectomy in HC needs\ninvestigating further as it may allow surgery to take place with lower morbidity and mortality than\nreported by Linder et al. (see module for reference)", "multi": true, "source_images": ["assets/page_061.jpg", "assets/page_062.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q26", "global_num": 108, "source_pages": [62], "stem": "A 75-year-old man presents with a history of coronary artery disease and congestive heart failure, as well\nas localised prostate cancer, which was treated with external beam radiation therapy five years ago. Two\nyears ago he was hospitalised with haemorrhagic cystitis which was managed with bladder washout and\nfulguration. There was no evidence of prostate cancer recurrence.\nLater that year he was transported to the emergency department with gross haematuria and failed\nconservative therapies and underwent cystoscopic clot evacuation and fulguration again. The cystoscopic\nfindings were severe HRC over the entire posterior wall of the bladder and his bladder capacity was small.\nOn day 3 after admission, haemoglobin dropped from 9.0 to 6.8 requiring 2 units packed red blood cell\n(PRBC) transfusion.\nHe was readmitted two months later with recurrent gross haematuria and anaemia (Hb 5.7). He was\ntransfused 4 units PRBC immediately and required repeated cystoscopic clot evacuation and fulguration.\nHe was given oral sodium pentosanpolysulphate however he continued to bleed requiring transfusion.\nWhich of the following would you select as his next treatment option?", "options": [{"label": "A", "text": "Hyperbaric oxygen (HBO) therapy", "correct": true}, {"label": "B", "text": "Internal iliac artery embolisation", "correct": false}, {"label": "C", "text": "Intravesical instillation of formalin", "correct": false}, {"label": "D", "text": "Intravesical instillation of hyaluronic acid (HA)", "correct": true}, {"label": "E", "text": "Salvage cystectomy", "correct": false}], "correct": ["A", "D"], "rationale": "HBO therapy is the most preferable for this patient with the high risk of cardiovascular diseases because\nof its durability and tolerability.\nIn general internal iliac artery embolisation would be reserved for failure of more conservative options\nsuch as HBO therapy.\nThe intravesical instillation of formalin is not suitable for this patient’s condition with an atrophic bladder.\nThe intravesical instillation of HA is also suitable for the severe HRC because there is the evidence that HA\ninstillation has the same effectiveness and tolerability as HBO.\nAs his performance status is not good, further conservative measures should ideally be employed before\nconsidering salvage cystectomy.", "multi": true, "source_images": ["assets/page_062.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q27", "global_num": 109, "source_pages": [62, 63], "stem": "The patient is a 27-year-old man with C5/6 tetraplegia who was injured two years ago after a\nsnowboarding accident. He underwent a cystolitholapaxy and suprapubic catheter insertion five days ago\nin a different hospital. He has presented to your ward feeling unwell and describes a throbbing headache\nand an unpleasant feeling of anxiety. He was well preoperatively; his present medications are baclofen,\nDulcolax and sildenafil all of which he has had this morning. He lives alone having carers in twice daily\nand works with computers. On examination he is wearing an abdominal binder, his neck and face appear\nflushed but his torso and legs are pale. His observations show a pulse of 60 and a blood pressure of 210\nover 120. Examination of his abdomen is difficult as he has no sensation; it is not possible to elicit\ntenderness. His suprapubic catheter has a small amount of blood-stained fluid in the bag.\nManagement of this young man should include which of the following?", "options": [{"label": "A", "text": "Change the suprapubic if it is not draining", "correct": false}, {"label": "B", "text": "saline", "correct": false}, {"label": "C", "text": "antihypertensive as a matter of urgency", "correct": false}, {"label": "D", "text": "captopril or prazosin", "correct": true}, {"label": "E", "text": "pressure", "correct": false}], "correct": ["D"], "rationale": "Check whether the catheter is draining and if it is not then flush it vigorously with 100mL of\nIf he remains dangerously dysreflexic he should be treated with a nitrate-based\nIf he remains dangerously dysreflexic he should be treated with quick acting nifedipine,\nLeave him lying down and ensure the binder remains tightly in place to control his blood\nThis suprapubic catheter was inserted within the last five days and changing it risks losing the tract. A\nurethral catheter should be inserted in this scenario and attention given to why the suprapubic is not\ndraining when the patient is stable. If however the patient has no urethral access it may become\nnecessary to change the suprapubic catheter over a guidewire.\nFlushing of the catheter can precipitate autonomic dysreflexia and should only be done very gently with a\nsmall volume of fluid at body temperature. Changing the catheter is usually a better option.\nThis man has taken sildenafil which is a phosphodiesterase inhibitor within the last 24 hours, therefore\nthe use of nitrates is contraindicated.\nSpinal cord injury patients sometimes use binders to keep their blood pressure maintained when they sit\nup. To optimise blood pressure reduction in autonomic dysreflexia they should be sat up and all tight\nclothing and binders removed.\nOnce catheter drainage is established other causes of dysreflexia should be looked for if the symptoms do\nnot settle quickly.", "multi": false, "source_images": ["assets/page_062.jpg", "assets/page_063.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q28", "global_num": 110, "source_pages": [63, 64], "stem": "A 67-year-old male patient with a history of diabetes presented with progressive difficulty passing urine\nand recurrent rigors. He has a history of LUTS on alpha-blocker treatment. Pelvic ultrasonography showed\na full bladder and an enlarged prostate. He went on to have an MRI, with two representative images\nshown below.\nFig. 1 Axial and longitudinal view images of the prostate. Total prostate size 204mL.\nFig. 2 Axial and longitudinal view images of the prostate. They show a prostatic abscess.\nWhat would be your preferred initial management?", "options": [{"label": "A", "text": "Parental antibiotics, suprapubic cystostomy then TRUS guided drainage", "correct": true}, {"label": "B", "text": "Transperineal aspiration", "correct": false}, {"label": "C", "text": "TRUS aspiration", "correct": false}, {"label": "D", "text": "TUR deroofing", "correct": false}, {"label": "E", "text": "Urine diversion", "correct": false}], "correct": ["A"], "rationale": "Parental antibiotics, suprapubic cystostomy then TRUS guided drainage will achieve relief of impending\nretention manage the prostatic collection and systemic infection.", "multi": false, "source_images": ["assets/page_063.jpg", "assets/page_064.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q29", "global_num": 111, "source_pages": [64, 65], "stem": "David is a 65-year-old man who is scheduled to undergo a prostate biopsy at an inner city hospital. He is\ncurrently asymptomatic with a benign, moderately enlarged prostate on digital rectal examination. He\nunderwent a multiparametric prostate MRI that reported that clinically significant cancer is likely to be\npresent. He is an otherwise well man with no relevant past medical history. He has an allergy to shellfish.\nAs per your hospital’s guidelines, David underwent a pre-biopsy rectal swab that grew an E. coli organism\nthat, on further analysis, was found to have the CTX-M-15 and NDM-1 enzymes. The organism was shown\nto be sensitive to norfloxacin.\nWhat is the most appropriate management option in order to prevent infectious complications in this\nman?", "options": [{"label": "A", "text": "Book for a transperineal prostate biopsy with preprocedural IV cephazolin", "correct": true}, {"label": "B", "text": "Delay the procedure and repeat the rectal swab", "correct": false}, {"label": "C", "text": "prophylaxis", "correct": false}, {"label": "D", "text": "preparation", "correct": false}, {"label": "E", "text": "Proceed to TRUS biopsy with standard fluoroquinolone prophylaxis", "correct": false}, {"label": "F", "text": "TRUS: augmentin, TP: ciprofloxacin", "correct": false}, {"label": "G", "text": "TRUS: ciprofloxacin, TP: cephazolin", "correct": false}, {"label": "H", "text": "TRUS; ciprofloxacin and gentamicin, TP: gentamicin", "correct": true}, {"label": "I", "text": "TRUS: gentamicin, TP: cephazolin", "correct": false}, {"label": "J", "text": "TRUS: meropenem, TP: no antibiotics necessary", "correct": false}], "correct": ["A", "H"], "rationale": "Given the resistance profile of the swab, proceed with TRUS biopsy with meropenem\nIn addition to standard fluoroquinolone prophylaxis, use preprocedural povidine-iodine rectal\nThe transperineal approach avoids trocar passage through the rectum, so the risk of inoculating highly\nresistant organisms is greatly lessened.\nA repeat rectal swab would be likely to result in the same bacterial growth.\nThe NDM-1 enzyme conveys resistance to carbapenem antibiotics such as meropenem.\nPovidone-iodine rectal preparation is generally well-tolerated by patients, but should be avoided in men\nwith iodine or shellfish allergies.\nTRUS biopsy with fluoroquinolone would be reasonable, but is not the best option.\nAs the sole urologist at a regional centre, you have been asked your preferred prophylactic antibiotic\nregimen prior to prostate biopsy.\nAt your centre you perform both transrectal (TRUS) and transperineal (TP) prostate biopsies. The\ninfectious disease unit has just completed a review that has found a high incidence of rectal ST131 E. coli.\nHow do you answer?\nST131 E.coli is commonly resistant to β-lactam and fluoroquinolone antimicrobials.\nThe addition of an aminoglycoside agent to the standard fluoroquinolone prophylaxis has been shown to\ndecrease the incidence of post-biopsy infectious complications.\nGentamicin as a single prophylaxis agent prior to TRUS biopsies would be likely to be adequate, but less\neffective than combination therapy.\nMeropenem would be likely to be effective, but with the rising epidemic of antibiotic-resistant organisms\nattributable to antibiotic overuse it is advisable to limit the use of this potent antimicrobial.", "multi": true, "source_images": ["assets/page_064.jpg", "assets/page_065.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q30", "global_num": 112, "source_pages": [65], "stem": "A 37-year-old male has sustained a pelvic fracture during a fall. Urethrography confirms posterior urethral\ninjury.\nWhich of the statements below is correct regarding the treatment of the patient?", "options": [{"label": "A", "text": "Early re-approximation has an associated 20% restenosis rate", "correct": false}, {"label": "B", "text": "Reduction of pelvic fractures has no implications for subsequent urethroplasty", "correct": false}, {"label": "C", "text": "Stricture-free rates of 70-80% are seen with delayed urethroplasty", "correct": false}, {"label": "D", "text": "urethral meatus", "correct": false}], "correct": [], "rationale": "Partial injuries managed with a suprapubic catheter may heal without stricture formation -\ncorrect\nUrethral catheterisation should not be attempted in the presence of blood at the external\nEarly re-approximation has an associated 50% restenosis rate, based on the results of two large\nmeta-analyses.\nIt is true that partial injuries managed with a suprapubic catheter may heal without stricture formation; it\nmay not always be possible to tell if an injury is complete or partial if the urethra is stretched over a pelvic\nhaematoma.\nAccurate reduction of pelvic fractures minimises the gap between urethral ends thus making subsequent\nreconstruction more straightforward.\n90% should be stricture-free following delayed urethroplasty.\nUrethral catheterisation may reasonably be attempted in the presence of blood at the external urethral\nmeatus.", "multi": false, "source_images": ["assets/page_065.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q31", "global_num": 113, "source_pages": [65, 66], "stem": "A 30-year-old man presents to the Emergency department having developed pain, detumesence and\nbruising of his penis during intercourse 12 hours ago.\nOn examination there is swelling and bruising of his penis extending into his perineum.\nWhich of the statements below is correct?", "options": [{"label": "A", "text": "An MRI scan should be performed to exclude a urethral injury", "correct": false}, {"label": "B", "text": "conservative management is indicated", "correct": false}, {"label": "C", "text": "injections", "correct": false}, {"label": "D", "text": "Immediate repair of the fractured tunica reduces the risk of late fibrosis", "correct": true}], "correct": ["D"], "rationale": "Because of the time interval between the injury and his presentation in the department\nIf he develops erectile dysfunction intracavernosal injections of alprostadil are contraindicated\n- incorrect\nIf he develops late corporal fibrosis this may be corrected by intralesional collagenase\nAn MRI is not essential.\nNo cut-off time is proven. Most would advocate immediate repair if within 24-48 hours of injury.\nThere is no evidence that treatment with alprostadil if contraindicated if ED develops.\nCollagenase is absolutely contraindicated as it weakens the tunica and predisposes to fracture.", "multi": false, "source_images": ["assets/page_065.jpg", "assets/page_066.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q32", "global_num": 114, "source_pages": [66], "stem": "A patient presents with priapism. Which of the following signs or symptoms would not support the\ndiagnosis of low-flow priapism?", "options": [{"label": "A", "text": "Penile blood gas with the following values: pO2 = 40, pCO2 = 50, pH = 7.35", "correct": true}, {"label": "B", "text": "Penile colour duplex ultrasonography with no blood flow in the cavernous arteries", "correct": false}, {"label": "C", "text": "Progressive penile pain lasting the duration of the erection", "correct": false}, {"label": "D", "text": "Rigid, tender corpora with soft glans penis", "correct": false}], "correct": ["A"], "rationale": "Low-flow priapism is characterised by a hypoxia, hypercarbic, acidotic state in the cavernosal bodies due\nto lack of arterial blood inflow.\nLow-flow priapism is characterised by lack of arterial inflow and thus no blood flow will be seen in the\ncavernous arteries on duplex ultrasound. Rarely after intervention low-flow priapism can convert to\nhigh-flow priapism due to fistula creation which would be visible on colour duplex ultrasonography.\nLow-flow priapism is characterised by progressive penile pain whereas high-flow priapism is noticeably\nless painful.\nLow-flow priapism is characterised by rigid, tender corpora on exam with a noticeably softer glans penis.\nThis is important surgically when locating the tips of the corporal bodies during shunt procedures.\nHigh-flow priapism is characterised by tumescent but not fully rigid corpora.", "multi": false, "source_images": ["assets/page_066.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q33", "global_num": 115, "source_pages": [66], "stem": "A 50-year-old male presents with low-flow priapism for six hours.\nWhich of the following statements are correct?", "options": [{"label": "A", "text": "If needed, blood gas analysis should be taken from the corpus spongiosum", "correct": false}, {"label": "B", "text": "In cases attributable to leukaemia, leukopheresis may be necessary", "correct": true}, {"label": "C", "text": "Pharmacological agents are the commonest cause at this age", "correct": true}, {"label": "D", "text": "administration of phenylephrine", "correct": true}], "correct": ["B", "C", "D"], "rationale": "The appropriate initial management would be intracavernosal aspiration, irrigation and\nIf needed, blood gas analysis should be taken from the corpora cavernosa.", "multi": true, "source_images": ["assets/page_066.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q34", "global_num": 116, "source_pages": [66, 67], "stem": "A 15-year-old boy comes to the accident and emergency department with a one hour history of sudden\nonset of right scrotal pain. His scrotum is difficult to examine as he is too tender.\nWhich of the following statements is correct regarding suspected torsion of the testicle in this\ncase?", "options": [{"label": "A", "text": "Associated pain in the groin would exclude the diagnosis of a torsion", "correct": false}, {"label": "B", "text": "Elevation of the testicle is a better discriminating sign than Doppler ultrasound", "correct": false}, {"label": "C", "text": "ultrasound", "correct": true}, {"label": "D", "text": "There is invariably no flow seen on Doppler ultrasound in cases of testicular torsion", "correct": false}], "correct": ["C"], "rationale": "CT scan is accurate at detecting impaired testicular perfusion and should be considered -\nIf the diagnosis is in doubt clinically the radiological investigation of choice would be Doppler\nAssociated pain in the groin may be seen with a torsion.\nCT imaging has no place in the investigation of suspected testicular torsion.\nThere is occasionally flow seen on Doppler ultrasound, more frequently in children.", "multi": false, "source_images": ["assets/page_066.jpg", "assets/page_067.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q35", "global_num": 117, "source_pages": [67], "stem": "A 58-year-old man with diabetes is admitted with a 36-hour history of genital pain and swelling. On\nexamination, a clinical diagnosis of Fournier's gangrene is made.\nWhich of the following statements is NOT true in relation to this case?", "options": [{"label": "A", "text": "Skin necrosis is seen due to microthrombosis in small subcutaneous vessels", "correct": false}, {"label": "B", "text": "The infecting pathogens are likely to be normal commensal bacteria", "correct": false}, {"label": "C", "text": "The testes are frequently involved in Fournier's gangrene", "correct": true}, {"label": "D", "text": "Up to 83% of Fournier's gangrene cases are due to polymicrobial infection", "correct": false}, {"label": "E", "text": "healing", "correct": false}], "correct": ["C"], "rationale": "Vacuum-assisted closure system dressings may be useful to reduce skin defects and speed up\nThe testes are not frequently involved in Fournier's gangrene, as they have a separate blood supply", "multi": false, "source_images": ["assets/page_067.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q36", "global_num": 118, "source_pages": [67], "stem": "A 65-year-old man is one day post-TURP. He has a temperature of 37.5°C.\nWhich of the following would support a diagnosis of sepsis?", "options": [{"label": "A", "text": "A lactate of 1.8mmol/L", "correct": false}, {"label": "B", "text": "A platelet count of 150x109/µL", "correct": false}, {"label": "C", "text": "A respiratory rate of 25/min", "correct": true}, {"label": "D", "text": "A systolic blood pressure of 110mmHg", "correct": false}, {"label": "E", "text": "A white cell count of 10x106/µL", "correct": false}], "correct": ["C"], "rationale": "Quick SOFA score indicates suspicion of sepsis if two or more of the following are present: (1) respiratory\nrate ≥22 per minute, (2) altered mentation, or (3) systolic blood pressure ≤100mmHg", "multi": false, "source_images": ["assets/page_067.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q37", "global_num": 119, "source_pages": [67, 68], "stem": "Select the single best answer in relation to the immediate management of a patient with urosepsis:", "options": [{"label": "A", "text": "Administer a fluid challenge", "correct": false}, {"label": "B", "text": "Maintain a mean arterial pressure above 65mmHg", "correct": true}, {"label": "C", "text": "Maintain an hourly urine output of 20mL/hr", "correct": false}, {"label": "D", "text": "Maintain an oxygen saturation of 90%", "correct": false}, {"label": "E", "text": "Wait for antibiotic sensitivities before administering broad-spectrum antibiotics", "correct": false}], "correct": ["B"], "rationale": "Aim to achieve 35mL/hr urine output, oxygen saturation 94%, a fluid challenge will unnecessarily\noverload some patients, antibiotics should be administered within the first hour", "multi": false, "source_images": ["assets/page_067.jpg", "assets/page_068.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q38", "global_num": 120, "source_pages": [68], "stem": "A 27-year-old male with a history of schizophrenia and frequent illicit drug use presents after amputating\nhis own penis. The event occurred approximately 12 hours ago. Your facility does not have microscopic\ncapabilities.\nWhat is the next step?", "options": [{"label": "A", "text": "Debride, close corpora and mature the urethra as the phallus is no longer viable", "correct": false}, {"label": "B", "text": "Immediate macroscopic repair", "correct": false}, {"label": "C", "text": "Immediate transfer to higher level facility with microscopic capabilities", "correct": false}, {"label": "D", "text": "morning", "correct": false}, {"label": "E", "text": "capabilities within 24 hours of injury", "correct": true}], "correct": ["E"], "rationale": "Place phallus in bag filled with saline, covered with ice and attempt macroscopic repair in the\nPlace phallus in bag filled with saline, covered with ice and transfer to facility with microscopic\nIf the patient presents within 24 hours, reattachment should be attempted.\nThe best results have been shown with microscopic repair.\nIf there is time, patients should be transferred to a facility with microscopic capabilities.\nPrior to transfer, the phallus should be iced using the “double-bag technique”", "multi": false, "source_images": ["assets/page_068.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q39", "global_num": 121, "source_pages": [68], "stem": "A 32-year-old male heard a “popping” during sexual intercourse followed by immediate detumescence.\nHe has significant penile swelling and moderate penile ecchymosis on the lateral aspect of the left\ncorpora. He has voided since the event, and the urine analysis shows microscopic haematuria\n5–10RBC/HPF. In addition to penile exploration, what additional intervention should be performed?\nCystoscopy or retrograde urethrogram prior to penile exploration to rule out urethral injury -\ncorrect", "options": [{"label": "A", "text": "MRI prior to exploration to localise defect", "correct": false}, {"label": "B", "text": "No additional intervention, penile exploration is sufficient", "correct": false}, {"label": "C", "text": "Three-phase CT scan to ensure no other genitourinary trauma", "correct": false}, {"label": "D", "text": "Ultrasound prior to exploration to localise defect", "correct": false}], "correct": [], "rationale": "Given the presence of haematuria, urethral involvement must be ruled out. The urethra should be\nevaluated prior to exploration.", "multi": false, "source_images": ["assets/page_068.jpg"]}, {"section": "IV. Trauma / Emergency / Imaging / POCUS", "orig": "Q40", "global_num": 122, "source_pages": [68, 69], "stem": "Which of the following is NOT a type of basic movement when using an ultrasound probe?", "options": [{"label": "A", "text": "Rock", "correct": false}, {"label": "B", "text": "Rotate", "correct": false}, {"label": "C", "text": "Slide", "correct": false}, {"label": "D", "text": "Tilt", "correct": false}, {"label": "E", "text": "Turn", "correct": true}, {"label": "F", "text": "(A) epididymal tail; (B) testis; (C) ductus deferens", "correct": false}, {"label": "G", "text": "(A) tunica albuginea ; (B) testis; (C) epididymal head", "correct": false}, {"label": "H", "text": "(A) epididymal head; (B) testis; (C) external spermatic fascia", "correct": false}, {"label": "I", "text": "(A) epididymal head; (B) testis; (C) tunica albuginea", "correct": true}, {"label": "J", "text": "(A) epididymal tail; (B) testis; (C) tunica albuginea", "correct": false}, {"label": "K", "text": "Keeping skills up-to-date", "correct": true}, {"label": "L", "text": "Preventing any further management of the patient until the ultrasound is complete", "correct": false}, {"label": "M", "text": "scan", "correct": false}, {"label": "N", "text": "finding", "correct": true}], "correct": ["E", "I", "K", "N"], "rationale": "Letters A, B and C label three structures identifiable during testicular US imaging. Which of the\nfollowing options is correct for these labels?\nWhich of the following are the responsibilities of the clinician when implementing point-of-care ultrasound\n(POCUS)?\nEnsuring the equipment is regularly maintained, with a recent quality assurance review -\ncorrect\nProviding patient information explaining that POCUS is more accurate than a normal ultrasound\nRequesting a formal ultrasound by the radiology department if there is doubt or an unexpected", "multi": true, "source_images": ["assets/page_068.jpg", "assets/page_069.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q1", "global_num": 123, "source_pages": [72], "stem": "Which component of the urogenital tract is most likely to be affected by UGTB?\nSelect the correct answer and select \"Submit\"\nCORRECT\nBladder\nGenitals\nKidneys\nUreters\nThe kidneys are the most commonly affected component of the urogenital tract.\n53–94% of UGTB cases involve the kidneys", "options": [], "correct": [], "rationale": "", "multi": false, "source_images": ["assets/page_072.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q2", "global_num": 124, "source_pages": [72], "stem": "Which of the following tests is the most accurate for diagnosing active UGTB?\nSelect the correct answer and select \"Submit\"\nCORRECT\nEndoscopy and/or ultrasonography\nGeneXpert PCR-based amplification of mycobacterial DNA\nUrine culture for acid-fast bacilli\nZiehl-Neelsen urine smear staining for acid-fast bacilli", "options": [], "correct": [], "rationale": "", "multi": false, "source_images": ["assets/page_072.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q3", "global_num": 125, "source_pages": [72], "stem": "Which of the following tests is the most accurate for diagnosing active UGTB?", "options": [{"label": "A", "text": "Endoscopy and/or ultrasonography", "correct": false}, {"label": "B", "text": "GeneXpert PCR-based amplification of mycobacterial DNA", "correct": false}, {"label": "C", "text": "Urine culture for acid-fast bacilli", "correct": true}, {"label": "D", "text": "Ziehl-Neelsen urine smear staining for acid-fast bacilli", "correct": false}], "correct": ["C"], "rationale": "Imaging studies are only suggestive of the disease and should not be used for the confirmation or\nexclusion of UGTB, as findings can be non-specific.\nThe sensitivity is 80% and the specificity, 95–100%. This method can also determine drug susceptibility.\nHowever, PCR-based assays cannot differentiate between viable and dead bacilli.\nUrine culture is the gold standard for the diagnosis of UGTB, with sensitivity of 10.7–53% and specificity\nclose to 100%. Culture can detect even 100 bacilli/mL, and drug susceptibility is determined.", "multi": false, "source_images": ["assets/page_072.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q4", "global_num": 126, "source_pages": [72, 73], "stem": "A minimum of 5000 bacilli/mL are required for a positive smear, which compares unfavourably to urine\nculture. The sensitivity of smear microscopy is 33–52%, whereas the specificity is 97–100%.\nWhich of the following would be an indication in favour of nephrectomy in a patient with UGTB involving\nthe kidney?", "options": [{"label": "A", "text": "GFR 25mL/min/m2", "correct": false}, {"label": "B", "text": "Hypertension", "correct": true}, {"label": "C", "text": "No ureteropelvic obstruction", "correct": false}, {"label": "D", "text": "Two weeks of anti-tubercular therapy", "correct": false}], "correct": ["B"], "rationale": "Nephrectomy is indicated when GFR is below 15mL/min/m2.\nHypertension is considered a factor in favour of nephrectomy. Nephrectomy may lead to a decrease in\nblood pressure in these patients.\nUreteropelvic obstruction is a factor in favour of nephrectomy.", "multi": false, "source_images": ["assets/page_072.jpg", "assets/page_073.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q5", "global_num": 127, "source_pages": [73], "stem": "A patient should have received at least six weeks of anti-tubercular therapy before undergoing surgery.\nYour UGTB patient has diffuse epidydimal involvement leading to obstructive azoospermia. The infection\nwas treated. Which of the following management options is preferred to help him conceive?", "options": [{"label": "A", "text": "Microsurgical epidydimal sperm aspiration", "correct": false}, {"label": "B", "text": "Testicular sperm extraction", "correct": true}], "correct": ["B"], "rationale": "This is only an option for patients with vasal or isolated epidydimal involvement.", "multi": false, "source_images": ["assets/page_073.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q6", "global_num": 128, "source_pages": [73], "stem": "As the patient has diffuse epidydimal involvement, if spermatogenesis is normal then the best option\nwould be testicular sperm extraction/aspiration.", "options": [{"label": "A", "text": "Transurethral resection of the ejaculatory duct", "correct": false}, {"label": "B", "text": "Vaso-vasal anastomosis", "correct": false}, {"label": "C", "text": "Pyrazinamide, levofloxacin, kanamycin, clofazimine", "correct": false}], "correct": [], "rationale": "This is only an option for patients with discrete, distal obstruction of the ejaculatory duct.\nThis is only an option for patients with discrete vasal obstruction; furthermore, results are likely to be poor\nin any case of infertility due to UGTB.\nAssuming you are following drug sensitivity data, which of the following is most likely to be an appropriate\ncourse of therapy for multidrug-resistant TB?", "multi": false, "source_images": ["assets/page_073.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q7", "global_num": 129, "source_pages": [73], "stem": "A regimen for multi-drug resistant TB should contain at least 5 different effective drugs.", "options": [{"label": "A", "text": "Levofloxacin, amikacin, clofazimine, ethionamide, bedauiline", "correct": false}, {"label": "B", "text": "Pyrazinamide, levofloxacin, moxifloxacin, amikacin, kanamycin", "correct": false}], "correct": [], "rationale": "An ideal regimen for multi-drug resistant TB should include pyrazinamide.", "multi": false, "source_images": ["assets/page_073.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q8", "global_num": 130, "source_pages": [73, 74], "stem": "An ideal regimen contains one fluoroquinolone, one second-line injectable agent and two other\nsecond-line agents. This regimen may be unsuitable as it contains two fluoroquinolones, two second-line\ninjectable agents and no other second-line agents.", "options": [{"label": "A", "text": "Pyrazinamide, levofloxacin, amikacin, clofazimine, ethionamide", "correct": true}], "correct": ["A"], "rationale": "This combination seems to be valid based on the WHO classification of anti-TB drugs for the management\nof drug resistance.\nDense strictures that are resistant to dilatation are likely to require definitive surgical correction.\nEarly ureteric stenting leads to spontaneous resolution of ureteric stricture in 50% of patients.\nEAU guidelines support the use of corticosteroids for ureteric stricture if not improved within 3 weeks.\nIn TURED, dye is instilled into the seminal vesicles to locate the ejaculatory duct openings into the urethra\nThe reported number of cases of TB is increasing worldwide.", "multi": false, "source_images": ["assets/page_073.jpg", "assets/page_074.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q9", "global_num": 131, "source_pages": [74], "stem": "Which of the following statements is FALSE about UGTB?\nContrast-enhanced CT is the preferred imaging modality for detecting early renal changes in", "options": [{"label": "A", "text": "UGTB", "correct": false}, {"label": "B", "text": "CT is most useful in extensive disease where other organ systems may be involved", "correct": false}, {"label": "C", "text": "MRI, where available, is preferred over CT or IVU for UGTB diagnosis", "correct": true}, {"label": "D", "text": "The most common IVU finding in UGTB is obstructive uropathy due to scarring", "correct": false}, {"label": "E", "text": "The most common plain film X-ray finding in UGTB is calcification", "correct": false}], "correct": ["C"], "rationale": "Although MRI can be used in the diagnosis of UGTB, it is not sufficiently superior to CT or IVU to warrant\nits frequent use.", "multi": false, "source_images": ["assets/page_074.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q10", "global_num": 132, "source_pages": [74], "stem": "A 32-year-old female presented with irritative lower urinary tract symptoms along with fever and weight\nloss. Multiple urinalyses revealed sterile pyuria.\nOn further evaluation, she was found to have left hydroureteronephrosis, with normal renal and liver\nfunction. Her urine was positive for acid-fast bacillus.\nContrast-enhanced CT revealed a short, passable left lower ureteric stricture (Fig. 4).\nWhat is the next line of treatment?", "options": [{"label": "A", "text": "ATT with endoureterotomy", "correct": false}, {"label": "B", "text": "ATT with left DJ stenting", "correct": true}, {"label": "C", "text": "ATT with left PCN", "correct": false}, {"label": "D", "text": "Observation", "correct": false}], "correct": ["B"], "rationale": "This option is usually reserved for longer ureteric strictures.\nThis is the ideal management, which may prevent future stricture formation and recover affected renal\nfunction.\nThis option is generally reserved for cases of retrograde DJ stenting failure.", "multi": false, "source_images": ["assets/page_074.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q11", "global_num": 133, "source_pages": [74], "stem": "As tuberculosis heals with fibrosis, it is always advised to leave a stent while the patient receives ATT.", "options": [{"label": "A", "text": "ATT with ureteric reimplantation", "correct": false}], "correct": [], "rationale": "This option is more invasive, and is reserved for cases of endourological treatment failure.", "multi": false, "source_images": ["assets/page_074.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q12", "global_num": 134, "source_pages": [74, 75], "stem": "A 30-year-old man with a previous history of treated pulmonary tuberculosis presented with primary\ninfertility. On evaluation he was found to have low volume azoospermia. His FSH, LH and testosterone\nwere normal. Transrectal ultrasound revealed dilated seminal vesicles. His testis and vas deferens\nappeared to be normal on palpation. Fine needle aspiration cytology revealed normal spermatogenesis.\nWhat is the favoured treatment option?", "options": [{"label": "A", "text": "Intracytoplasmic sperm injection/in vitro fertilisation", "correct": false}, {"label": "B", "text": "TUIRED", "correct": true}, {"label": "C", "text": "Vasoepididymostomy", "correct": false}, {"label": "D", "text": "Vasovasostomy", "correct": false}, {"label": "E", "text": "Use of donor sperm", "correct": false}], "correct": ["B"], "rationale": "This is a suitable option in cases with normal spermatogenesis, however the treatment will be much more\ncostly with a greater risk of complications for the mother, father and child.\nThis is the ideal treatment in cases of isolated distal ejaculatory duct obstruction, and is cost-effective.\nAs the seminal vesicles are dilated, there is no role for vasoepididymostomy or vasovasostomy in this\ncase of distal ejaculatory duct obstruction.\nThis is always an option in a case of infertility, but for this patient, TUIRED should be offered to allow the\npatient to make an informed decision.\nGUTB has been found in 15-20% of patients with pulmonary tuberculosis.\nImmunological tests have limited value in the diagnosis of GUTB as they cannot distinguish between\nlatent and acute infection.\nCT and MRI can easily differentiate TB granulomas from hydronephrosis\nRenal colic is an uncommon symptom of GUTB, occurring in fewer than 10% of patients.\nAbout 55% of patients with GUTB will require surgical treatment during the course of their disease\nColonic injuries are rare during nephrectomy in the non-functioning tuberculous kidney.\nIntra-operative pleural injuries are common in supracostal flank incisions.\nThe chance of re-bleeding requiring re-operation after a conservative treatment of splenic injury can be\nas high as 2-10%", "multi": false, "source_images": ["assets/page_074.jpg", "assets/page_075.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q13", "global_num": 135, "source_pages": [75], "stem": "A 55-year-old gentleman presented with weight loss, low-grade fever with dysuria and frequency. An IVU\nrevealed a right non-functioning kidney with small capacity bladder.\nThe left kidney was excreting normally. He had an old fibrotic scar at the apex of right lung.\nWhich of the following should not be performed?", "options": [{"label": "A", "text": "CT/IVU to determine the nature of the right non-functioning kidney", "correct": false}, {"label": "B", "text": "Cystoscopic examination of the bladder and mucosa biopsy", "correct": false}, {"label": "C", "text": "Direct smear of acid-fast bacilli on three consecutive morning urine samples", "correct": false}, {"label": "D", "text": "anti-tuberculous therapy", "correct": true}], "correct": ["D"], "rationale": "Insertion of the percutaneous nephrostomy tube into the right kidney and start\nAn insertion of the percutaneous nephrostomy tube into non-functioning kidney without knowing the\ncontent and starting anti-tuberculous treatment without a firm proof of TB is inadvisable\nHe then had a direct smear of acid-fast bacilli on his three consecutive early morning urine samples,\nwhich is positive. CT/IVU and a subsequent CT revealed an extensive destruction of renal tissues with\ncaseation in his right kidney. The bladder mucosa biopsy showed granulomas suggestive of tuberculosis.", "multi": false, "source_images": ["assets/page_075.jpg"]}, {"section": "V. Genital Tuberculosis / Infections", "orig": "Q14", "global_num": 136, "source_pages": [75, 76], "stem": "What treatment should be offered to him?", "options": [{"label": "A", "text": "Insert a double J stent into the right non-functioning kidney to relief the obstruction", "correct": false}, {"label": "B", "text": "right renal function", "correct": false}, {"label": "C", "text": "laparoscopic surgery", "correct": true}], "correct": ["C"], "rationale": "Nephrostomy drainage of the right kidney with concomitant anti-tuberculous therapy -\nStart anti-tuberculous therapy for six to nine months and reassess the improvement of the\nStart anti-tuberculous therapy for six weeks, followed by right nephrectomy either by open or\nAs the right kidney is extensively damaged and functional recovery is impossible. If can be difficult to\nclear the tuberculous infection without a nephrectomy, which can shorten the course of anti-tuberculous\ntherapy.", "multi": false, "source_images": ["assets/page_075.jpg", "assets/page_076.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q1", "global_num": 137, "source_pages": [78], "stem": "A 60-year-old woman came into the clinic for the evaluation of one month of anorexia, weight loss,\ndysuria, and intermittent flank pain. Her past medical history was significant for recurrent urinary tract\ninfections. She also had a history of right renal calculi 10 years ago and underwent a percutaneous\nnephrolithotomy at that time. Physical examination revealed mild right flank tenderness but no\ntenderness in the abdomen.\nMost recent complete blood count revealed white blood cell count of 11,400cells/mm3 and hematocrit of\n10.5g/dL. Her urine analysis was positive for leukocyte esterase and pyuria. Urine culture was negative.\nHer estimated glomerular filtration rate was 75mL/min/1.73m2.\nWhat is the most useful radiological exam for this patient at the moment?", "options": [{"label": "A", "text": "CT urogram", "correct": true}, {"label": "B", "text": "MRI", "correct": false}, {"label": "C", "text": "Plain abdominal radiograph", "correct": false}, {"label": "D", "text": "Ultrasound", "correct": false}], "correct": ["A"], "rationale": "Based on the presentation and laboratory tests, several differential diagnoses should be considered,\nincluding chronic pyelonephritis, perirenal abscess, xanthogranulomatous pyelonephritis. CT scanning is\nprobably the most useful radiological exam to differentiate these diagnoses since it can provide the most\ninformation regarding the extent of possible stones, infection and abscess. At some point a functional\nstudy may be helpful but after more information has been gathered.", "multi": false, "source_images": ["assets/page_078.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q2", "global_num": 138, "source_pages": [78, 79], "stem": "CT urogram was performed and some of the images are shown below:\nWhat is the best management option for this patient?", "options": [{"label": "A", "text": "Antibiotics only", "correct": false}, {"label": "B", "text": "CT-guided abscess drainage", "correct": false}, {"label": "C", "text": "Nephrectomy", "correct": true}, {"label": "D", "text": "Partial nephrectomy", "correct": false}], "correct": ["C"], "rationale": "The CT urogram showed fragmented staghorn calculi and substantial perinephric fat stranding around the\nright kidney. The radiographic signs and the clinical presentation highly suggest the diagnosis of\nxanthogranulomatous pyelonephritis. Since it is a diffuse form of xanthogranulomatous pyelonephritis,\ntotal nephrectomy should be considered for this patient. Antibiotics only, partial nephrectomy or\nCT-guided abscess drainage are unlikely to eradicate the infection.\nKey learning points:\nXGP is a rare chronic kidney infection characterised by the diffuse destruction of renal parenchyma.\nTreatment of XGP is almost universally nephrectomy.\nNephrectomy for XGP is one of the most difficult procedures urologists can encounter.\nEfforts should be taken to diagnosis XGP preoperatively and CT scan is the most valuable exam to\nsuggest its diagnosis.\nAlthough ON was considered as the standard approach in the XGP setting, recent studies have shown that\nLN could be safely performed in selected patients.\nLN to hand-assisted then open conversion may be a useful algorithm to consider when planning for LN.\nUltimately, the choice of approach should be based on the surgeon’s experience and the extent of XGP.\nRAN may have a role in the near future.", "multi": false, "source_images": ["assets/page_078.jpg", "assets/page_079.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q3", "global_num": 139, "source_pages": [79], "stem": "A 67-year-old male patient with a history of DM presented with progressive difficulty on micturition and\nrecurrent attacks of fever.\nThe patient has a history of LUTS on alpha-blocker treatment. Pelvic ultrasonography showed a full\nbladder and enlarged prostate. He went on to have an ultrasound, with two representative images shown\nbelow.\nWhat is the initial management?", "options": [{"label": "A", "text": "Parental antibiotic, suprapubic cystostomy then TRUS", "correct": true}, {"label": "B", "text": "Transperineal aspiration", "correct": false}, {"label": "C", "text": "TRUS aspiration", "correct": false}, {"label": "D", "text": "TUR deroofing", "correct": false}, {"label": "E", "text": "Urine diversion", "correct": false}], "correct": ["A"], "rationale": "This option will achieve relief of impending retention and control of the infectious status. Send urine\nsample for culture and sensitivity. TRUS was requested.", "multi": false, "source_images": ["assets/page_079.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q4", "global_num": 140, "source_pages": [80], "stem": "A 35-year-old male patient, smoker, on clean intermittent self-catheterisation (CIC) for neuropathic\nbladder presented with perineal pain, recurrent attacks of fever and urethral discharge. On DRE the\npatient could not withstand the examination.\nWhat would be the next step for the possible diagnosis?", "options": [{"label": "A", "text": "CT", "correct": false}, {"label": "B", "text": "MRI", "correct": true}, {"label": "C", "text": "Pelvic ultrasound", "correct": false}, {"label": "D", "text": "TRUS", "correct": false}, {"label": "E", "text": "Voiding cystogram", "correct": false}], "correct": ["B"], "rationale": "If he cannot tolerate a rectal examination then he would not tolerate a TRUS, so MRI would be the next\nstep.", "multi": false, "source_images": ["assets/page_080.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q5", "global_num": 141, "source_pages": [80], "stem": "A 35-year-old male patient, smoker, on clean intermittent self-catheterisation (CIC) for neuropathic\nbladder presented with perineal pain, recurrent attacks of fever and urethral discharge. Investigation\nreveals a prostatic abscess.\nWhat is the most probable organism causing this pathology?", "options": [{"label": "A", "text": "Candida species", "correct": false}, {"label": "B", "text": "E. coli", "correct": true}, {"label": "C", "text": "Klebsiella pneumonia", "correct": false}, {"label": "D", "text": "Mycobacterium tuberculosis", "correct": false}, {"label": "E", "text": "Pseudomonas aeruginosa", "correct": false}], "correct": ["B"], "rationale": "Gram-negative bacilli as Enterobacteriacae (particularly E. coli) and Staphylococcus aureus are the\ncommonest causative organisms.", "multi": false, "source_images": ["assets/page_080.jpg"]}, {"section": "VI. Urogenital Infections / STI / Prostatitis", "orig": "Q6", "global_num": 142, "source_pages": [80, 81], "stem": "A 25-year-old woman has been suffering from dysuria, pollakiuria and urgency for two days.\nHer voiding frequency is currently 12-15/day, and four times during the night, her urine is cloudy and she\nhas reduced voiding volume.\nShe does not suffer from neurological diseases or take regular medication, and has no other chronic\ndiseases.\nHer current infection is associated with sexual intercourse with a new partner. She is not suffering from\npre-existing urological diseases or surgery. Her general condition is good, body temperature is 36.1°C,\nand a urine dipstick revealed leucocyturia and nitrite.\nWhich of the following is the most appropriate mana
