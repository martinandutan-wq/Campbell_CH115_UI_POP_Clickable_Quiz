<script id="quizdata" type="application/json">{"questions": [{"section": "I. Physiology", "orig": "Question 1", "global_num": 1, "source_pages": [4], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "During ejection, the smooth muscle of the internal urinary sphincter contracts and closes to prevent retrograde flow of semen into the bladder.", "correct": true}, {"label": "B", "text": "During emission, peristaltic contractions of the vas deferens transfers spermatozoa from the epididymis through the ampulla of the ductus deferens and into the prostatic urethra.", "correct": true}, {"label": "C", "text": "Orgasm is a distinct cortical event and is the result of cerebral processing of pudendal nerve sensory stimuli resulting from reduced pressure in the posterior urethra, sensory stimuli arising from the verumontanum and relaxation of the urethral bulb and accessory sexual organs.", "correct": false}, {"label": "D", "text": "Rhythmic contraction of striated bulbocavernosus, ischiospongiosus and levator ani propels semen antegrade towards and through the urethral meatus.", "correct": true}], "correct": ["A", "B", "D"], "rationale": "During ejection, the internal urinary sphincter closes to prevent retrograde ejaculation. During\nemission, vas deferens peristalsis transfers spermatozoa into the prostatic urethra. Orgasm is cortical, but it is\nassociated with increased posterior urethral pressure and contraction, not relaxation, of the urethral\nbulb/accessory organs. Final semen expulsion occurs through rhythmic striated pelvic floor contractions.", "multi": true, "source_images": ["assets/page_004.jpg"]}, {"section": "I. Physiology", "orig": "Question 2", "global_num": 2, "source_pages": [4], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "Following acute on-demand administration of an SSRI, increased synaptic 5-HT levels are down-regulated by presynaptic 5-HT1A and 5-HT1B/1D autoreceptors to prevent over-stimulation of postsynaptic 5-HT2A receptors.", "correct": false}, {"label": "B", "text": "Onuf's nucleus is located in the ventral horn of S2-S4 segments and contains somatic motor neurons which supply the bulbocavernosus and other pelvic floor striated muscles and the external urethral sphincter.", "correct": true}, {"label": "C", "text": "Penile vibratory stimulation is less effective in SCI below the level of T12 where the nerves of the ejaculatory reflex may be damaged.", "correct": false}, {"label": "D", "text": "Stimulation of post-synaptic 5-HT1A receptors results in shortening of ejaculation latency. This has led to the hypothesis that men with lifelong PE may have hyposensitivity of 5-HT2C and/or hypersensitivity of the 5-HT1A receptor.", "correct": true}, {"label": "E", "text": "The incerto-hypothalamic pathways comprises DA cell bodies that project from the medial zona incerta of the subthalamus and the hypothalamic periventricular nucleus to the hypothalamic MPOA and PVN.", "correct": true}], "correct": ["B", "D", "E"], "rationale": "The protected postsynaptic receptor is 5-HT2C, not 5-HT2A. Onuf's nucleus is in S2-S4 and supplies\npelvic floor striated muscles and the external sphincter. PVS is less effective below T10, not T12. Postsynaptic\n5-HT1A activation shortens ejaculation latency, while 5-HT2C delays ejaculation. Dopaminergic\nincerto-hypothalamic pathways project to the MPOA and PVN.", "multi": true, "source_images": ["assets/page_004.jpg"]}, {"section": "I. Physiology", "orig": "Question 3", "global_num": 3, "source_pages": [4, 5], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "Adrenergic agonists act upon alpha-2 adrenergic neuron receptors present in smooth muscle causing seminal tract and sex glands contractions.", "correct": false}, {"label": "B", "text": "Endogenous opioid peptide enkephalin and tuberoinfundibular peptide 39 may potentially have roles in the cerebral control of ejaculation in the male rat.", "correct": true}, {"label": "C", "text": "GABAA receptors are activated only under certain physiological situations, while GABAB receptors are probably tonically and constantly activated.", "correct": false}, {"label": "D", "text": "Possible mechanisms of mediating OT receptor ligands' effect on the ejaculatory response include a direct action on the OTergic pathway and/or modulation of 5-HT and dopamine neurotransmission.", "correct": true}, {"label": "E", "text": "The opioid analgesic tramadol has a role in enhancing the pre-synaptic 5-HT transporter system.", "correct": false}], "correct": ["B", "D"], "rationale": "Adrenergic seminal tract contraction is mainly via alpha-1, not alpha-2. Enkephalin and\ntuberoinfundibular peptide 39 may have roles in cerebral ejaculation control. GABA statement is reversed:\nGABAA is probably tonically activated, while GABAB is activated only under certain situations. Oxytocin receptor\nligands may act directly on OTergic pathways and/or modulate serotonin and dopamine. Tramadol inhibits the\npresynaptic 5-HT transporter.", "multi": true, "source_images": ["assets/page_004.jpg", "assets/page_005.jpg"]}, {"section": "I. Physiology", "orig": "Question 4", "global_num": 4, "source_pages": [5], "stem": "A 32-year-old man sustained a T12 ASIA-A spinal cord injury after a motorcycle accident. His ED responds\nto intracavernosal alprostadil, but he is unable to ejaculate or experience orgasm. He and his partner wish\nto have another child.\nWith regard to ejaculation and SCI, which statement is correct?", "options": [{"label": "A", "text": "Ejaculation is coordinated by a group of thoracic spinal interneurons called the spinal generator for ejaculation.", "correct": false}, {"label": "B", "text": "In SCI men unable to ejaculate who are seeking fertility, harvested sperm by PVS can be used in IUI, IVF or ICSI assisted reproductive techniques.", "correct": true}, {"label": "C", "text": "In SCI patients with lesions of the L3-L5 segments, PVS to induce ejaculation is successful in more than 70% of men.", "correct": false}, {"label": "D", "text": "PVS to the glans penis stimulates pre-ganglionic parasympathetic neurons within the hypogastric plexus and triggers ejaculation in 65% to 83%.", "correct": false}, {"label": "E", "text": "Stimulation of ascending genital sensory efferents activates the somatic motor nerves in the pudendal nerve and results in ejection of semen.", "correct": false}], "correct": ["B"], "rationale": "The spinal generator for ejaculation is mainly lumbar, around L3-L4, not thoracic. In SCI men seeking\nfertility, sperm harvested by penile vibratory stimulation can be used for IUI, IVF, or ICSI. PVS stimulates genital\nafferents, not efferents. Emission is mainly sympathetic; ejection is somatic pudendal-mediated.\nII. Erectile Function / Erectile Dysfunction", "multi": false, "source_images": ["assets/page_005.jpg"]}, {"section": "I. Physiology", "orig": "Question 5", "global_num": 5, "source_pages": [5, 6], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "Each internal pudendal artery divides into three separate trunks: dorsal, bulbar and cavernosal arteries.", "correct": true}, {"label": "B", "text": "The crura are covered anteriorly by the ischiocavernosus muscles.", "correct": false}, {"label": "C", "text": "The suspensory ligament extends inferiorly from the linea alba and divides into two bands which enclose the penis before meeting ventral to the shaft of the penis.", "correct": false}, {"label": "D", "text": "The tunica albuginea is mainly composed of collagen and elastin.", "correct": true}, {"label": "E", "text": "Tumescence is regulated mainly via parasympathetic nerves emanating from S2-4 of the sacral spinal cord.", "correct": true}], "correct": ["A", "D", "E"], "rationale": "The internal pudendal artery gives rise to dorsal, bulbar, and cavernosal arterial branches. The crura\nare covered posteriorly by the ischiocavernosus muscles. The ligament from the linea alba dividing into bands is\nthe fundiform ligament, not the suspensory ligament. Tunica albuginea is collagen/elastin. Tumescence is\nmainly parasympathetic via S2-S4.", "multi": true, "source_images": ["assets/page_005.jpg", "assets/page_006.jpg"]}, {"section": "I. Physiology", "orig": "Question 6", "global_num": 6, "source_pages": [6], "stem": "Which of the following statements are correct?", "options": [{"label": "A", "text": "A sexual stimulus leads to a decrease in sympathetic nerve activity and the release of acetylcholine, vasoactive intestinal polypeptide and nitric oxide by parasympathetic nerves.", "correct": true}, {"label": "B", "text": "During the flaccid phase, the sinusoidal trabeculae are contracted, arterial inflow is poor and venous outflow is restricted.", "correct": true}, {"label": "C", "text": "NO activates the enzyme adenylate cyclase, which then catalyses the conversion of ATP to cyclic AMP.", "correct": false}, {"label": "D", "text": "Nocturnal erections are preserved in men with predominantly psychogenic erectile dysfunction.", "correct": true}], "correct": ["A", "B", "D"], "rationale": "Erection requires decreased sympathetic tone and increased parasympathetic release of\nacetylcholine, VIP, and NO. In the flaccid state, trabeculae are contracted and arterial inflow is low. NO activates\nguanylate cyclase, converting GTP to cGMP, not adenylate cyclase/ATP/cAMP. Nocturnal erections are typically\npreserved in psychogenic ED.", "multi": true, "source_images": ["assets/page_006.jpg"]}, {"section": "I. Physiology", "orig": "Question 7", "global_num": 7, "source_pages": [6], "stem": "A 62-year-old man presents with a 12-month history of erectile dysfunction. He anticipates being sexually\nactive twice a week.\nWhich is the most appropriate initial treatment modality?", "options": [{"label": "A", "text": "Avanafil 100 mg on-demand", "correct": true}, {"label": "B", "text": "Sildenafil 50 mg on-demand", "correct": true}, {"label": "C", "text": "Tadalafil 20 mg once daily", "correct": false}, {"label": "D", "text": "Vardenafil 5 mg once daily", "correct": true}], "correct": ["B", "D", "E", "A", "F", "D", "E", "A", "D"], "rationale": "For intercourse twice weekly, an on-demand PDE5 inhibitor is appropriate. Sildenafil 50 mg\non-demand is standard initial therapy. Daily tadalafil is more appropriate for daily/frequent intercourse or\nassociated LUTS/BPH. Avanafil and vardenafil are alternatives but not the best initial answer here.", "multi": true, "source_images": ["assets/page_006.jpg"]}, {"section": "I. Physiology", "orig": "Question 8", "global_num": 8, "source_pages": [6, 7], "stem": "In a gentleman with a new clinical presentation of erectile dysfunction, besides focused history and\nexamination, which initial laboratory tests do EAU guidelines suggest are appropriate?\nSelect all that apply.", "options": [{"label": "A", "text": "Free testosterone", "correct": false}, {"label": "B", "text": "Glucose-lipid profile", "correct": true}, {"label": "C", "text": "Serum PSA", "correct": false}, {"label": "D", "text": "Total testosterone, morning sample", "correct": true}], "correct": ["B", "D"], "rationale": "Initial ED laboratory workup includes cardiovascular/metabolic risk assessment with glucose-lipid\nprofile and screening for hypogonadism with morning total testosterone. Free testosterone is second-line if\nindicated. PSA is not routine unless clinically indicated.\nIII. Bladder Function / Neuro-urology", "multi": true, "source_images": ["assets/page_006.jpg", "assets/page_007.jpg"]}, {"section": "I. Physiology", "orig": "Question 9", "global_num": 9, "source_pages": [7], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "Afferent fibres found within the detrusor layer respond directly to mechanical stretch, most likely via mechanosensitive ion channels.", "correct": true}, {"label": "B", "text": "Detrusor fibres at the bladder neck are arranged in fascicles orientated randomly.", "correct": false}, {"label": "C", "text": "Postganglionic neurons synapse within the detrusor where they release acetylcholine, which mediates detrusor contraction via muscarinic receptors.", "correct": true}, {"label": "D", "text": "The rhabdosphincter is composed of striated muscle fibres and is under involuntary control.", "correct": false}], "correct": ["A", "C"], "rationale": "Detrusor afferents respond to mechanical stretch, likely via mechanosensitive channels.\nPostganglionic parasympathetic neurons release acetylcholine, causing muscarinic-mediated contraction.\nRandom fascicle arrangement refers to the body of the bladder, not bladder neck. Rhabdosphincter is striated\nand under voluntary control.", "multi": true, "source_images": ["assets/page_007.jpg"]}, {"section": "I. Physiology", "orig": "Question 10", "global_num": 10, "source_pages": [7], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "Afferent signals from the lower urinary tract are integrated within the forebrain in a region called the peri-aqueductal grey matter.", "correct": false}, {"label": "B", "text": "Low-pressure storage is primarily facilitated by the intrinsic viscoelastic properties of the bladder wall, but also by reflex nervous activity.", "correct": true}, {"label": "C", "text": "M2 receptor activation mediates detrusor muscle contraction directly via increased intracellular calcium.", "correct": false}, {"label": "D", "text": "Suprapontine spinal cord lesions can be congenital, such as spina bifida.", "correct": false}, {"label": "E", "text": "There is evidence that purinergic transmission is important in afferent signalling, in particular ATP released from the urothelium in response to distension.", "correct": true}, {"label": "F", "text": "When complete, sacral and sub-sacral lesions result in an areflexic detrusor and urinary retention with overflow incontinence at low pressure.", "correct": true}], "correct": ["B", "E", "F"], "rationale": "The PAG is in the midbrain, not forebrain. Low-pressure storage depends on bladder wall\nviscoelasticity and reflex activity. Direct detrusor contraction is mainly M3, not M2. Spina bifida is usually\nsuprasacral, not suprapontine. ATP/purinergic signalling is important in afferent bladder signalling. Complete\nsacral/subsacral lesions cause areflexic detrusor and low-pressure overflow retention.", "multi": true, "source_images": ["assets/page_007.jpg"]}, {"section": "I. Physiology", "orig": "Question 11", "global_num": 11, "source_pages": [7, 8], "stem": "A 25-year-old man has a history of a motor vehicle accident resulting in a T10 spinal injury. Four months\nlater he attends for urodynamic evaluation.\nWhich pattern of bladder dysfunction is most likely?", "options": [{"label": "A", "text": "Detrusor overactivity with detrusor sphincter dyssynergia", "correct": true}, {"label": "B", "text": "Detrusor overactivity with normal voiding function", "correct": false}, {"label": "C", "text": "Normal urodynamic test", "correct": true}, {"label": "D", "text": "Stress urinary incontinence", "correct": true}, {"label": "E", "text": "Urinary retention with an underactive areflexic detrusor", "correct": true}], "correct": ["A", "D", "E", "E", "A", "C", "D", "E", "C", "E", "D", "E", "A"], "rationale": "A T10 lesion is suprasacral but infrapontine. The sacral reflex arc remains intact, but coordination\nfrom the pontine micturition centre is lost. This causes detrusor overactivity plus detrusor sphincter dyssynergia,\nrisking high pressures and upper tract damage.", "multi": true, "source_images": ["assets/page_007.jpg", "assets/page_008.jpg"]}, {"section": "I. Physiology", "orig": "Question 12", "global_num": 12, "source_pages": [8], "stem": "Which receptor is primarily responsible for mediating detrusor contraction?", "options": [{"label": "A", "text": "A1 adrenoceptors", "correct": true}, {"label": "B", "text": "B3 adrenoceptors", "correct": false}, {"label": "C", "text": "M1 muscarinic receptors", "correct": true}, {"label": "D", "text": "M2 muscarinic receptors", "correct": false}, {"label": "E", "text": "M3 muscarinic receptors", "correct": true}], "correct": ["E", "C", "A", "C", "E", "C", "E"], "rationale": "M3 muscarinic receptors mediate direct detrusor contraction by increasing intracellular calcium. M2\nreceptors are more numerous but mainly oppose beta-3-mediated relaxation. Beta-3 adrenoceptors relax\ndetrusor. Alpha-1 receptors are concentrated in bladder neck/prostate.\nIV. Male Infertility / Spermatogenesis", "multi": true, "source_images": ["assets/page_008.jpg"]}, {"section": "I. Physiology", "orig": "Question 13", "global_num": 13, "source_pages": [8], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "Kartagener syndrome, an autosomal recessive condition, is an acrosome abnormality leading to low or absent motility.", "correct": false}, {"label": "B", "text": "PDGF has been shown to induce gonocyte chemotaxis in vitro.", "correct": true}, {"label": "C", "text": "The duration of the cycle of the seminiferous epithelium is 16 days in humans, with 64 days, four cycles, required for spermatogenesis.", "correct": true}, {"label": "D", "text": "The endpiece of the flagella contains the axoneme, which is surrounded by the fibrous sheath.", "correct": false}], "correct": ["B", "C"], "rationale": "Kartagener syndrome is an axoneme abnormality, not an acrosome abnormality, causing low or\nabsent motility. PDGF induces gonocyte chemotaxis in vitro. The seminiferous epithelial cycle is about 16 days,\nand complete spermatogenesis takes about 64 days. The flagellar endpiece contains only axoneme, with no\nfibrous sheath.", "multi": true, "source_images": ["assets/page_008.jpg"]}, {"section": "I. Physiology", "orig": "Question 14", "global_num": 14, "source_pages": [9], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "FSH activates signalling between Sertoli and germ cells by increasing nociceptin on Sertoli cells that binds its receptor OPRL1 on spermatocytes, facilitating progression of meiosis.", "correct": true}, {"label": "B", "text": "GDNF has been shown to induce spermatogonia differentiation and the onset of meiosis.", "correct": false}, {"label": "C", "text": "Retinoic acid plays a key role in the proliferation of undifferentiated type A spermatogonia.", "correct": false}, {"label": "D", "text": "Testosterone and FSH coordinate production of Sertoli cell proteins involved in spermatocyte and spermatid differentiation.", "correct": true}], "correct": ["A", "D"], "rationale": "FSH supports Sertoli-germ cell signalling through nociceptin-OPRL1, helping meiotic progression.\nGDNF supports proliferation/maintenance of undifferentiated type A spermatogonia. Retinoic acid induces\ndifferentiation and meiosis. Testosterone and FSH coordinate Sertoli cell proteins needed for\nspermatocyte/spermatid differentiation.", "multi": true, "source_images": ["assets/page_009.jpg"]}, {"section": "I. Physiology", "orig": "Question 15", "global_num": 15, "source_pages": [9], "stem": "An azoospermic male has testes volume 15 mL, testosterone 10 nmol/L, FSH 24 U/L, normal karyotype, and\nAZF screen showing deletion of AZFb+c.\nWhat is the most appropriate management?", "options": [{"label": "A", "text": "Adoption or donor sperm", "correct": true}, {"label": "B", "text": "HCG injections", "correct": false}, {"label": "C", "text": "Reconstruction of his obstructed ducts", "correct": false}, {"label": "D", "text": "Surgical sperm retrieval", "correct": true}, {"label": "E", "text": "Testosterone replacement", "correct": true}], "correct": ["A", "A", "D", "D", "E"], "rationale": "This is non-obstructive azoospermia with elevated FSH and AZFb+c deletion. Sperm retrieval chance is\nessentially zero. Surgical sperm retrieval is inappropriate. HCG is for hypogonadotropic hypogonadism, not\nprimary testicular failure. Reconstruction is for obstruction. Testosterone replacement suppresses LH/FSH and\nworsens spermatogenesis.\nV. Urinary Diversion / Metabolic Consequences", "multi": true, "source_images": ["assets/page_009.jpg"]}, {"section": "I. Physiology", "orig": "Question 16", "global_num": 16, "source_pages": [9, 10], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "Cholestyramine can be used to treat persistent diarrhoea after urinary diversion.", "correct": true}, {"label": "B", "text": "Colonic resections may cause diarrhoea that occurs particularly with right-sided resections.", "correct": true}, {"label": "C", "text": "The jejunum is very leaky but the bidirectional fluxes cancel each other.", "correct": false}, {"label": "D", "text": "The terminal ileum is routinely used during urinary diversion.", "correct": false}], "correct": ["A", "B"], "rationale": "Cholestyramine may treat bile-salt related persistent diarrhoea after urinary diversion. Right-sided\ncolonic resections may cause diarrhoea. The stomach, not jejunum, is described as very leaky with bidirectional\nfluxes cancelling each other. The terminal ileum is not routinely used because it is important for B12 and bile salt\nabsorption.", "multi": true, "source_images": ["assets/page_009.jpg", "assets/page_010.jpg"]}, {"section": "I. Physiology", "orig": "Question 17", "global_num": 17, "source_pages": [10], "stem": "Which of the following statements are correct?\nSelect all that apply.", "options": [{"label": "A", "text": "It has been shown that GFR decreases 15-25% after urinary diversion with a follow-up of 11 years.", "correct": true}, {"label": "B", "text": "Patients with ileal conduits are not able to undergo renal transplantation.", "correct": false}, {"label": "C", "text": "The loss of bicarbonate may result in acidosis and hypercalciuria, resulting in calcium stones.", "correct": true}, {"label": "D", "text": "The use of the colon in urinary intestinal diversion increases the risk of oxalate calculi.", "correct": false}], "correct": ["A", "C"], "rationale": "GFR may decrease 15-25% after urinary diversion over long-term follow-up. Patients with ileal\nconduits can undergo renal transplantation if carefully selected. Bicarbonate loss causes metabolic acidosis and\nhypercalciuria, increasing calcium stone risk. Oxalate calculi risk is associated more with ileal use, not colon.", "multi": true, "source_images": ["assets/page_010.jpg"]}, {"section": "I. Physiology", "orig": "Question 18", "global_num": 18, "source_pages": [10], "stem": "A 60-year-old gentleman underwent robot-assisted radical cystectomy with a Studer neobladder six\nmonths ago. He is voiding with Valsalva without significant postvoid residual.\nWhich vitamin level should be followed up?", "options": [{"label": "A", "text": "Vitamin A", "correct": true}, {"label": "B", "text": "Vitamin B12", "correct": true}, {"label": "C", "text": "Vitamin D", "correct": false}, {"label": "D", "text": "Vitamin E", "correct": false}, {"label": "E", "text": "Vitamin K", "correct": false}], "correct": ["B", "A", "B"], "rationale": "Vitamin B12 is absorbed in the terminal ileum. Ileal urinary diversion/neobladder patients may\ndevelop B12 deficiency, which can cause irreversible neurologic deficits. Therefore, B12 monitoring and\nsupplementation are important.", "multi": true, "source_images": ["assets/page_010.jpg"]}, {"section": "I. Physiology", "orig": "Question 19", "global_num": 19, "source_pages": [10, 11], "stem": "A man presents with visible haematuria 10 years following a Kock continent cutaneous urinary reservoir.\nStones are found in the reservoir.\nWhat is the most likely stone composition?", "options": [{"label": "A", "text": "Calcium phosphate", "correct": true}, {"label": "B", "text": "Calcium oxalate", "correct": true}, {"label": "C", "text": "Infected stones: combination of struvite, carbonate apatite and ammonium hydrogen urate", "correct": true}, {"label": "D", "text": "Phosphate stone", "correct": true}, {"label": "E", "text": "Uric acid", "correct": true}], "correct": ["C", "F", "E", "C", "E", "D", "E", "C", "B", "A", "F", "E", "C", "A", "B", "A", "E", "A", "A", "E", "A", "D", "A"], "rationale": "Stones in continent urinary reservoirs are commonly infection-related, especially in Kock pouches.\nThey are typically composed of struvite, carbonate apatite, and ammonium hydrogen urate, promoted by\nchronic bacteriuria, mucus, stasis, incomplete emptying, and foreign material.", "multi": true, "source_images": ["assets/page_010.jpg", "assets/page_011.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Question 1", "global_num": 20, "source_pages": [13], "stem": "A 56-year-old male visits your urology clinic. He complains of a weak stream of urine for around one\nmonth, as well as the feeling of incomplete emptying. At night, he gets up three times to void. He does\nnot complain of dysuria or haematuria. Urine dipstick testing shows no abnormalities.\nWhich of the following investigations should be performed at the first visit?\nHistory, examination, serum creatinine renal function assessment, bladder pressure flow", "options": [{"label": "A", "text": "studies", "correct": false}, {"label": "B", "text": "History, examination, urine culture, flexible cystoscopy", "correct": false}, {"label": "C", "text": "History, symptom questionnaire, serum creatinine renal function assessment", "correct": false}, {"label": "D", "text": "and estimation of prostate size", "correct": true}, {"label": "E", "text": "prostate volumes, flexible cystoscopy", "correct": false}], "correct": ["D"], "rationale": "History, symptom questionnaire, ultrasonographic measurement of post-void residual volume\nHistory, symptom questionnaire, ultrasonographic measurement of post-void residual and\nFor the initial assessment of voiding LUTS, a medical history should be taken and a validated symptoms\nquestionnaire such as the IPSS should be used. Estimation of the post-void residual volume is another\nintegral part of the initial assessment.\nRenal function is not part of routine assessment unless an abnormality is suspected, and formal\nurodynamics do not form part of the initial assessment of lower urinary tract symptoms (LUTS).\nUrine culture would not be indicated unless there were symptoms suggestive of infection, and flexible\ncystoscopy does not form part of the baseline investigations of LUTS. Cystoscopy should only be\nperformed in cases of haematuria or to exclude urethral pathologies.\nRenal function is not part of routine assessment unless an abnormality is suspected.\nCystoscopy should only be performed in cases of haematuria or to exclude urethral pathologies.", "multi": false, "source_images": ["assets/page_013.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "QUESTION 2", "global_num": 21, "source_pages": [13, 14], "stem": "A 68-year-old man attends the urology outpatient department complaining of predominantly voiding\nLUTS. His IPSS score is 22, his PSA is 2.4ng/mL, his DRE reveals an enlarged 60g benign feeling prostate.\nHis flow rate reveals a Qmax of 9.8mL/s and a PVR of 150mL. He is started on tamsulosin and finasteride\nand is reviewed again six months later. Six months later his IPSS is now 28, his Qmax is 9.0mL/s and his\nPVR is 200mL.\nWhich of the following are true?\nFailure to respond to alpha-blocker treatment is not a risk factor demonstrated in the ALF-ONE", "options": [{"label": "A", "text": "study to predict a higher risk of acute urinary retention", "correct": false}, {"label": "B", "text": "progression of BPH/LUTS", "correct": false}, {"label": "C", "text": "men with mild LUTS in the Olmstead County study", "correct": true}, {"label": "D", "text": "later acute urinary retention", "correct": true}], "correct": ["C", "D"], "rationale": "Prostatic inflammation, initial PVR, increasing PVR over time and age are not predictors of\nSevere LUTS at baseline had a three times greater relative risk of retention in comparison to\nThe Olmstead County study demonstrated that a Qmax less than 12mL/s was a risk factor for\nThe ALF-ONE study showed that previous AUR was the biggest predictor of future AUR with lack of\nresponse to treatment (IPSS worsening of ≥4 and bother under treatment) being the second most\nimportant predictor of AUR.\nMTOPS showed a subgroup analysis of 1197 patients who had prostate biopsies showed that 45% of them\nhad acute or chronic inflammation on biopsy. When compared with men without inflammation there was a\nsignificant association with an increased risk of AUR (21% progression in inflammation group vs 13.2% in\nthe without inflammation group). The Olmstead County study showed a three times relative risk increase\nin men with a PVR greater than 50mL. The MTOPS study also identified in both treatment and placebo\ngroups that patients who had a stable PVR over time had a lower risk of AUR than those with a steadily\nrising PVR over the 4.5 year follow-up.\nThe Olmstead County study showed that the relative risk of AUR was almost eight times in men who were\n70-79 years compared to 40-49 years old.\nFurthermore, men with moderate to severe LUTS had an approximate three times higher relative risk of\nAUR in comparison to men with mild LUTS.\nMen with a Qmax of less than 12mL/s had a risk of AUR approximately four times higher than that of men\nwith a Qmax greater than 12mL/s.\nQUESTION", "multi": true, "source_images": ["assets/page_013.jpg", "assets/page_014.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 1", "global_num": 22, "source_pages": [14], "stem": "A 71-year-old man with PSA 11.2ng/mL and normal DRE was diagnosed with unilateral GI 3+4 prostate\ncancer.\nWhich of the following statements are correct?\nAccording to clinical staging he is in intermediate-risk group and local staging with MRI is", "options": [{"label": "A", "text": "indicated", "correct": true}, {"label": "B", "text": "nerve-sparing surgery", "correct": false}, {"label": "C", "text": "Microscopic invasion of the bladder neck is classed as T4 disease", "correct": false}, {"label": "D", "text": "MRI has a high sensitivity but a poor specificity for detection of nodes", "correct": false}, {"label": "E", "text": "NVB thickening on MRI indicates T4 disease", "correct": false}], "correct": ["A"], "rationale": "He is a suitable candidate for surgery so MRI results will only affect the decision on\nLocal staging with MRI is indicated in any risk group.\nClinical staging in 30-60% underestimates the true stage and MRI results may entirely change the\ntreatment plan in case of identifying T3a or T3b disease.\nMicroscopic invasion of the bladder neck would be T3a disease.\nA meta-analysis from 2008 reported a specificity of 0.82 and a sensitivity of only 0.39.\nNVB thickening is one of the secondary MRI signs of ECE T3a disease.", "multi": false, "source_images": ["assets/page_014.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 2", "global_num": 23, "source_pages": [14, 15], "stem": "A 60-year-old male patient is on follow-up for mild erectile dysfunction and LUTS due to BPH. The patient\nhas erections just about rigid enough for vaginal penetration without the need to use a phosphodiesterase\ntype 5 inhibitor (PDE5i), which he was not keen to take as it caused him severe throbbing headaches in\nthe past even at low doses. During the last clinic visit, the patient’s usual medication of terazosin 10mg\nonce a night was changed to tamsulosin 0.4mg once a night as there was a slight worsening of his IPSS\nand QoL. Postvoid retention of urine was 0mL and serum PSA was 0.6ng/mL. At his following clinic visit,\nthe patient reported a slight improvement in both IPSS and QoL with tamsulosin. Although he was\ngenerally happier with his LUTS, he was deeply troubled by anejaculation after switching to tamsulosin.\nThe patient was keen for a change in management that will avoid any sexual side effects.\nWhich of the following options will be the most appropriate for the patient?", "options": [{"label": "A", "text": "Alfuzosin extended release", "correct": true}, {"label": "B", "text": "Dutasteride", "correct": false}, {"label": "C", "text": "Low-dose 5mg tadalafil (Cialis)", "correct": false}, {"label": "D", "text": "Silodosin", "correct": false}, {"label": "E", "text": "Transurethral resection of the prostate (TURP)", "correct": false}], "correct": ["A"], "rationale": "Although studies have shown that all alpha blockers have similar efficacy, it is worth changing to another\nlong-acting alpha blocker that is known to have a more favourable sexual side effect profile over\ntamsulosin, such as alfuzosin extended-release formulation.\nThe potential risk of exacerbating this patient’s erectile dysfunction with the use of 5ARIs makes this a\nless desirable choice.\nAlthough low-dose daily tadalafil can be used in patients with concomitant LUTS and erectile dysfunction,\nthe patient was not able to tolerate PDE5i in the past.\nRates of anejaculation with silodosin are much higher compared to tamsulosin.\nThe high risk of retrograde ejaculation with TURP makes this an unlikely choice for a patient who wishes\nto avoid any potential sexual side effects.", "multi": false, "source_images": ["assets/page_014.jpg", "assets/page_015.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 3", "global_num": 24, "source_pages": [15], "stem": "A patient comes to the office with benign prostate hyperplasia (BPH). Which of the following symptoms\nwould be indicative of BPH requiring treatment?", "options": [{"label": "A", "text": "Blood in the urine", "correct": false}, {"label": "B", "text": "Lower back pain", "correct": false}, {"label": "C", "text": "Sexual dysfunction", "correct": false}, {"label": "D", "text": "Weak urinary stream", "correct": true}, {"label": "E", "text": "Weight loss", "correct": false}], "correct": ["D"], "rationale": "Haematuria is not a common symptom of BPH, and is more likely to indicate cancer of the genitourinary\ntract.\nLower back pain is not a common symptom of BPH.\nAlthough some treatment options for BPH can result in sexual dysfunction, patients only rarely present\nwith sexual dysfunction as one of their BPH symptoms.\nWeak urinary stream is within the constellation of LUTS, and it is one of the most common presenting\nsymptoms in patients with BPH.\nWeight loss is a non-specific symptom that is sometimes a sign of maligancy, but is almost never seen in\npure BPH.", "multi": false, "source_images": ["assets/page_015.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 4", "global_num": 25, "source_pages": [15], "stem": "A patient comes into the office for a follow-up appointment six months after being prescribed dutasteride\nfor symptoms of BPH. A PSA test is performed. The patient's pre-treatment level was 2.0ng/dL; what PSA\nlevel would be expected now?", "options": [{"label": "A", "text": "0.0ng/dL", "correct": false}, {"label": "B", "text": "0.5ng/dL", "correct": false}, {"label": "C", "text": "1.0ng/dL", "correct": true}, {"label": "D", "text": "1.5ng/dL", "correct": false}, {"label": "E", "text": "2.0ng/dL", "correct": false}], "correct": ["C"], "rationale": "Treatment with 5-ARIs does not result in the complete eradication of PSA.\nOver six months of 5-ARI treatment, it is unlikely for PSA increase to exceed 50%.\nExisting data supports a 50% reduction in PSA level following treatment with a 5-ARI.\nOver six months of 5-ARI treatment, PSA decrease should be higher than 25%.\n5-ARIs cause a decrease in PSA through shrinkage of the prostate, so a reduction in PSA level is expected.", "multi": false, "source_images": ["assets/page_015.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 5", "global_num": 26, "source_pages": [15, 16], "stem": "A 56-year-old man with no long-standing conditions nor regular medication use is in your office to discuss\nhis risk of prostate cancer. Several men in his family, including his father have been diagnosed with\nprostate cancer at around 60 years of age, although his father died of causes other than prostate cancer.\nThe patient has read that use of finasteride could lower prostate cancer risk. He asks you how his risk for\nprostate cancer would change if he started using the drug. He has no symptoms from the lower urinary\ntract.\nThe drug would increase the likelihood of a prostate biopsy showing Gleason 6 disease by\nshrinking the overall volume of his prostate allowing a higher chance of a biopsy sampling an", "options": [{"label": "A", "text": "area of cancer", "correct": false}, {"label": "B", "text": "but could increase the likelihood of being diagnosed with high-grade prostate cancer", "correct": true}, {"label": "C", "text": "symptomatic BPH", "correct": false}, {"label": "D", "text": "developing high-grade prostate cancer", "correct": false}], "correct": ["B"], "rationale": "The drug would lower his risk of being diagnosed with prostate cancer by 24% approximately\nThe drug would not affect his prostate cancer risk but would lower the risk of developing\nThe drug would not lower his risk of incident prostate cancer but would increase the risk of\nThere may be a chance that the decreased volume will allow a higher chance of sampling an area of\nhigh-grade prostate cancer not Gleason 6 disease.\nThe PCPT trial demonstrated that finasteride lowers the risk of being diagnosed with prostate cancer but\ncould increase the risk of being diagnosed with high-grade prostate cancer.\nRisk of symptomatic BPH would be lower but it would also affect his prostate cancer risk.\nAs previously mentioned, use of finasteride lowers the risk of incident prostate cancer by approximately\n24%.", "multi": false, "source_images": ["assets/page_015.jpg", "assets/page_016.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 6", "global_num": 27, "source_pages": [16], "stem": "A patient comes to your office to discuss using finasteride to reduce the risk of developing significant\nprostate cancer.\nBased on current knowledge the drug would not change his risk for prostate cancer death -\ncorrect\nThe drug would increase his risk of dying of prostate cancer because it increases the risk of", "options": [{"label": "A", "text": "developing high-grade prostate cancer", "correct": false}, {"label": "B", "text": "The drug would lower his risk of dying of prostate cancer by 22-25%", "correct": false}], "correct": [], "rationale": "The use of finasteride would increase the chance of dying from Gleason 6-7 prostate cancer -\nPost hoc analysis from PCPT and population-level epidemiological studies have not found risk associations\nbetween finasteride use and risk of prostate cancer death.\nAvailable evidence demonstrates that lowered overall prostate cancer risk during 5-ARI usage does not\ntranslate to a survival benefit.\nAvailable evidence demonstrates that higher proportion of high-grade prostate cancers detected among\n5-ARI users does not translate to worse survival.\nData from the PCPT and REDUCE studies show no increase in death from Gleason 6-7 prostate cancer but\nincreased incidence of Gleason 8-10 cancer but no decrease in overall survival.", "multi": false, "source_images": ["assets/page_016.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 7", "global_num": 28, "source_pages": [16, 17], "stem": "A 75-year-old man has been using a combination of dutasteride and tamsulosin for years as treatment of\nsymptomatic BPH. His serum PSA has been assessed yearly; two years ago it was 1.4ng/mL and last year\nit was 2.1ng/mL. Now he is in your office with the latest PSA result, 4.4ng/mL.\nHis digital rectal examination is consistent with BPH. The patient has mild lower urinary tract symptoms\nwhich are manageable with the drug.\nWhat do you recommend for this patient?", "options": [{"label": "A", "text": "Continued yearly check-ups. PSA is still within the age-specific normal limits", "correct": false}, {"label": "B", "text": "be a sign of harbouring high-grade prostate cancer", "correct": true}], "correct": ["B"], "rationale": "Prostate biopsy, because PSA shows a consistent increasing trend despite 5-ARI use. This could\nReassure him that his PSA is low and unlikely to be significant and stop measuring PSA -\nTransurethral resection of the prostate because he is symptomatic despite the drug treatment\n- incorrect\nPCPT trial showed that sensitivity of PSA to detect high-grade prostate cancer may be better during 5-ARI\ntherapy. Therefore PSA elevations among men who use 5-ARIs, especially consistent and rapid elevations\nshould be taken seriously.\nIn view of the fact the patient is taking the dutasteride the PSA reading of 4.4 should be doubled to a true\nreading of 8.8 which is outside the age specific range for a 75-year-old man.\nThe symptoms are manageable with drug therapy. Therefore the treatment can continue if no prostate\ncancer is detected. BPH complications are absent.", "multi": false, "source_images": ["assets/page_016.jpg", "assets/page_017.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 8", "global_num": 29, "source_pages": [17], "stem": "A 67-year-old patient presents with a history of three years of bothersome urinary symptoms,\ncharacterised by one episode of nocturia, increased of frequency, weak urinary stream and occasional\nhesitancy.\nUltrasound examination reveals an increase in prostate volume and his PSA concentration is within\nnormal range.\nWhat are the two main risk factors for disease progression in this patient that would indicate the need to\nprescribe an alpha-blockers + and a 5ARI?", "options": [{"label": "A", "text": "Enlarged prostate (>40mL) and/or elevated PSA concentration (>1.4–1.6ng/mL)", "correct": true}, {"label": "B", "text": "Enlarged prostate (>40mL) and/or PSA concentration >1.0ng/mL", "correct": false}, {"label": "C", "text": "Patient reported poor flow and hesitancy", "correct": false}], "correct": ["A"], "rationale": "Enlarged prostate (>80mL) and/or PSA concentration <3.0ng/mL and age between 65 and 70 -\nThis combination therapy should be prescribed primarily in men who have moderate-to-severe LUTS and\nare at risk of disease progression like enlarged prostate (>40mL) and/or elevated PSA concentration\n(>1.4–1.6 ng/mL).\nThe PSA concentration is below 1.4–1.6 ng/mL.\nAge at presentation does not correlate with progression risk.\nBaseline initial symptoms may help predict those at risk of disease progression, however prostate volume\nand relative quantity of PSA are more important.", "multi": false, "source_images": ["assets/page_017.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 9", "global_num": 30, "source_pages": [17, 18], "stem": "A 62-year-old man presents for assessment with a complaint of severe bothersome nocturia.\nPast medical history is significant for hypertension and erectile dysfunction. Medications include\nhydrochlorothiazide (50mg once daily, in the evening) and Muse intraurethral suppository.\nPhysical exam is unremarkable; he is tall and thin with a weight of 85kg, his blood pressure is controlled,\nurinalysis is negative and he has a normal renal function profile. His uroflow reveals a voided volume of\n195cc with a bell curve pattern, Qmax = 17mL/sec, and a PVR of 50mL. Table 1 displays the frequency\nvolume charts for this patient.\nTable 1 24-hour frequency volume charts for two days, one week apart\nData type | 22nd August | 1st September\nNumber of nocturia events | 7 | 2\nNocturnal urine volume (NUV; mL) | 1775 | 825\n24-hour volume (mL) | 3075 | 2000\nHours of sleep | 7 | 7\nNocturnal urine production (mL/h) | 254 | 118\nMax voided volume (MVV; mL) | 300 | 375\nNocturia index (NUV / MVV) | 5.9 | 2.2\nFirst undisturbed sleep period (FUSP; min) | 30 | 60\nNocturnal polyuria index (NPi; %) | 58 | 41\nNocturnal bladder capacity index\n(NBCi, actual minus predicted number of nightly voids; n) | 2.1 | 0.8\nBased on his history and the findings above, what is the most likely diagnosis for this patient?", "options": [{"label": "A", "text": "Bladder outlet obstruction", "correct": false}, {"label": "B", "text": "Diminished functional bladder capacity", "correct": false}, {"label": "C", "text": "Nocturnal polyuria", "correct": true}, {"label": "D", "text": "Obstructive sleep apnoea", "correct": false}, {"label": "E", "text": "Polyuria", "correct": false}], "correct": ["C"], "rationale": "Based on uroflow studies, he has a Qmax which is acceptable for his age, with a normal pattern and low\nPVR; as such, he does not have bladder outlet obstruction.\nHe is not demonstrating a consistently diminished global or nocturnal bladder capacity.\nThe International Continence Society defines nocturnal polyuria as NPi >20% in young adults and >33%\n(NPi33) in patients older than 65 when 24-hour urine production is within normal limits. In this scenario,\nthe patient has NPi values of 58% and 41% respectively for both 24-hour analyses.\nNothing in the provided history alludes to the presence of obstructive sleep apnoea.\nHe is not demonstrating global polyuria, as it is defined as a 24-hour urine output >40mL/kg; based on his\nweight this would be >3.4L per day.", "multi": false, "source_images": ["assets/page_017.jpg", "assets/page_018.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 10", "global_num": 31, "source_pages": [18], "stem": "A 62-year-old man presents with bothersome nocturia. He has a history of hypertension and erectile\ndysfunction for which he takes hydrochlorothiazide (50mg once daily, in the evening) and Muse\nintraurethral suppository. Physical examination is unremarkable, his blood pressure is controlled,\nurinalysis is negative and he has a normal renal function profile. His uroflow reveals a voided volume of\n195cc with a bell curve pattern, Qmax = 17mL/sec, and a PVR of 50mL. A frequency volume chart\ndemonstrates nocturnal polyuria.\nWhat would be the most appropriate initial treatment?", "options": [{"label": "A", "text": "Administer hydrochlorothiazide earlier", "correct": true}, {"label": "B", "text": "Desmopressin 0.2mg once daily", "correct": false}, {"label": "C", "text": "Lower extremity compression stockings", "correct": false}, {"label": "D", "text": "Solifenacin 10mg once daily", "correct": false}, {"label": "E", "text": "Tamsulosin 0.4mg once daily", "correct": false}], "correct": ["A"], "rationale": "The patient’s daily medication list should be reviewed and an attempt made to remove or tailor the time\nof administration for drugs that may impact nocturia. The patient is taking this thiazide diuretic for\nmanagement of his hypertension; however, he takes the medication in the evening, which results in\nincreased nocturnal voiding. In the individual with nocturnal polyuria, diuretics should be administered in\nthe mid-afternoon to allow them to complete their effect prior to sleep.\nDesmopressin has been shown to be effective for the treatment of nocturnal polyuria; however,\nconservative measures and tailoring existing medication is the best initial strategy.\nLower extremity compression stockings can aid in promoting venous return during the daytime in\nindividuals with peripheral oedema, but are not indicated in this case.\nSolifenacin, an anti-cholinergic, has been shown to be effective for the treatment of nocturnal polyuria;\nhowever, conservative measures and tailoring existing medication is the best initial strategy.\nTamsulosin is an alpha-blocker and is a first-line treatment for benign prostatic obstruction, and so is not\nindicated for this patient who is not experiencing obstructive symptoms.", "multi": false, "source_images": ["assets/page_018.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 11", "global_num": 32, "source_pages": [19], "stem": "A 52-year-old man presents for assessment of nocturia which occurs 12 to 15 times per night. He reports\nsignificant daytime fatigue, denies any past medical history and is not taking any regular medications.\nHe is a social drinker and non-smoker with a fluid intake of approximately 2L per day. Physical\nexamination reveals an obese male with a body mass index of 35; his cardiovascular, respiratory and\nneurological exams are unremarkable. Digital rectal exam reveals a benign-feeling prostate gland. There\nis no evidence of peripheral oedema, urinalysis, renal function and electrolytes are normal.\nHis uroflow reveals a voided volume of 240cc with a normal voiding pattern, a Qmax of 15mL/s and a\npost-void residual (PVR) of 20mL. Table 1 displays his 24-hour frequency volume chart.\nTable 1 24-hour frequency volume chart\nNumber of nocturia events | 12\nNocturnal urine volume (NUV; mL) | 1050\n24-hour volume (mL) | 1950\nHours of sleep | 7\nNocturnal urine production (mL/h) | 150\nMax voided volume (MVV; mL) | 310\nNocturia index (NUV / MVV) | 3.4\nFirst undisturbed sleep period (FUSP; min) | 55\nNocturnal polyuria index (NPi; %) | 54\nNocturnal bladder capacity index\n(NBCi, actual minus predicted number of nightly voids; n) | 10.6\nWhat is the most likely aetiology of this patient's severe nocturnal polyuria?", "options": [{"label": "A", "text": "Congestive heart failure", "correct": false}, {"label": "B", "text": "Diabetes insipidus", "correct": false}, {"label": "C", "text": "Excessive fluid intake", "correct": false}, {"label": "D", "text": "Obstructive sleep apnoea", "correct": true}, {"label": "E", "text": "Peripheral oedema", "correct": false}], "correct": ["D"], "rationale": "The patient denies any medical history of note, is not taking any regular medication and has a normal\ncardiovascular and respiratory examination. As such, congestive heart failure can be confidently\nexcluded.\nDiabetes insipidus is unlikely as his total urine volume is 2L, and as his urinalysis and lab tests were within\nnormal limits.\nThe patient states he has a fluid intake of 2L per day, which is not excessive.\nObstructive sleep apnoea is the most likely aetiology given the patient's high body mass index. He also\nhas diminished nocturnal bladder capacity, which is another factor to address in treatment.\nIt is mentioned he does not have a finding of peripheral oedema on examination.", "multi": false, "source_images": ["assets/page_019.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 12", "global_num": 33, "source_pages": [19, 20], "stem": "A 52-year-old male patient with troublesome nocturia completes a frequency volume chart which\nsuggests sleep apnoea as the potential cause. Physical examination reveals an obese male with a body\nmass index of 35; his cardiovascular, respiratory and neurological examinations are unremarkable. Digital\nrectal exam reveals a benign-feeling prostate gland. There is no evidence of peripheral oedema,\nurinalysis, renal function and electrolytes are normal.\nWhat would be the most appropriate next step?", "options": [{"label": "A", "text": "Compression stockings", "correct": false}, {"label": "B", "text": "Desmopressin", "correct": false}, {"label": "C", "text": "Digoxin", "correct": false}, {"label": "D", "text": "Sleep studies", "correct": true}, {"label": "E", "text": "Timed diuretic", "correct": false}], "correct": ["D"], "rationale": "Lower extremity compression stockings can aid in promoting venous return during the daytime in\nindividuals with peripheral oedema, but are not indicated in this case as the patient has no evidence of\noedema.\nAlthough desmopressin has been shown to be effective for treatment of nocturnal polyuria, this is not in\npatients who have obstructive sleep apnoea as their primary pathophysiological mechanism.\nDigoxin would not be indicated in this case as the patient is not experiencing heart failure or any other\ncardiac abnormality.\nAlthough the diagnosis may be obstructive sleep apnoea, the next best step would be to perform sleep\nstudies to confirm this. The American Academy of Sleep Medicine guidelines advise: \"the diagnostic\ncriteria for obstructive sleep apnoea are based on clinical signs and symptoms determined during a\ncomprehensive sleep evaluation, which includes a sleep-oriented history and physical examination, and\nfindings identified by sleep testing.\" The two accepted methods for objective testing are in-laboratory\npolysomnography and home testing with portable monitors.\nDiuretics may be useful in individuals with fluid overload secondary to various processes, but are not\nindicated in this case.", "multi": false, "source_images": ["assets/page_019.jpg", "assets/page_020.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 13", "global_num": 34, "source_pages": [20], "stem": "A 75-year-old man presents with symptoms consistent with BPO, despite taking an alpha1-blocker and a 5\nalpha-reductase inhibitor.\nHis IPSS is 26, Qmax is 8 mL/s, PVR is 40mL and he has a trilobar enlarged prostate with a volume of\n60mL. He has no major comorbidities and is not sexually active. He requests a durable surgical treatment.\nWhich treatment option would you advise?", "options": [{"label": "A", "text": "Open prostatectomy", "correct": false}, {"label": "B", "text": "Prostatic urethral lift (PUL)", "correct": false}, {"label": "C", "text": "Rezum transurethral water vapour treatment", "correct": false}, {"label": "D", "text": "Transurethral incision of the prostate (TUIP)", "correct": false}, {"label": "E", "text": "Transurethral resection of the prostate (TURP) - conventional or bipolar", "correct": true}], "correct": ["E"], "rationale": "Open prostatectomy is a highly effective treatment, but the associated morbidity means it has largely\nbeen replaced by transurethral enucleation procedures. It would not be appropriate in this patient with a\n60mL prostate. EAU guidelines state it can be offered to men with prostates greater than 80mL in volume.\nAs the patient is not concerned about ejaculatory function, PUL would not be recommended. The evidence\nfor the efficacy and durability of the effect of PUL is not substantial. A median lobe is also generally\nconsidered a contraindication.\nData regarding the long-term durability of Rezum is limited at present.\nTUIP is not advocated in BPO with a prostate volume of 60mL. In addition, the durability is less than that\nof TURP.\nConventional (monopolar) TURP has proven to be a highly efficacious procedure with durable outcomes.\nB-TURP has a more favourable perioperative safety profile, although the long-term data for durability is\nless comprehensive.", "multi": false, "source_images": ["assets/page_020.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 14", "global_num": 35, "source_pages": [20, 21], "stem": "A 65-year-old man has ongoing troublesome LUTS despite taking an alpha1-blocker. His IPSS is 21, Qmax\nis 8mL/s, PVR 50mL. His prostate is under 30mL in volume. He is interested in surgical options but is\nconcerned about the possible impact on his sexual function. He does not have a prominent median lobe.\nWhat treatment options would you offer him?", "options": [{"label": "A", "text": "Laser enucleation (HoLEP or ThuLEP)", "correct": false}, {"label": "B", "text": "Minimally invasive simple prostatectomy (MISP)", "correct": false}, {"label": "C", "text": "Prostatic urethral lift (PUL)", "correct": true}, {"label": "D", "text": "Transurethral incision of prostate (TUIP)", "correct": true}, {"label": "E", "text": "Transurethral resection of prostate (TURP)", "correct": false}], "correct": ["C", "D"], "rationale": "Enucleation techniques, such as HoLEP, ThuLEP or MISP, would not be appropriate given the patient’s\nsmall prostate size and his concern about sexual function.\nPUL results in some improvement in LUTS with minimal morbidity. The efficacy of PUL in comparison with\nTURP is poorer in terms of flow rates and IPSS but with equivalent QoL outcomes. The risk of sexual side\neffects is low. You should counsel the patient that the long term results and retreatment rates are\nuncertain and may be inferior compared to more invasive options.\nTUIP would give a similar efficacy to a TURP with a shorter operative time (mean diﬀerence of 18.9\nminutes), length of hospital stay, elimination of TUR syndrome and blood transfusion rate. The risk of\nejaculatory side effects are less with a TUIP than a TURP (23.5% anejaculation with TUIP and 46.5% with\nTURP in one study). Anejaculation occurs in most patients and erectile dysfunction in a smaller proportion\n(6.5%, although this may be more commonly seen in those that undergo watchful waiting than undergo a\nTURP).", "multi": true, "source_images": ["assets/page_020.jpg", "assets/page_021.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 15", "global_num": 36, "source_pages": [21], "stem": "A 65-year-old man attends clinic. He is concerned by a poor urinary flow, urinary frequency and nocturia;\non examination, his prostate feels large and benign. You perform a transrectal ultrasound of his prostate,\nrecording a size of 120cc. His flow test shows a Qmax of 8mL/s with a 190mL voided volume and 200mL\nresidual. He is on no regular medication.\nWhat is the one correct term to describe his clinical findings?", "options": [{"label": "A", "text": "BPE causing BOO i.e. benign prostatic enlargement causing bladder outlet", "correct": true}, {"label": "B", "text": "BPE with BPH", "correct": false}, {"label": "C", "text": "BPH causing BOO", "correct": false}, {"label": "D", "text": "BPH with LUTS", "correct": false}, {"label": "E", "text": "LUTS", "correct": false}], "correct": ["A"], "rationale": "obstruction.", "multi": false, "source_images": ["assets/page_021.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 16", "global_num": 37, "source_pages": [21], "stem": "A 65-year-old man attends clinic. He is concerned by a poor urinary flow, urinary frequency and nocturia;\non examination, his prostate feels large and benign. You perform a transrectal ultrasound of his prostate,\nrecording a size of 180cc. His flow test shows a Qmax of 8mL/s with a 190mL voided volume and 200mL\nresidual. He is on no regular medication.\nThe patient is keen to be treated surgically. Which of the management options below are suitable for him?", "options": [{"label": "A", "text": "HoLEP", "correct": true}, {"label": "B", "text": "Long-term indwelling catheter", "correct": false}, {"label": "C", "text": "Prostatic urethral lift (UroLift)", "correct": false}, {"label": "D", "text": "Robot-assisted simple prostatectomy (RASP)", "correct": true}, {"label": "E", "text": "TURP", "correct": false}], "correct": ["A", "D"], "rationale": "HoLEP has equivalent outcomes to simple prostatectomy for large prostates.\nIn view of his good background health and relatively young age, a long-term catheter would be a poor\noption to improve his quality of life.\nAlthough UroLift can be used for larger prostates, long-term outcome data are not available.\nAlthough a suitable option, the cost and availability of equipment may limit access to RASP for many men.\nEvidence supports inferior outcomes and increased perioperative morbidity for TURP in this setting.", "multi": true, "source_images": ["assets/page_021.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 17", "global_num": 38, "source_pages": [21, 22], "stem": "A 65-year-old man attends clinic. He is concerned by a poor urinary flow, urinary frequency and nocturia;\non examination, his prostate feels large and benign. You perform a transrectal ultrasound of his prostate,\nrecording a size of 120cc. His flow test shows a Qmax of 8mL/s with a 190mL voided volume and 200mL\nresidual. He is on no regular medication.\nThe patient would like a simple prostatectomy, but there is no local surgeon who is trained in\nRobot-assisted simple prostatectomy RASP, so he asks how OSP compares with RASP. Which of the\nfollowing is NOT correct about OSP, when compared with RASP?", "options": [{"label": "A", "text": "Comparable postoperative continence", "correct": false}, {"label": "B", "text": "Decreased risk of transfusion", "correct": true}, {"label": "C", "text": "Increased abdominal scarring", "correct": false}, {"label": "D", "text": "Longer catheterisation time", "correct": false}, {"label": "E", "text": "Longer hospital stay", "correct": false}], "correct": ["B"], "rationale": "The likelihood of blood transfusion is increased with OSP.", "multi": false, "source_images": ["assets/page_021.jpg", "assets/page_022.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 18", "global_num": 39, "source_pages": [22], "stem": "Which of the following is the typical neurological sign seen following rapid correction of chronic\nhyponatraemia?", "options": [{"label": "A", "text": "Central pontine myelinolysis", "correct": true}, {"label": "B", "text": "Expressive aphasia", "correct": false}, {"label": "C", "text": "Hemiparesis", "correct": false}, {"label": "D", "text": "Homonymous haemianopsia", "correct": false}, {"label": "E", "text": "Muscular rigidity", "correct": false}], "correct": ["A"], "rationale": "With respect to chronic hyponatraemia, it appeared that severe neurological complications almost\nexclusively occurred in patients who were treated with hypertonic or isotonic saline without the addition\nof furosemide or an osmotic diuretic agent, resulting in a (rapid) correction rate of 0.5mmol/L/hour or\nmore. Myelinolysis, initially named \"central pontine myelinolysis\", is a neurological disorder that can occur\nafter rapid correction of hyponatraemia. Manifestations of myelinolysis usually evolve several days after\ncorrection of hyponatraemia. Typical features are disorders of upper motor neurons, spastic quadriparesis\nand pseudobulbar palsy, and mental disorders ranging from mild confusion to coma. Death may occur.\nThe motor and localising signs of myelinolysis differ from the generalised encephalopathy that is caused\nby untreated hyponatraemia.", "multi": false, "source_images": ["assets/page_022.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 19", "global_num": 40, "source_pages": [22, 23], "stem": "A 68-year-old healthy male patient (BMI = 22.92kg/m2) with benign prostate hyperplasia is scheduled for\nTURP surgery. Spinal anaesthesia was administered with 2mL of hyperbaric bupivaciane (0.5%) with 25µg\nfentanyl at L3-4 level. After 100min of surgery, the surgeon noted that there was accidental opening of\nthe prostatic venous sinus, and the patient started complaining of tightness in the chest with difficulty in\nbreathing. He developed no other neurological or cardiovascular symptoms and his haemodynamic\nparameters were normal. SPO2 dropped to 86–88% within four minutes. Bilateral basal crepitations were\npresent on auscultation of chest.\nWhich was the most significant risk for developing TUR syndrome?", "options": [{"label": "A", "text": "Accidental opening of the prostatic venous sinus", "correct": false}, {"label": "B", "text": "resection", "correct": true}, {"label": "C", "text": "Bladder bleeding during prostate resection", "correct": false}, {"label": "D", "text": "Prolonged time of the procedure (exceeding 60 minutes)", "correct": false}, {"label": "E", "text": "Urethral ischemia during TURP", "correct": false}], "correct": ["B"], "rationale": "Accidental opening of the prostatic venous sinus and the bladder bleeding during prostate\nImportant risk factors should be controlled during TUR procedure to prevent the occurrence of TUR\nsyndrome. One of the important factors is to reduce and limit irrigation liquid absorption during TURP.\nProlonged time of surgery (which is related to prostate volume) is directly related to the larger volume of\nglycine absorbed. Problems are most frequently associated with operations lasting over 60 minutes.\nAnother important factor that can determine liquid absorption is blood loss. A large volume of blood loss\nsuggests a high number of open veins; consequent hypovolaemia and hypotension may increase the rate\nof fluid absorption. Prostatic capsule perforation or bladder perforation result in large volumes of irrigation\nfluid passing into the peritoneal cavity from where it is rapidly absorbed.", "multi": false, "source_images": ["assets/page_022.jpg", "assets/page_023.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 20", "global_num": 41, "source_pages": [23], "stem": "A fit and well 70-year-old man attends the clinic with moderate LUTS, bothered predominantly by his poor\nflow and nocturia three times a night. He has tried an alpha-blocker with no benefit and wishes to discuss\nsurgical options.\nWhich procedures are mandatory before considering TURP?", "options": [{"label": "A", "text": "DRE", "correct": true}, {"label": "B", "text": "Flexible cystoscopy", "correct": false}, {"label": "C", "text": "Invasive urodynamics", "correct": false}, {"label": "D", "text": "MRI or TRUS volume", "correct": false}, {"label": "E", "text": "PSA", "correct": false}], "correct": ["A"], "rationale": "DRE is important for assessment of prostate gland size and evidence of cancer.\nFlexible cystoscopy or invasive urodynamics are not required.\nWhile use of imaging to determine the size the prostate may be useful in planning operative\nmanagement, it is not a mandatory investigation.\nAlthough PSA is a useful assessment for the evaluation of prostate size and to exclude malignancy, it is\nnot mandatory prior to TURP.", "multi": false, "source_images": ["assets/page_023.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 21", "global_num": 42, "source_pages": [23], "stem": "A fit and well 70-year-old man attends the clinic with moderate LUTS, bothered predominantly by his poor\nflow and nocturia three times a night. He has tried an alpha-blocker with no benefit and wishes to discuss\nsurgical options. He is keen to preserve ejaculation if possible.\nFrom the list below, which is the most suitable treatment option?", "options": [{"label": "A", "text": "HoLEP", "correct": false}, {"label": "B", "text": "KTP PVP", "correct": false}, {"label": "C", "text": "Open prostatectomy", "correct": false}, {"label": "D", "text": "TURP", "correct": false}, {"label": "E", "text": "UroLift", "correct": true}], "correct": ["E"], "rationale": "High rates of retrograde ejaculation are seen with the standard HoLEP procedure, although an\nejaculatory-sparing HoLEP technique has been described.\nAlthough KTP PVP is an effective treatment, high rates of retrograde ejaculation are seen.\nOpen prostatectomy is recommended for larger prostates (>80mL) where laser enucleation is not\navailable and is associated with retrograde ejaculation.\nUroLift is an option as long as the prostate anatomy is suitable and is associated with a lower incidence of\nsexual dysfunction.", "multi": false, "source_images": ["assets/page_023.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 22", "global_num": 43, "source_pages": [23, 24], "stem": "A 67-year-old sheep farmer is referred to you for a holmium laser enucleation of the prostate (HoLEP). He\nhas had a urethral catheter for 8 months after he was diagnosed with high-pressure chronic urinary\nretention.\nHe is miserable with his catheter and very keen to proceed with surgery. On examination, he has a\nbenign-feeling enlarged prostate and a large asymptomatic inguinoscrotal hernia. His prostate volume is\nestimated at 288mL by transrectal ultrasound, and his PSA is 2.9ng/mL. You have space on your operating\nlist next week.\nHow do you proceed?", "options": [{"label": "A", "text": "Discharge him with a long-term urethral catheter", "correct": false}, {"label": "B", "text": "Offer him open prostate enucleation instead", "correct": false}, {"label": "C", "text": "Proceed with HoLEP next week", "correct": false}, {"label": "D", "text": "Proceed with monopolar transurethral resection of the prostate (TURP) next week", "correct": false}, {"label": "E", "text": "Refer him for a hernia repair, deferring HoLEP until this is done", "correct": true}], "correct": ["E"], "rationale": "While discharge with a long-term catheter is an option, it is certainly undesirable for this patient.\nHoLEP is essentially the endoscopic equivalent of open prostate enucleation, though the open procedure\ncomes with significantly greater morbidity. In centres without surgeons who are experienced in HoLEP,\nopen surgery is an option for a prostate of this size (288mL).\nTo be able to perform HoLEP safely and completely, there must be the freedom to rotate the laser\nresectoscope fully when enucleating the lateral lobes. A large scrotal swelling would obstruct this.\nThough the presence of a large hernia would do little to hamper a TURP, the prostate gland is very large,\nmeaning that the morbidity with monopolar TURP would be significantly higher than with HoLEP.\nIn such situations, it is sensible to \"stage\" the procedures, correcting the scrotal pathology first for the\nreasons outlined above.", "multi": false, "source_images": ["assets/page_023.jpg", "assets/page_024.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 23", "global_num": 44, "source_pages": [24], "stem": "During a HoLep procedure you notice a small perforation of the surgical capsule. What is your next step?", "options": [{"label": "A", "text": "After completing the procedure, leave a catheter in for 2 weeks", "correct": false}, {"label": "B", "text": "Continue with sharp dissection in the same plane", "correct": false}, {"label": "C", "text": "Draw back the resectoscope to give a broader view and locate the correct plane", "correct": true}, {"label": "D", "text": "Remove the laser and use a rollerball to stop any adjacent bleeding", "correct": false}, {"label": "E", "text": "Stop the procedure immediately and place a catheter", "correct": false}], "correct": ["C"], "rationale": "Small capsular perforations heal quickly without any problems, so it is unnecessary to prolong\npostoperative catheterisation.\nSharp dissection in the same plane is likely to turn into a significant capsular breach, potentially causing\nincreased fluid extravasation and absorption.\nThe correct response is to stop any bleeding and pull back for a broader view, allowing you to assess and\nlocate the correct (more superficial) plane of the surgical capsule, then continue with the enucleation in\nthis plane.\nThe laser should be sufficient to stop adjacent bleeding. A rollerball is only necessary if laser energy is\ninsufficient to control bleeding.\nSmall capsular breaches do occur, and it is not necessary to stop the procedure. The important thing is to\nrecognise them early and adjust your enucleation plane accordingly (as described above).", "multi": false, "source_images": ["assets/page_024.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 24", "global_num": 45, "source_pages": [24, 25], "stem": "While attempting to morcellate some small, firm, smooth pieces of prostate tissue (sometimes called\n\"beach balls\") during a HoLEP procedure, the mucosa of the posterior bladder wall is sucked into the\nmorcellator blades.\nWhat should you do?", "options": [{"label": "A", "text": "Assess the bladder for perforation and any significant bleeding points", "correct": false}, {"label": "B", "text": "Continue morcellating until the bladder mucosa is released", "correct": false}, {"label": "C", "text": "out", "correct": false}, {"label": "D", "text": "Take your foot off the pedal and ask for morcellator suction to be deactivated", "correct": true}], "correct": ["D"], "rationale": "Remove the \"beach balls\" using an alternative method, e.g. graspers, forceps, or washing them\nTake your foot off the pedal and pull the morcellator blades from the bladder mucosa -\nReleasing the bladder by removing suction must be the first action. Once the bladder is released, you\nshould inspect the area for bleeding and extent of injury and take appropriate action.\nContinuing to morcellate will result in further bladder injury.\nOnly once the bladder has been released from the morcellator and the bladder mucosa inspected for\ninjury should any attention be directed to the remaining adenoma. Furthermore, if there is a large bladder\nperforation or if bowel injury is suspected, open repair may be necessary; the adenoma can be removed\nat that point.\nIt is imperative to release suction before moving the blades away from the bladder to minimise injury.\nTo completely release the attached bladder mucosa requires two actions — you must not only take your\nfoot off the pedal, but also have the suction completely deactivated on the morcellator unit.", "multi": false, "source_images": ["assets/page_024.jpg", "assets/page_025.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 25", "global_num": 46, "source_pages": [25], "stem": "A 61-year-old male presents with urinary retention. Following catheterisation a 2L residual was drained\nand he had a post-obstructive diuresis. He recovers well from the acute episode. His general health is\ngood and he is keen to be free of his catheter. Clinically his prostate is benign and his upper tracts are\nnormal on USS. His prostate measured 52/50/40mm.\nWhich of the following would you select as his best treatment option?", "options": [{"label": "A", "text": "Conservative treatment", "correct": false}, {"label": "B", "text": "Transvesical adenomectomy", "correct": false}, {"label": "C", "text": "TUIP", "correct": false}, {"label": "D", "text": "TURP", "correct": true}, {"label": "E", "text": "Urolift", "correct": false}], "correct": ["D"], "rationale": "Conservative treatment would be correct only on special demand of the patient.\nTransvesical adenomectomy is considered for prostate volume above 80mL.\nTUIP is the surgical therapy for men with BPO, LUTS and prostate size under 30mL and without middle\nlobe.\nTURP is a reasonable option for men with prostate size between 30 and 80mL.\nUrolift is not the best option for chronic retention.", "multi": false, "source_images": ["assets/page_025.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 26", "global_num": 47, "source_pages": [25, 26], "stem": "A 70-year-old man with a pacemaker and benign prostate enlargement presented to the emergency\ndepartment in clot retention. USS showed bilateral upper tract dilation and a prostate volume of 90mL.\nFurther investigation did not reveal any other source for bleeding other than a vascular prostate.\nFollowing the acute management of his high pressure chronic retention which of the following would you\nselect as his next treatment option?", "options": [{"label": "A", "text": "Conservative treatment", "correct": false}, {"label": "B", "text": "Prostatic steam injection", "correct": false}, {"label": "C", "text": "Transvesical adenomectomy", "correct": false}, {"label": "D", "text": "TURisP", "correct": true}, {"label": "E", "text": "TURP", "correct": false}], "correct": ["D"], "rationale": "Conservative treatment would be unlikely to be the patient’s preferred long-term solution.\nProstatic steam injection is not ideal for prostates of this size.\nTransvesical adenomectomy has been replace by endoscopic techniques even for very large prostates.\nTURisP is the correct answer because it does not influence the pacemaker. The bipolar resectoscope uses\na specialised loop which incorporates both the active and return electrodes, allowing electrosurgical\ntissue cutting in a saline medium.\nTURP will require additional perioperative pacemaker checks.", "multi": false, "source_images": ["assets/page_025.jpg", "assets/page_026.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 27", "global_num": 48, "source_pages": [26], "stem": "A 76-year-old man presents with nocturia, IPSS score 21, PSA 2.6ng/mL. Qmax 8 mL/sec, a residual of\n150mL and prostate volume of 110mL. He has been on alpha blockade for 10 years. His general health is\ngood.\nWhich of the following would you select as his next treatment option?", "options": [{"label": "A", "text": "Holmium laser enucleation (HoLEP)", "correct": true}, {"label": "B", "text": "Open adenomectomy", "correct": false}, {"label": "C", "text": "Prostate stent", "correct": false}, {"label": "D", "text": "TUIP", "correct": false}, {"label": "E", "text": "TURP", "correct": false}], "correct": ["A"], "rationale": "Holmium laser nucleation is indicated for prostate volume above 80mL.\nOpen adenomectomy would not be used in preference to HoLEP.\nProstate stent is not recommended for large prostates.\nTUIP is the surgical therapy for men with BPO, LUTS, and prostate size under 30mL and without middle\nlobes.\nTURP is the current surgical standard procedure for men with prostate sizes of 30–80mL, BPO and\nmoderate to severe LUTS.", "multi": false, "source_images": ["assets/page_026.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 28", "global_num": 49, "source_pages": [26], "stem": "A 56-year-old man attends clinic, he is unhappy with his urinary flow and frequency. He has not seen any\nblood in his urine nor had any infections. He gets up twice at night. He is on no medication and is sexually\nactive and trying for a child. He has heard about UroLift and is keen to be considered for it.\nFrom the list below select the investigations that are mandatory before UroLift.", "options": [{"label": "A", "text": "Cystometrogram (CMG)", "correct": false}, {"label": "B", "text": "Digital rectal exam", "correct": true}, {"label": "C", "text": "Flexible cystoscopy or transrectal ultrasound", "correct": true}, {"label": "D", "text": "Flow test and post-void residual", "correct": true}, {"label": "E", "text": "PSA", "correct": false}, {"label": "F", "text": "Urine dipstick with/without MCS of MSU", "correct": true}], "correct": ["B", "C", "D", "F"], "rationale": "A CMG is not mandatory.\nThe prostate should be assessed for size and any evidence of malignancy prior to being considered\nsuitable for UroLift.\nThe prostate needs to be assessed to exclude a median lobe. This could be done on MRI but flexible\ncystoscopy is more reliable.\nA flow rate and post-void residual are important investigations in male LUTS and should be included in the\nevaluation of all men who are being considered for any form of surgery.\nAlthough PSA may be used as an assessment of prostate size and for screening of malignancy it is not\nmandatory.\nIt is important to exclude any underlying infection prior to UroLift surgery.", "multi": true, "source_images": ["assets/page_026.jpg"]}, {"section": "II. BPE / LUTS / OAB / Urodynamics / Bladder Pain", "orig": "Item 29", "global_num": 50, "source_pages": [27], "stem": "A man considering treatment options for LUTS is concerned about maintaining normal ejaculation as he\nwishes to conceive a child.\nWhich of the following treatments would
